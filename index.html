<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CSEA Trading Intelligence v5.5.3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#1e293b;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
:root{--blue:#3b82f6;--green:#16a34a;--red:#dc2626;--gold:#d97706;--bg1:#f1f5f9;--bg2:#ffffff;--bg3:#f8fafc;--border:#e2e8f0;--text:#1e293b;--sub:#64748b}
.header{background:linear-gradient(135deg,#1e3a5f,#1e1b4b);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.logo{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.5px;white-space:nowrap}
.logo span{color:#d97706}
.badge{background:rgba(255,255,255,.15);color:#bfdbfe;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.mode-toggle{display:flex;background:rgba(0,0,0,.25);border-radius:8px;padding:3px;gap:2px;margin-left:8px}
.mode-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;color:#93c5fd;background:transparent;transition:all .2s;white-space:nowrap}
.mode-btn.active{background:#1e40af;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;flex-shrink:0}
.status-dot.off{background:#ef4444;box-shadow:0 0 6px #ef4444}
.status-txt,.last-sync{font-size:11px;color:#bfdbfe;white-space:nowrap}
.acct-label{font-size:11px;color:#93c5fd;white-space:nowrap}
.acct-select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;outline:none;cursor:pointer;max-width:200px}
.acct-select option{background:#1e3a5f;color:#fff}
.day-strip{background:#0f172a;border-bottom:1px solid #1e293b;padding:6px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:56px;z-index:99}
.ds-item{display:flex;flex-direction:column;gap:2px;white-space:nowrap}
.ds-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.ds-val{font-size:13px;font-weight:700;color:#e2e8f0}
.ds-val.pos{color:#4ade80}.ds-val.neg{color:#f87171}.ds-val.gold{color:#fbbf24}
.ds-sep{width:1px;height:28px;background:#334155;flex-shrink:0}
.ds-progress{flex:1;min-width:120px;display:flex;flex-direction:column;gap:3px}
.ds-prog-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:flex;justify-content:space-between}
.ds-prog-track{height:6px;background:#334155;border-radius:3px;overflow:hidden}
.ds-prog-fill{height:6px;background:#4ade80;border-radius:3px;transition:width .4s}
.ds-prog-fill.gold{background:#fbbf24}
.date-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-bar-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.preset-btns{display:flex;gap:4px;flex-wrap:wrap}
.preset{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--sub);transition:all .15s}
.preset:hover{border-color:var(--blue);color:var(--blue)}
.preset.active{background:#eff6ff;border-color:var(--blue);color:var(--blue)}
.date-inputs{display:flex;align-items:center;gap:6px;margin-left:8px}
.date-inputs input{padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text);outline:none;background:var(--bg3)}
.date-sep{color:var(--sub);font-size:11px}
.range-count{margin-left:auto;font-size:11px;color:var(--sub);white-space:nowrap;background:var(--bg3);padding:3px 10px;border-radius:5px;border:1px solid var(--border)}
.tabs{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:11px 15px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;transition:all .15s;white-space:nowrap}
.tab:hover{color:#1e293b}.tab.active{color:#1e40af;border-bottom-color:#3b82f6}
.main{padding:20px;max-width:1400px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kpi-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-val{font-size:22px;font-weight:700;color:#1e293b}
.kpi-val.pos{color:var(--green)}.kpi-val.neg{color:var(--red)}.kpi-val.gold{color:var(--gold)}
.kpi-sub{font-size:11px;color:var(--sub);margin-top:3px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.chart-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-wrap{position:relative;height:190px}
.charts-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.charts-row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.equity-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.equity-wrap{position:relative;height:220px}
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.table-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.table-title{font-size:14px;font-weight:700;color:#1e293b}
.count-badge{background:var(--bg3);color:var(--sub);padding:2px 8px;border-radius:4px;font-size:11px;border:1px solid var(--border)}
.filters{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:12px;outline:none}
.tbl-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:#334155}
tr:hover td{background:#f8fafc;cursor:pointer}
.badge-buy{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-sell{background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-opened{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-blocked{background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-open{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-close{background:#eff6ff;color:#2563eb;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.monthly-table-wrap{overflow-x:auto;padding:4px 0 8px}
.monthly-table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
.monthly-table th{background:var(--bg3);padding:9px 10px;text-align:center;font-size:11px;font-weight:600;color:var(--sub);border:1px solid var(--border);white-space:nowrap}
.monthly-table th.left{text-align:left}
.monthly-table td{padding:9px 10px;text-align:center;border:1px solid var(--border);font-weight:600;white-space:nowrap}
.monthly-table .year-col{text-align:left;font-weight:700;color:#1e293b;min-width:56px}
.monthly-table .m-pos{color:#16a34a;background:#f0fdf4}
.monthly-table .m-neg{color:#dc2626;background:#fef2f2}
.monthly-table .m-zero{color:#94a3b8;background:var(--bg3)}
.monthly-table .ytd-col{font-weight:800;border-left:2px solid #cbd5e1}
.heatmap-grid{display:grid;gap:4px;margin-bottom:20px}
.heatmap-cell{padding:10px 6px;border-radius:6px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;transition:transform .1s}
.heatmap-cell:hover{transform:scale(1.05)}
.heatmap-header{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.inspector{display:none;position:fixed;right:0;top:0;bottom:0;width:360px;background:#fff;z-index:201;box-shadow:-4px 0 20px rgba(0,0,0,.15);overflow-y:auto;padding:24px}
.inspector.open,.overlay.open{display:block}
.insp-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:18px;cursor:pointer;color:#64748b}
.insp-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.insp-label{color:#64748b;font-weight:600}
.insp-val{color:#1e293b;font-weight:700}
.float-bar{background:linear-gradient(135deg,#1e3a5f,#1e1b4b);padding:12px 20px;border-radius:10px;margin-bottom:20px;display:flex;align-items:center;gap:20px}
.float-label{font-size:11px;color:#93c5fd;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.float-val{font-size:24px;font-weight:700}
.float-val.pos{color:#4ade80}.float-val.neg{color:#f87171}
.pos-count{font-size:14px;color:#bfdbfe;font-weight:700;margin-left:auto}
.refresh-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.refresh-label{font-size:10px;color:#64748b}
.compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.compare-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.compare-title{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:4px}
.compare-sub{font-size:11px;color:var(--sub);margin-bottom:12px}
.compare-kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.compare-kpi{background:var(--bg3);border-radius:6px;padding:8px}
.compare-kpi-label{font-size:10px;color:var(--sub);font-weight:600;margin-bottom:2px}
.compare-kpi-val{font-size:14px;font-weight:700}
.eq-mini{position:relative;height:60px}
.cur-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.perf-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:20px}
.empty-state{text-align:center;padding:60px 20px;color:var(--sub)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-msg{font-size:15px;font-weight:600}
.empty-sub{font-size:12px;margin-top:6px}
.csv-btn{background:#22c55e;border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.csv-btn:hover{background:#16a34a}
@media(max-width:768px){
  .charts-row-3,.charts-row-2,.compare-grid,.cur-grid,.perf-grid{grid-template-columns:1fr}
  .day-strip{gap:8px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">&#9889; <span>CSEA</span> Intelligence</div>
  <div class="badge">v5.5.3</div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnStrategy" onclick="setMode('strategy')">&#128202; Strategy</button>
    <button class="mode-btn" id="btnPortfolio" onclick="setMode('portfolio')">&#128188; Portfolio</button>
  </div>
  <div class="hdr-right">
    <div class="acct-label">Account:</div>
    <select class="acct-select" id="acctSelect" onchange="onAcctChange()"><option value="">Loading&#8230;</option></select>
    <div class="status-dot off" id="statusDot"></div>
    <div class="status-txt" id="statusTxt">Connecting&#8230;</div>
    <div class="last-sync" id="lastSync"></div>
  </div>
</div>

<div class="day-strip">
  <div class="ds-item"><div class="ds-label">Day</div><div class="ds-val" id="dsDay">&#8212;</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Lot</div><div class="ds-val" id="dsLot">&#8212;</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Today P&amp;L</div><div class="ds-val" id="dsPnl">&#8212;</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Trades</div><div class="ds-val" id="dsTrades">&#8212;</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Open Pos</div><div class="ds-val" id="dsPos">&#8212;</div></div>
  <div class="ds-sep"></div>
  <div class="ds-progress">
    <div class="ds-prog-label"><span>Compound Progress</span><span id="dsProgPct">&#8212;</span></div>
    <div class="ds-prog-track"><div class="ds-prog-fill" id="dsProgFill" style="width:0%"></div></div>
  </div>
</div>

<div class="date-bar">
  <span class="date-bar-label">&#128197; Range:</span>
  <div class="preset-btns">
    <button class="preset" onclick="setPreset('today')">Today</button>
    <button class="preset" onclick="setPreset('week')">This Week</button>
    <button class="preset" onclick="setPreset('month')">This Month</button>
    <button class="preset" onclick="setPreset('year')">This Year</button>
    <button class="preset" onclick="setPreset('last30')">Last 30d</button>
    <button class="preset" onclick="setPreset('last90')">Last 3M</button>
    <button class="preset" onclick="setPreset('last180')">Last 6M</button>
    <button class="preset active" onclick="setPreset('all')">All Time</button>
  </div>
  <div class="date-inputs">
    <input type="date" id="dateFrom" onchange="onDateChange()"/>
    <span class="date-sep">&rarr;</span>
    <input type="date" id="dateTo" onchange="onDateChange()"/>
  </div>
  <div class="range-count" id="rangeCount">&#8212; trades in range</div>
</div>

<div class="tabs" id="tabBar"></div>
<div class="main" id="mainContent"></div>

<div class="overlay" id="overlay" onclick="closeInspector()"></div>
<div class="inspector" id="inspector">
  <button class="insp-close" onclick="closeInspector()">&#10005;</button>
  <div id="inspBody"></div>
</div>

<script>
var SB_URL='https://nmyveijljquxvhjelqbc.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teXZlaWpsanF1eHZoamVscWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjc2MjgsImV4cCI6MjA4Nzk0MzYyOH0.YT-sAh2Spn1805dnylTsZ2gBx-T7yC6fyOKIs0YPlP4';
var HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

Chart.register(ChartDataLabels);

/* FIX 1+2: solid colours, reliable ctx.dataset.data[ctx.dataIndex] for datalabel colour */
var DL_BAR={display:true,anchor:'end',align:'end',offset:2,clamp:true,font:{size:9,weight:'700'},
  formatter:function(v){return(v>=0?'+':'')+v.toFixed(2);},
  color:function(ctx){return ctx.dataset.data[ctx.dataIndex]>=0?'#166534':'#991b1b';}};
var DL_OFF={display:false};

var mode='strategy',activeTab='overview',acctId='';
var allAccounts=[],allAccountsData={},charts={};
var rawDb={trades:[],signals:[],daily:[],positions:[]};
var db={trades:[],signals:[],daily:[],positions:[]};
var dateFrom='',dateTo='',activePreset='all';

var STRATEGY_TABS=['overview','positions','trades','signals','daily','heatmap','currencies','compare'];
var PORTFOLIO_TABS=['overview','trades','performance','compare'];
var TAB_LABELS={overview:'Overview',positions:'Positions',trades:'Trades',signals:'Signals',daily:'Daily',heatmap:'Pair Heatmap',currencies:'Currencies',performance:'Performance',compare:'Compare'};
var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

async function sb(table,params){
  params=params||'';
  var PAGE=1000,all=[],from=0;
  while(true){
    var r=await fetch(SB_URL+'/rest/v1/'+table+'?'+params+'&limit='+PAGE+'&offset='+from,
      {headers:Object.assign({},HDR,{'Range-Unit':'items','Range':from+'-'+(from+PAGE-1)})});
    if(!r.ok) break;
    var page=await r.json();
    all=all.concat(page);
    if(page.length<PAGE) break;
    from+=PAGE;
  }
  return all;
}

async function init(){
  var saved=localStorage.getItem('csea_account_id');
  var savedMode=localStorage.getItem('csea_mode')||'strategy';
  setMode(savedMode,false);
  allAccounts=await sb('accounts','select=*&order=created_at');
  var sel=document.getElementById('acctSelect');
  sel.innerHTML='<option value="">All Accounts</option>';
  allAccounts.forEach(function(a){
    var o=document.createElement('option');
    o.value=a.id; o.textContent=a.label||a.name||a.account_number;
    sel.appendChild(o);
  });
  if(saved){sel.value=saved;acctId=saved;}
  await loadData();
}

async function loadData(){
  var dot=document.getElementById('statusDot');
  var txt=document.getElementById('statusTxt');
  dot.className='status-dot off'; txt.textContent='Loading...';
  var f=acctId?('&account_id=eq.'+acctId):'';
  var results=await Promise.all([
    sb('trades','select=*&order=ts'+f),
    sb('signals','select=*&order=ts'+f),
    sb('daily','select=*&order=date'+f),
    sb('trades','select=*&event=eq.OPEN'+f)
  ]);
  rawDb={trades:results[0]||[],signals:results[1]||[],daily:results[2]||[],positions:results[3]||[]};
  if(allAccounts.length>1){
    var perAcct=await Promise.all(allAccounts.map(function(a){
      return sb('trades','select=*&order=ts&account_id=eq.'+a.id);
    }));
    allAccounts.forEach(function(a,i){allAccountsData[a.id]=perAcct[i]||[];});
  }
  applyDateFilter();
  updateDayStrip();
  dot.className='status-dot'; txt.textContent='Live';
  document.getElementById('lastSync').textContent='Synced '+new Date().toLocaleTimeString();
  destroyCharts();
  renderTabs();
  renderContent();
}

function setMode(m,reload){
  if(reload===undefined) reload=true;
  mode=m;
  localStorage.setItem('csea_mode',m);
  document.getElementById('btnStrategy').className='mode-btn'+(m==='strategy'?' active':'');
  document.getElementById('btnPortfolio').className='mode-btn'+(m==='portfolio'?' active':'');
  activeTab='overview';
  if(reload){destroyCharts();renderTabs();renderContent();}
}

function onAcctChange(){
  acctId=document.getElementById('acctSelect').value;
  localStorage.setItem('csea_account_id',acctId);
  loadData();
}

function setPreset(p){
  activePreset=p;
  document.querySelectorAll('.preset').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');
  var now=new Date();
  var fmt=function(d){return d.toISOString().slice(0,10);};
  var df=document.getElementById('dateFrom');
  var dt=document.getElementById('dateTo');
  if(p==='all'){df.value='';dt.value='';dateFrom='';dateTo='';}
  else if(p==='today'){var s=fmt(now);df.value=s;dt.value=s;dateFrom=s;dateTo=s;}
  else if(p==='week'){var mon=new Date(now);mon.setDate(now.getDate()-now.getDay()+1);df.value=fmt(mon);dt.value=fmt(now);dateFrom=fmt(mon);dateTo=fmt(now);}
  else if(p==='month'){var ms=new Date(now.getFullYear(),now.getMonth(),1);df.value=fmt(ms);dt.value=fmt(now);dateFrom=fmt(ms);dateTo=fmt(now);}
  else if(p==='year'){var ys=new Date(now.getFullYear(),0,1);df.value=fmt(ys);dt.value=fmt(now);dateFrom=fmt(ys);dateTo=fmt(now);}
  else if(p==='last30'){var l30=new Date(now);l30.setDate(now.getDate()-30);df.value=fmt(l30);dt.value=fmt(now);dateFrom=fmt(l30);dateTo=fmt(now);}
  else if(p==='last90'){var l90=new Date(now);l90.setDate(now.getDate()-90);df.value=fmt(l90);dt.value=fmt(now);dateFrom=fmt(l90);dateTo=fmt(now);}
  else if(p==='last180'){var l180=new Date(now);l180.setDate(now.getDate()-180);df.value=fmt(l180);dt.value=fmt(now);dateFrom=fmt(l180);dateTo=fmt(now);}
  applyDateFilter();
  destroyCharts();
  renderContent();
}

function onDateChange(){
  dateFrom=document.getElementById('dateFrom').value;
  dateTo=document.getElementById('dateTo').value;
  document.querySelectorAll('.preset').forEach(function(b){b.classList.remove('active');});
  applyDateFilter();
  destroyCharts();
  renderContent();
}

function applyDateFilter(){
  var from=dateFrom,to=dateTo;
  function inRange(ts){
    if(!ts) return true;
    var d=ts.slice(0,10);
    if(from&&d<from) return false;
    if(to&&d>to) return false;
    return true;
  }
  db.trades=rawDb.trades.filter(function(t){return inRange(t.ts);});
  db.signals=rawDb.signals.filter(function(s){return inRange(s.ts);});
  db.daily=rawDb.daily.filter(function(d){return inRange(d.date);});
  db.positions=rawDb.positions;
  var cnt=document.getElementById('rangeCount');
  if(cnt) cnt.textContent=closed().length+' trades in range';
}

function updateDayStrip(){
  var today=new Date().toISOString().slice(0,10);
  var daily=rawDb.daily.slice().sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
  var lastDay=daily[0]||{};
  var todayTrades=rawDb.trades.filter(function(t){
    return (t.ts||'').slice(0,10)===today&&(t.event==='CLOSE'||t.event==='COMPOUND_CLOSE')&&parseFloat(t.pnl||0)!==0;
  });
  var pnl=todayTrades.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
  var trades=todayTrades.length;
  var openPos=rawDb.positions.length;
  var target=parseFloat(lastDay.compound_target||0);
  var hit=!!lastDay.target_hit;
  var pct=target>0?Math.min(100,pnl/target*100):0;
  document.getElementById('dsDay').textContent=lastDay.compound_day?'Day '+lastDay.compound_day:'--';
  document.getElementById('dsLot').textContent=lastDay.compound_lot?parseFloat(lastDay.compound_lot).toFixed(2)+'L':'--';
  var pnlEl=document.getElementById('dsPnl');
  pnlEl.textContent=pnl!==0?'$'+fmtPnl(pnl):'--';
  pnlEl.className='ds-val '+(pnl>0?'pos':pnl<0?'neg':'');
  document.getElementById('dsTrades').textContent=trades;
  var posEl=document.getElementById('dsPos');
  posEl.className='ds-val '+(openPos>0?'pos':'');
  posEl.textContent=openPos;
  document.getElementById('dsProgPct').textContent=hit?'&#10003; HIT':(target>0?pct.toFixed(0)+'%':'--');
  var fill=document.getElementById('dsProgFill');
  fill.style.width=Math.max(0,pct)+'%';
  fill.className='ds-prog-fill'+(hit?' gold':'');
}

function closed(){
  return db.trades.filter(function(t){return t.event==='CLOSE'||t.event==='COMPOUND_CLOSE';}).filter(function(t){return parseFloat(t.pnl||0)!==0;});
}

function fmtPnl(v){return(v>=0?'+':'')+v.toFixed(2);}

function buildMonthlyGrid(cl){
  var yearMap={};
  cl.forEach(function(t){
    if(!t.ts) return;
    var yr=t.ts.slice(0,4),mo=parseInt(t.ts.slice(5,7))-1;
    if(!yearMap[yr]) yearMap[yr]=new Array(12).fill(null);
    yearMap[yr][mo]=(yearMap[yr][mo]||0)+parseFloat(t.pnl||0);
  });
  var years=Object.keys(yearMap).sort();
  if(!years.length) return '';
  var thead='<tr><th class="left">Year</th>'+MON.map(function(m){return'<th>'+m+'</th>';}).join('')+'<th>YTD</th></tr>';
  var tbody=years.map(function(yr){
    var row=yearMap[yr];
    var ytd=row.reduce(function(s,v){return s+(v||0);},0);
    var cells=row.map(function(v){
      if(v===null) return'<td class="m-zero">--</td>';
      return'<td class="'+(v>0?'m-pos':v<0?'m-neg':'m-zero')+'">$'+fmtPnl(v)+'</td>';
    }).join('');
    return'<tr><td class="year-col">'+yr+'</td>'+cells+'<td class="ytd-col '+(ytd>=0?'m-pos':'m-neg')+'">$'+fmtPnl(ytd)+'</td></tr>';
  }).join('');
  return'<div class="monthly-table-wrap"><table class="monthly-table"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>';
}

function barOpts(base){
  return Object.assign({},base,{
    layout:{padding:{top:20}},
    plugins:Object.assign({},base.plugins,{datalabels:DL_BAR})
  });
}
function lineOpts(base){
  return Object.assign({},base,{
    plugins:Object.assign({},base.plugins,{datalabels:DL_OFF})
  });
}

/* ── TABS ─────────────────────────────────────────────────────── */
function renderTabs(){
  var tabs=mode==='strategy'?STRATEGY_TABS:PORTFOLIO_TABS;
  document.getElementById('tabBar').innerHTML=tabs.map(function(t){
    return'<button class="tab'+(activeTab===t?' active':'')+'" onclick="setTab(\''+t+'\')">'+TAB_LABELS[t]+'</button>';
  }).join('');
}

function setTab(t){
  activeTab=t;
  destroyCharts();
  renderTabs();
  renderContent();
}

function destroyCharts(){
  Object.values(charts).forEach(function(c){try{c.destroy();}catch(e){}});
  charts={};
}

function renderContent(){
  var el=document.getElementById('mainContent');
  if(mode==='strategy'){
    if(activeTab==='overview')        el.innerHTML=renderStratOverview();
    else if(activeTab==='positions')  el.innerHTML=renderPositions();
    else if(activeTab==='trades')     el.innerHTML=renderTrades();
    else if(activeTab==='signals')    el.innerHTML=renderSignals();
    else if(activeTab==='daily')      el.innerHTML=renderDaily();
    else if(activeTab==='heatmap')    el.innerHTML=renderHeatmap();
    else if(activeTab==='currencies') el.innerHTML=renderCurrencies();
    else if(activeTab==='compare')    el.innerHTML=renderCompare();
  } else {
    if(activeTab==='overview')         el.innerHTML=renderPortOverview();
    else if(activeTab==='trades')      el.innerHTML=renderTrades();
    else if(activeTab==='performance') el.innerHTML=renderPerformance();
    else if(activeTab==='compare')     el.innerHTML=renderCompare();
  }
  setTimeout(renderCharts,50);
}

/* ── STRATEGY OVERVIEW ─────────────────────────────────────────── */
function renderStratOverview(){
  var cl=closed();
  var wins=cl.filter(function(t){return parseFloat(t.pnl||0)>0;});
  var losses=cl.filter(function(t){return parseFloat(t.pnl||0)<0;});
  var totalPnl=cl.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
  var winRate=cl.length?((wins.length/cl.length)*100).toFixed(1):0;
  var avgWin=wins.length?(wins.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0)/wins.length).toFixed(2):0;
  var avgLoss=losses.length?(losses.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0)/losses.length).toFixed(2):0;
  var gw=wins.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
  var gl=Math.abs(losses.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0));
  var pf=gl>0?(gw/gl).toFixed(2):'&#8734;';
  var openPnl=rawDb.positions.reduce(function(s,p){return s+parseFloat(p.pnl||0);},0);
  var sorted=cl.slice().sort(function(a,b){return(a.ts||'').localeCompare(b.ts||'');});
  var bal=[],runBal=0;
  sorted.forEach(function(t){runBal+=parseFloat(t.pnl||0);bal.push(+runBal.toFixed(2));});
  var peak=0,maxDD=0;
  bal.forEach(function(b){if(b>peak)peak=b;var dd=peak-b;if(dd>maxDD)maxDD=dd;});
  var avgDur=0;
  if(cl.length){avgDur=(cl.reduce(function(s,t){return s+parseFloat(t.duration_min||0);},0)/cl.length/60).toFixed(1);}
  var syms=Array.from(new Set(cl.map(function(t){return t.symbol;}).filter(Boolean))).sort();

  return'<div class="kpi-grid">'
    +'<div class="kpi"><div class="kpi-label">Total P&L</div><div class="kpi-val '+(totalPnl>=0?'pos':'neg')+'">$'+fmtPnl(totalPnl)+'</div><div class="kpi-sub">'+cl.length+' closed trades</div></div>'
    +'<div class="kpi"><div class="kpi-label">Float P&L</div><div class="kpi-val '+(openPnl>=0?'pos':'neg')+'">$'+fmtPnl(openPnl)+'</div><div class="kpi-sub">'+rawDb.positions.length+' open</div></div>'
    +'<div class="kpi"><div class="kpi-label">Win Rate</div><div class="kpi-val">'+(cl.length?winRate:'--')+'%</div><div class="kpi-sub">'+wins.length+'W / '+losses.length+'L</div></div>'
    +'<div class="kpi"><div class="kpi-label">Profit Factor</div><div class="kpi-val '+(parseFloat(pf)>=1.5?'pos':parseFloat(pf)<1?'neg':'')+'">'+pf+'</div><div class="kpi-sub">Gross W/L ratio</div></div>'
    +'<div class="kpi"><div class="kpi-label">Avg Win</div><div class="kpi-val pos">$'+avgWin+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Avg Loss</div><div class="kpi-val neg">$'+avgLoss+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Max Drawdown</div><div class="kpi-val neg">$'+maxDD.toFixed(2)+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Avg Duration</div><div class="kpi-val">'+avgDur+'h</div></div>'
    +'</div>'
    +'<div class="equity-card"><div class="chart-title">Equity Curve</div>'
    +'<div class="equity-wrap"><canvas id="equityChart" data-labels="'+encodeURIComponent(JSON.stringify(sorted.map(function(t){return(t.ts||'').slice(0,10);})))+'" data-values="'+encodeURIComponent(JSON.stringify(bal))+'"></canvas></div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px">'
    +'<div class="chart-card"><div class="chart-title">Monthly P&L (12M)</div><div class="chart-wrap"><canvas id="monthlyChart"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Weekly P&L (4W)</div><div class="chart-wrap"><canvas id="weeklyChart"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Duration P&L</div><div class="chart-wrap"><canvas id="durationChart"></canvas></div></div>'
    +'</div>'
    +'<div class="table-card"><div class="table-header"><span class="table-title">Recent Closed Trades</span><span class="count-badge" id="trdCount">'+cl.length+'</span>'
    +'<div class="filters">'
    +'<select id="symF" onchange="filterTrades()"><option value="">All Pairs</option>'+syms.map(function(s){return'<option>'+s+'</option>';}).join('')+'</select>'
    +'<select id="dirF" onchange="filterTrades()"><option value="">Both</option><option>BUY</option><option>SELL</option></select>'
    +'<button class="csv-btn" onclick="exportCSV()">&#8595; CSV</button>'
    +'</div></div>'
    +'<div class="tbl-wrap"><table><thead><tr><th>Open</th><th>Close</th><th>Symbol</th><th>Dir</th><th>Strong</th><th>Weak</th><th>Gap</th><th>Lot</th><th>Entry</th><th>P&L</th><th>Balance</th></tr></thead>'
    +'<tbody id="trdBody">'+renderTradeRows(cl)+'</tbody></table></div></div>';
}

/* ── POSITIONS ─────────────────────────────────────────────────── */
function renderPositions(){
  var pos=db.positions;
  var floatPnl=pos.reduce(function(s,p){return s+parseFloat(p.pnl||0);},0);
  var html='<div class="float-bar">'
    +'<div><div class="float-label">Float P&L</div><div class="float-val '+(floatPnl>=0?'pos':'neg')+'">$'+fmtPnl(floatPnl)+'</div></div>'
    +'<div class="pos-count">'+pos.length+' Open Positions</div>'
    +'<button class="refresh-btn" onclick="loadData()">&#8635; Refresh</button>'
    +'<div><div class="refresh-label" id="posRefreshLabel">Auto-refresh 60s</div></div>'
    +'</div>';
  if(!pos.length) return html+'<div class="empty-state"><div class="empty-icon">&#128205;</div><div class="empty-msg">No open positions</div></div>';
  html+='<div class="table-card"><div class="table-header"><span class="table-title">Open Positions</span><span class="count-badge">'+pos.length+'</span></div>'
    +'<div class="tbl-wrap"><table><thead><tr><th>Opened</th><th>Symbol</th><th>Dir</th><th>Lot</th><th>Entry</th><th>SL</th><th>TP</th><th>Time Open</th></tr></thead><tbody>';
  pos.forEach(function(p){
    var mins=Math.round((Date.now()-new Date(p.ts).getTime())/60000);
    var to=mins<60?(mins+'m'):mins<1440?(Math.floor(mins/60)+'h '+(mins%60)+'m'):Math.floor(mins/1440)+'d';
    html+='<tr><td style="color:#94a3b8">'+(p.ts||'').slice(0,16)+'</td>'
      +'<td style="color:#1e40af;font-weight:700">'+p.symbol+'</td>'
      +'<td><span class="badge-'+((p.direction||'').toLowerCase())+'">'+p.direction+'</span></td>'
      +'<td>'+parseFloat(p.lot||0).toFixed(2)+'</td>'
      +'<td>'+parseFloat(p.entry||0).toFixed(5)+'</td>'
      +'<td>'+(p.sl?parseFloat(p.sl).toFixed(5):'--')+'</td>'
      +'<td>'+(p.tp?parseFloat(p.tp).toFixed(5):'--')+'</td>'
      +'<td style="color:#64748b">'+to+'</td></tr>';
  });
  html+='</tbody></table></div></div>';
  return html;
}

    +'<tbody id="trdBody">'+renderTradeRows(cl)+'</tbody></table></div></div>';

function renderTradeRows(rows){
  var openMap={};
  rawDb.trades.filter(function(t){return t.event==='OPEN';}).forEach(function(t){openMap[t.ticket]=t;});
  return rows.slice().reverse().map(function(t){
    var pnl=parseFloat(t.pnl||0);
    var oe=openMap[t.ticket];
    return'<tr onclick="openInspector(\''+t.id+'\')">'
      +'<td style="color:#94a3b8">'+(oe?(oe.ts||'').slice(0,16):'--')+'</td>'
      +'<td style="color:#94a3b8">'+(t.ts||'').slice(0,16)+'</td>'
      +'<td style="color:#1e40af;font-weight:700">'+(t.symbol||'--')+'</td>'
      +'<td><span class="badge-'+((t.direction||'').toLowerCase())+'">'+(t.direction||'--')+'</span></td>'
      +(mode==='strategy'?('<td style="color:#16a34a">'+(t.strong_cur||'--')+'</td><td style="color:#dc2626">'+(t.weak_cur||'--')+'</td><td>'+parseFloat(t.gap||0).toFixed(3)+'</td>'):'')
      +'<td>'+parseFloat(t.lot||0).toFixed(2)+'</td>'
      +'<td>'+parseFloat(t.entry||0).toFixed(5)+'</td>'
      +'<td style="color:'+(pnl>=0?'#16a34a':'#dc2626')+';font-weight:700">$'+fmtPnl(pnl)+'</td>'
      +'<td>$'+parseFloat(t.balance||0).toFixed(2)+'</td></tr>';
  }).join('');
}

function filterTrades(){
  var sym=(document.getElementById('symF')||{}).value||'';
  var dir=(document.getElementById('dirF')||{}).value||'';
  var rows=closed();
  if(sym) rows=rows.filter(function(t){return t.symbol===sym;});
  if(dir) rows=rows.filter(function(t){return t.direction===dir;});
  var body=document.getElementById('trdBody');
  if(body) body.innerHTML=renderTradeRows(rows);
  var cnt=document.getElementById('trdCount');
  if(cnt) cnt.textContent=rows.length;
}

function exportCSV(){
  var cl=closed();
  var hdr=['ts','symbol','direction','lot','entry','pnl','balance','strong_cur','weak_cur','gap'];
  var csv=[hdr.join(',')].concat(cl.map(function(t){return hdr.map(function(k){return t[k]||'';}).join(',');})).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='csea_trades_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

/* ── SIGNALS ───────────────────────────────────────────────────── */
function renderSignals(){
  var opened=db.signals.filter(function(s){return s.result==='OPENED';}).length;
  var blocked=db.signals.filter(function(s){return s.result==='BLOCKED';}).length;
  var reasons={};
  db.signals.filter(function(s){return s.result==='BLOCKED';}).forEach(function(s){
    var r=s.block_reason||'Unknown';reasons[r]=(reasons[r]||0)+1;
  });
  var rKeys=Object.keys(reasons).sort(function(a,b){return reasons[b]-reasons[a];});
  var syms=Array.from(new Set(db.signals.map(function(s){return s.symbol;}).filter(Boolean))).sort();
  return'<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">'

    +'<div class="kpi"><div class="kpi-label">Opened</div><div class="kpi-val pos">'+opened+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Blocked</div><div class="kpi-val neg">'+blocked+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Open Rate</div><div class="kpi-val">'+(db.signals.length?(opened/db.signals.length*100).toFixed(1):0)+'%</div></div>'
    +'</div>'
    +(rKeys.length?'<div class="table-card" style="margin-bottom:20px"><div class="table-header"><span class="table-title">Block Reasons</span></div><div class="tbl-wrap"><table><thead><tr><th>Reason</th><th>Count</th></tr></thead><tbody>'
      +rKeys.map(function(r){return'<tr><td>'+r+'</td><td style="font-weight:700">'+reasons[r]+'</td></tr>';}).join('')
      +'</tbody></table></div></div>':'')
    +'<div class="table-card"><div class="table-header"><span class="table-title">Signal Log</span><span class="count-badge">'+db.signals.length+'</span>'
    +'<div class="filters">'
    +'<select id="sigSymF" onchange="filterSignals()"><option value="">All Pairs</option>'+syms.map(function(s){return'<option>'+s+'</option>';}).join('')+'</select>'
    +'<select id="sigResF" onchange="filterSignals()"><option value="">All Results</option><option>OPENED</option><option>BLOCKED</option></select>'
    +'</div></div>'
    +'<div class="tbl-wrap"><table><thead><tr><th>Time</th><th>Symbol</th><th>Dir</th><th>Strong</th><th>Weak</th><th>Gap</th><th>Result</th><th>Reason</th></tr></thead>'
    +'<tbody id="sigBody">'+renderSignalRows(db.signals)+'</tbody></table></div></div>';

function filterSignals(){
  var sym=(document.getElementById('sigSymF')||{}).value||'';
  var res=(document.getElementById('sigResF')||{}).value||'';
  var rows=db.signals;
  if(sym) rows=rows.filter(function(s){return s.symbol===sym;});

/* ── DAILY ─────────────────────────────────────────────────────── */
function renderDaily(){
  if(!rawDb.daily.length) return'<div class="empty-state"><div class="empty-icon">&#128197;</div><div class="empty-msg">No daily data</div></div>';
  var allCl=rawDb.trades.filter(function(t){return t.event==='CLOSE'||t.event==='COMPOUND_CLOSE';});
  var wm={};
  allCl.forEach(function(t){
    if(!t.ts) return;
    var d=new Date(t.ts);var mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1);
    var w=mon.toISOString().slice(0,10);
    wm[w]=(wm[w]||0)+parseFloat(t.pnl||0);
  });
  var wks=Object.keys(wm).sort().slice(-4);
  var wvs=wks.map(function(k){return+wm[k].toFixed(2);});
  var mm={};
  allCl.forEach(function(t){if(t.ts){var m=t.ts.slice(0,7);mm[m]=(mm[m]||0)+parseFloat(t.pnl||0);}});
  var mons=Object.keys(mm).sort().slice(-12);
  var mvs=mons.map(function(k){return+mm[k].toFixed(2);});
  var sorted=rawDb.daily.slice().reverse();
  return'<div class="charts-row-2" style="margin-bottom:20px">'
    +'<div class="chart-card"><div class="chart-title">Weekly P&L (4W)</div><div class="chart-wrap"><canvas id="weeklyDailyChart" data-wkeys="'+encodeURIComponent(JSON.stringify(wks))+'" data-wvals="'+encodeURIComponent(JSON.stringify(wvs))+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Monthly P&L (12M)</div><div class="chart-wrap"><canvas id="monthlyDailyChart" data-mkeys="'+encodeURIComponent(JSON.stringify(mons))+'" data-mvals="'+encodeURIComponent(JSON.stringify(mvs))+'"></canvas></div></div>'
    +'</div>'
    +'<div class="table-card"><div class="table-header"><span class="table-title">Daily Summary</span><span class="count-badge">'+rawDb.daily.length+' days</span></div>'
    +'<div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Day</th><th>Start Bal</th><th>Target</th><th>P&L</th><th>Closed</th><th>Lot</th><th>Hit</th></tr></thead><tbody>'
    +sorted.map(function(d){

/* ── HEATMAP ────────────────────────────────────────────────────── */
function renderHeatmap(){
  var cl=closed();
  if(!cl.length) return'<div class="empty-state"><div class="empty-icon">&#128293;</div><div class="empty-msg">No trade data</div></div>';
  var symData={};
  cl.forEach(function(t){
    if(!t.symbol) return;
    if(!symData[t.symbol]) symData[t.symbol]={pnl:0,count:0,wins:0};
    symData[t.symbol].pnl+=parseFloat(t.pnl||0);
    symData[t.symbol].count++;
    if(parseFloat(t.pnl||0)>0) symData[t.symbol].wins++;
  });
  var syms=Object.keys(symData).sort(function(a,b){return symData[b].pnl-symData[a].pnl;});
  var maxAbs=Math.max.apply(null,syms.map(function(s){return Math.abs(symData[s].pnl);}));
  var cells=syms.map(function(s){
    var d=symData[s],intensity=maxAbs>0?Math.abs(d.pnl)/maxAbs:0;
    var bg=d.pnl>=0?'rgba(16,185,129,'+(0.15+intensity*0.7)+')':'rgba(239,68,68,'+(0.15+intensity*0.7)+')';
    var wr=d.count?(d.wins/d.count*100).toFixed(0):0;
    return'<div class="heatmap-cell" style="background:'+bg+';color:'+(d.pnl>=0?'#064e3b':'#7f1d1d')+'">'
      +'<div>'+s+'</div><div>$'+d.pnl.toFixed(0)+'</div>'
      +'<div style="font-size:10px;font-weight:400">'+d.count+' | '+wr+'%WR</div></div>';
  }).join('');
  return'<div class="heatmap-header"><b>Pair Performance Heatmap</b> &mdash; '+syms.length+' pairs &middot; sorted by P&L</div>'
    +'<div class="heatmap-grid" style="grid-template-columns:repeat(auto-fill,minmax(100px,1fr))">'+cells+'</div>';
}

/* ── CURRENCIES (FIX 3: coloured intensity tiles) ──────────────── */
function renderCurrencies(){
  var cl=closed().filter(function(t){return t.strong_cur&&t.weak_cur;});
  if(!cl.length) return'<div class="empty-state"><div class="empty-icon">&#128177;</div><div class="empty-msg">No currency data</div><div class="empty-sub">Only available for main CSEA EA accounts</div></div>';
  var curs=['EUR','GBP','AUD','NZD','USD','CAD','CHF','JPY'];
  var sPnl={},wPnl={},sWr={},wWr={};
  curs.forEach(function(c){sPnl[c]=0;wPnl[c]=0;sWr[c]=[0,0];wWr[c]=[0,0];});
  cl.forEach(function(t){
    var pnl=parseFloat(t.pnl||0);
    if(curs.indexOf(t.strong_cur)>=0){sPnl[t.strong_cur]+=pnl;sWr[t.strong_cur][1]++;if(pnl>0)sWr[t.strong_cur][0]++;}
    if(curs.indexOf(t.weak_cur)>=0){wPnl[t.weak_cur]+=pnl;wWr[t.weak_cur][1]++;if(pnl>0)wWr[t.weak_cur][0]++;}
  });
  /* combined total P&L per currency for tile intensity */
  var totPnl={};
  curs.forEach(function(c){totPnl[c]=sPnl[c]+wPnl[c];});
  var maxAbs=Math.max.apply(null,curs.map(function(c){return Math.abs(totPnl[c]);}));
  var tiles=curs.map(function(c){
    var tot=totPnl[c];
    var intensity=maxAbs>0?Math.abs(tot)/maxAbs:0;
    var bg=tot>=0?'rgba(16,185,129,'+(0.2+intensity*0.65)+')':'rgba(239,68,68,'+(0.2+intensity*0.65)+')';
    var tc=tot>=0?'#064e3b':'#7f1d1d';
    var totalTrades=sWr[c][1]+wWr[c][1];
    var totalWins=sWr[c][0]+wWr[c][0];
    var wr=totalTrades>0?(totalWins/totalTrades*100).toFixed(0):0;
    return'<div class="heatmap-cell" style="background:'+bg+';color:'+tc+';padding:14px 8px">'
      +'<div style="font-size:14px;font-weight:800">'+c+'</div>'
      +'<div style="font-size:15px;font-weight:700;margin:4px 0">$'+tot.toFixed(0)+'</div>'
      +'<div style="font-size:10px;font-weight:500">'+totalTrades+' trades</div>'
      +'<div style="font-size:10px;font-weight:400">'+wr+'% WR</div>'
      +'</div>';
  }).join('');
  var spv=curs.map(function(c){return+sPnl[c].toFixed(2);});
  var wpv=curs.map(function(c){return+wPnl[c].toFixed(2);});
  return'<div class="heatmap-header"><b>Currency Performance</b> &mdash; '+cl.length+' trades &middot; combined P&L per currency</div>'
    +'<div class="heatmap-grid" style="grid-template-columns:repeat(8,1fr);margin-bottom:20px">'+tiles+'</div>'
    +'<div class="cur-grid">'
    +'<div class="chart-card"><div class="chart-title">P&L as Strong Currency</div><div class="chart-wrap"><canvas id="curStrongChart" data-curs="'+encodeURIComponent(JSON.stringify(curs))+'" data-vals="'+encodeURIComponent(JSON.stringify(spv))+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">P&L as Weak Currency</div><div class="chart-wrap"><canvas id="curWeakChart" data-curs="'+encodeURIComponent(JSON.stringify(curs))+'" data-vals="'+encodeURIComponent(JSON.stringify(wpv))+'"></canvas></div></div>'
    +'</div>'
    +'<div class="table-card"><div class="table-header"><span class="table-title">Currency Breakdown</span></div>'
    +'<div class="tbl-wrap"><table><thead><tr><th>Currency</th><th>P&L Strong</th><th>WR Strong</th><th>Trades Strong</th><th>P&L Weak</th><th>WR Weak</th><th>Trades Weak</th></tr></thead><tbody>'
    +curs.map(function(c){
      return'<tr><td style="font-weight:700">'+c+'</td>'
        +'<td style="color:'+(sPnl[c]>=0?'#16a34a':'#dc2626')+';font-weight:700">$'+sPnl[c].toFixed(2)+'</td>'
        +'<td>'+(sWr[c][1]>0?(sWr[c][0]/sWr[c][1]*100).toFixed(0):0)+'%</td><td>'+sWr[c][1]+'</td>'
        +'<td style="color:'+(wPnl[c]>=0?'#16a34a':'#dc2626')+';font-weight:700">$'+wPnl[c].toFixed(2)+'</td>'
        +'<td>'+(wWr[c][1]>0?(wWr[c][0]/wWr[c][1]*100).toFixed(0):0)+'%</td><td>'+wWr[c][1]+'</td></tr>';
    }).join('')+'</tbody></table></div></div>';
}

/* ── PORTFOLIO OVERVIEW ─────────────────────────────────────────── */
function renderPortOverview(){
  var cl=closed();
  var wins=cl.filter(function(t){return parseFloat(t.pnl||0)>0;});
  var losses=cl.filter(function(t){return parseFloat(t.pnl||0)<0;});
  var totalPnl=cl.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
  var winRate=cl.length?((wins.length/cl.length)*100).toFixed(1):0;
  var avgWin=wins.length?(wins.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0)/wins.length).toFixed(2):0;
  var avgLoss=losses.length?(losses.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0)/losses.length).toFixed(2):0;
  var gw=wins.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
  var gl=Math.abs(losses.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0));
  var pf=gl>0?(gw/gl).toFixed(2):'&#8734;';
  var openPnl=rawDb.positions.reduce(function(s,p){return s+parseFloat(p.pnl||0);},0);
  return'<div class="kpi-grid">'
    +'<div class="kpi"><div class="kpi-label">Total P&L</div><div class="kpi-val '+(totalPnl>=0?'pos':'neg')+'">$'+fmtPnl(totalPnl)+'</div><div class="kpi-sub">'+cl.length+' trades</div></div>'
    +'<div class="kpi"><div class="kpi-label">Float P&L</div><div class="kpi-val '+(openPnl>=0?'pos':'neg')+'">$'+fmtPnl(openPnl)+'</div><div class="kpi-sub">'+rawDb.positions.length+' open</div></div>'
    +'<div class="kpi"><div class="kpi-label">Win Rate</div><div class="kpi-val">'+(cl.length?winRate:'--')+'%</div><div class="kpi-sub">'+wins.length+'W / '+losses.length+'L</div></div>'
    +'<div class="kpi"><div class="kpi-label">Profit Factor</div><div class="kpi-val '+(parseFloat(pf)>=1.5?'pos':parseFloat(pf)<1?'neg':'')+'">'+pf+'</div><div class="kpi-sub">Gross W/L ratio</div></div>'
    +'<div class="kpi"><div class="kpi-label">Avg Win</div><div class="kpi-val pos">$'+avgWin+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Avg Loss</div><div class="kpi-val neg">$'+avgLoss+'</div></div>'
    +'</div>'
    +'<div class="equity-card"><div class="chart-title">Portfolio Equity Curve</div>'
    +'<div class="equity-wrap"><canvas id="portEquityChart"></canvas></div></div>'

    +'<div class="chart-card"><div class="chart-title">Weekly P&L (4W)</div><div class="chart-wrap"><canvas id="weeklyChart"></canvas></div></div>'
    +'</div>';
}

/* ── PERFORMANCE ─────────────────────────────────────────────────── */
function renderPerformance(){
  var cl=closed();
  var allClosed=rawDb.trades.filter(function(t){return t.event==='CLOSE'||t.event==='COMPOUND_CLOSE';});
  var wkm={};
  allClosed.forEach(function(t){
    if(!t.ts) return;
    var d=new Date(t.ts);var mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1);
    var w=mon.toISOString().slice(0,10);
    wkm[w]=(wkm[w]||0)+parseFloat(t.pnl||0);
  });
  var wks=Object.keys(wkm).sort().slice(-4);
  var wvs=wks.map(function(k){return+wkm[k].toFixed(2);});
  var mMap={};
  allClosed.forEach(function(t){if(t.ts){var m=t.ts.slice(0,7);mMap[m]=(mMap[m]||0)+parseFloat(t.pnl||0);}});
  var mons=Object.keys(mMap).sort().slice(-12);
  var mvs=mons.map(function(k){return+mMap[k].toFixed(2);});
  var hVals=new Array(24).fill(0);
  allClosed.forEach(function(t){if(t.ts){var h=parseInt(t.ts.slice(11,13));hVals[h]+=parseFloat(t.pnl||0);}});
  hVals=hVals.map(function(v){return+v.toFixed(2);});
  var dMap={'<1h':0,'1-4h':0,'4-24h':0,'>24h':0};
  allClosed.forEach(function(t){var dur=parseFloat(t.duration_min||0);if(dur<60)dMap['<1h']+=parseFloat(t.pnl||0);else if(dur<240)dMap['1-4h']+=parseFloat(t.pnl||0);else if(dur<1440)dMap['4-24h']+=parseFloat(t.pnl||0);else dMap['>24h']+=parseFloat(t.pnl||0);});
  var dk=Object.keys(dMap),dv=Object.values(dMap).map(function(v){return+v.toFixed(2);});
  var dayMap={};
  allClosed.forEach(function(t){if(!t.ts)return;var day=t.ts.slice(0,10);dayMap[day]=(dayMap[day]||0)+parseFloat(t.pnl||0);});
  var d5keys=Object.keys(dayMap).sort().slice(-5);
  var d5labels=d5keys.map(function(d){return d.slice(5);});
  var d5vals=d5keys.map(function(d){return+dayMap[d].toFixed(2);});
  var perfTable=buildMonthlyGrid(allClosed);
  return'<div class="perf-grid">'
    +'<div class="chart-card"><div class="chart-title">Daily P&L (Last 5 Days)</div><div class="chart-wrap"><canvas id="perfDaily5" data-labels="'+encodeURIComponent(JSON.stringify(d5labels))+'" data-vals="'+encodeURIComponent(JSON.stringify(d5vals))+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Weekly P&L (4W)</div><div class="chart-wrap"><canvas id="perfWeekly" data-labels="'+encodeURIComponent(JSON.stringify(wks))+'" data-vals="'+encodeURIComponent(JSON.stringify(wvs))+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Monthly P&L (12M)</div><div class="chart-wrap"><canvas id="perfMonthly" data-labels="'+encodeURIComponent(JSON.stringify(mons))+'" data-vals="'+encodeURIComponent(JSON.stringify(mvs))+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Time of Day P&L (Hour)</div><div class="chart-wrap"><canvas id="perfTod" data-vals="'+encodeURIComponent(JSON.stringify(hVals))+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Duration P&L</div><div class="chart-wrap"><canvas id="perfDuration" data-keys="'+encodeURIComponent(JSON.stringify(dk))+'" data-vals="'+encodeURIComponent(JSON.stringify(dv))+'"></canvas></div></div>'
    +'</div>'
    +'<div class="table-card"><div class="table-header"><span class="table-title">&#128197; Monthly Performance ($)</span></div>'
    +perfTable+'</div>';
}

/* ── COMPARE (FIX 4: mini equity curves) ─────────────────────────── */
function renderCompare(){
  if(allAccounts.length<2) return'<div class="empty-state"><div class="empty-icon">&#128202;</div><div class="empty-msg">Need 2+ accounts to compare</div></div>';
  var cards=allAccounts.map(function(a){
    var cl=(allAccountsData[a.id]||[]).filter(function(t){return(t.event==='CLOSE'||t.event==='COMPOUND_CLOSE')&&parseFloat(t.pnl||0)!==0;});
    var pnl=cl.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
    var wins=cl.filter(function(t){return parseFloat(t.pnl||0)>0;}).length;
    var wr=cl.length?((wins/cl.length)*100).toFixed(1):0;
    var bal=[],run=0;
    cl.slice().sort(function(a,b){return(a.ts||'').localeCompare(b.ts||'');}).forEach(function(t){run+=parseFloat(t.pnl||0);bal.push(+run.toFixed(2));});
    return'<div class="compare-card">'
      +'<div class="compare-title">'+(a.label||a.name||a.account_number)+'</div>'
      +'<div class="compare-sub">'+(a.account_type||'--')+' &middot; '+(a.broker||'--')+'</div>'
      +'<div class="compare-kpis">'
      +'<div class="compare-kpi"><div class="compare-kpi-label">Total P&L</div><div class="compare-kpi-val" style="color:'+(pnl>=0?'#16a34a':'#dc2626')+'">$'+fmtPnl(pnl)+'</div></div>'
      +'<div class="compare-kpi"><div class="compare-kpi-label">Win Rate</div><div class="compare-kpi-val">'+wr+'%</div></div>'
      +'<div class="compare-kpi"><div class="compare-kpi-label">Trades</div><div class="compare-kpi-val">'+cl.length+'</div></div>'
      +'<div class="compare-kpi"><div class="compare-kpi-label">Account</div><div class="compare-kpi-val">'+(a.account_number||'--')+'</div></div>'
      +'</div>'
      +'<div class="eq-mini"><canvas id="eq_'+a.id+'" data-labels="'+encodeURIComponent(JSON.stringify(bal.map(function(_,i){return String(i);})))+'" data-values="'+encodeURIComponent(JSON.stringify(bal))+'"></canvas></div>'
      +'</div>';
  }).join('');
  return'<div class="compare-grid">'+cards+'</div>';
}

/* ── INSPECTOR ──────────────────────────────────────────────────── */
function openInspector(id){
  var t=rawDb.trades.find(function(x){return x.id===id;});
  if(!t) return;
  var oe=rawDb.trades.find(function(x){return x.ticket===t.ticket&&x.event==='OPEN';});
  var pnl=parseFloat(t.pnl||0);
  var dur=oe?Math.round((new Date(t.ts)-new Date(oe.ts))/60000):null;
  var rows=[
    ['Symbol',t.symbol||'--'],['Direction',t.direction||'--'],['Event',t.event||'--'],
    ['Entry',parseFloat(t.entry||0).toFixed(5)],['Lot',parseFloat(t.lot||0).toFixed(2)],
    ['SL',t.sl?parseFloat(t.sl).toFixed(5):'--'],['TP',t.tp?parseFloat(t.tp).toFixed(5):'--'],
    ['P&L','$'+fmtPnl(pnl)],['Balance','$'+parseFloat(t.balance||0).toFixed(2)],
    ['Open Time',oe?(oe.ts||'').slice(0,16):'--'],['Close Time',(t.ts||'').slice(0,16)],
    ['Duration',dur!==null?(dur<60?dur+'m':Math.floor(dur/60)+'h '+(dur%60)+'m'):'--'],
    ['Strong',t.strong_cur||'--'],['Weak',t.weak_cur||'--'],['Gap',t.gap?parseFloat(t.gap).toFixed(4):'--'],
    ['Compound Day',t.compound_day||'--']
  ];
  document.getElementById('inspBody').innerHTML='<h3 style="margin-bottom:16px;font-size:16px">Trade Details</h3>'
    +rows.map(function(r){return'<div class="insp-row"><span class="insp-label">'+r[0]+'</span><span class="insp-val">'+r[1]+'</span></div>';}).join('');
  document.getElementById('inspector').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeInspector(){
  document.getElementById('inspector').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

    var mk2=JSON.parse(decodeURIComponent(mdc.dataset.mkeys||'[]'));
    var mv2=JSON.parse(decodeURIComponent(mdc.dataset.mvals||'[]'));
    charts.mdc=new Chart(mdc,{type:'bar',data:{labels:mk2.map(function(m){return MON[parseInt(m.slice(5))-1];}),datasets:[{data:mv2,backgroundColor:mv2.map(function(v){return v>=0?'#22c55e':'#ef4444';})}]},options:barOpts(cd)});
  }

  /* Currency — strong */
  var csc=document.getElementById('curStrongChart');
  if(csc){
    var cc=JSON.parse(decodeURIComponent(csc.dataset.curs||'[]')),sv=JSON.parse(decodeURIComponent(csc.dataset.vals||'[]'));
    charts.csc=new Chart(csc,{type:'bar',data:{labels:cc,datasets:[{data:sv,backgroundColor:sv.map(function(v){return v>=0?'#22c55e':'#ef4444';})}]},options:barOpts(cd)});
  }
  /* Currency — weak */
  var cwc=document.getElementById('curWeakChart');
  if(cwc){
    var cc2=JSON.parse(decodeURIComponent(cwc.dataset.curs||'[]')),wv3=JSON.parse(decodeURIComponent(cwc.dataset.vals||'[]'));
    charts.cwc=new Chart(cwc,{type:'bar',data:{labels:cc2,datasets:[{data:wv3,backgroundColor:wv3.map(function(v){return v>=0?'#22c55e':'#ef4444';})}]},options:barOpts(cd)});
  }

  /* Performance — daily 5 */
  var pd5=document.getElementById('perfDaily5');
  if(pd5){
    var pd5l=JSON.parse(decodeURIComponent(pd5.dataset.labels||'[]'));
    var pd5v=JSON.parse(decodeURIComponent(pd5.dataset.vals||'[]'));
    charts.pd5=new Chart(pd5,{type:'bar',data:{labels:pd5l,datasets:[{data:pd5v,backgroundColor:pd5v.map(function(v){return v>=0?'#22c55e':'#ef4444';})}]},options:barOpts(cd)});
  }
  /* Performance — weekly */
  var pw=document.getElementById('perfWeekly');
  if(pw){
    var pwl=JSON.parse(decodeURIComponent(pw.dataset.labels||'[]')),pwv=JSON.parse(decodeURIComponent(pw.dataset.vals||'[]'));
    charts.pw=new Chart(pw,{type:'bar',data:{labels:pwl.map(function(w){return w.slice(5);}),datasets:[{data:pwv,backgroundColor:pwv.map(function(v){return v>=0?'#22c55e':'#ef4444';})}]},options:barOpts(cd)});
  }
  /* Performance — monthly */
  var pm=document.getElementById('perfMonthly');
  if(pm){
    var pml=JSON.parse(decodeURIComponent(pm.dataset.labels||'[]')),pmv=JSON.parse(decodeURIComponent(pm.dataset.vals||'[]'));
    charts.pm=new Chart(pm,{type:'bar',data:{labels:pml.map(function(m){return MON[parseInt(m.slice(5))-1];}),datasets:[{data:pmv,backgroundColor:pmv.map(function(v){return v>=0?'#22c55e':'#ef4444';})}]},options:barOpts(cd)});
  }
  /* Performance — time of day */
  var ptod=document.getElementById('perfTod');
  if(ptod){
    var ptv=JSON.parse(decodeURIComponent(ptod.dataset.vals||'[]'));
    charts.ptod=new Chart(ptod,{type:'bar',data:{labels:Array.from({length:24},function(_,i){return i+'h';}),datasets:[{data:ptv,backgroundColor:ptv.map(function(v){return v>=0?'#22c55e':'#ef4444';})}]},options:barOpts(cd)});
  }
  /* Performance — duration */
  var pdur=document.getElementById('perfDuration');
  if(pdur){
    var pdk=JSON.parse(decodeURIComponent(pdur.dataset.keys||'[]')),pdv=JSON.parse(decodeURIComponent(pdur.dataset.vals||'[]'));
    charts.pdur=new Chart(pdur,{type:'bar',data:{labels:pdk,datasets:[{data:pdv,backgroundColor:pdv.map(function(v){return v>=0?'#22c55e':'#ef4444';})}]},options:barOpts(cd)});
  }

  /* Portfolio — monthly bar (allCl) */
  var mb=document.getElementById('monthlyBarChart');
  if(mb){
    var mbm={};allCl.forEach(function(t){if(t.ts){var m=t.ts.slice(0,7);mbm[m]=(mbm[m]||0)+parseFloat(t.pnl||0);}});
    var mbk=Object.keys(mbm).sort().slice(-12),mbv=mbk.map(function(k){return+mbm[k].toFixed(2);});
    charts.mb=new Chart(mb,{type:'bar',data:{labels:mbk.map(function(m){return MON[parseInt(m.slice(5))-1];}),datasets:[{data:mbv,backgroundColor:mbv.map(function(v){return v>=0?'#22c55e':'#ef4444';})}]},options:barOpts(cd)});
  }

  /* FIX 4: Compare mini equity curves — colour = green if net positive, red if not */
  document.querySelectorAll('[id^="eq_"]').forEach(function(canvas){
    try{
      var ll=JSON.parse(decodeURIComponent(canvas.dataset.labels||'[]'));
      var vv=JSON.parse(decodeURIComponent(canvas.dataset.values||'[]'));
      if(!vv.length) return;
      var netPos=vv[vv.length-1]>=0;
      charts[canvas.id]=new Chart(canvas,{type:'line',data:{labels:ll,datasets:[{data:vv,
        borderColor:netPos?'#22c55e':'#ef4444',
        backgroundColor:netPos?'rgba(34,197,94,.1)':'rgba(239,68,68,.1)',
        fill:true,tension:.3,pointRadius:0,borderWidth:1.5}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:false}},scales:{x:{display:false},y:{display:false}}}});
    }catch(e){}
  });
}

setInterval(function(){if(document.visibilityState==='visible') loadData();},60000);
init();
</script>
</body>
</html>
