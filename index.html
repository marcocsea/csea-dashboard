<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CSEA Trading Intelligence v4.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
:root{--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--gold:#f59e0b;--cyan:#06b6d4;--purple:#a855f7;
      --bg1:#0a0e1a;--bg2:#111827;--bg3:#1f2937;--bg4:#374151;--border:#2d3748;--text:#e2e8f0;--sub:#9ca3af}

/* HEADER */
.header{background:linear-gradient(135deg,#0f172a,#1e1b4b);border-bottom:1px solid #312e81;padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.5px;white-space:nowrap}
.logo span{color:var(--gold)}
.badge{background:#312e81;color:#a5b4fc;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}
.status-dot.off{background:var(--red);box-shadow:0 0 6px var(--red)}
.status-txt{font-size:12px;color:var(--sub)}
.last-sync{font-size:11px;color:var(--sub)}
.acct-select-wrap{display:flex;align-items:center;gap:8px}
.acct-label{font-size:11px;color:var(--sub)}
.acct-select{background:#1e1b4b;border:1px solid #4338ca;color:#a5b4fc;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;outline:none;cursor:pointer;max-width:200px}

/* TABS */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto}
.tab{padding:12px 14px;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:#fff;border-bottom-color:var(--blue)}

/* MAIN */
.main{padding:24px;max-width:1400px;margin:0 auto}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .2s}
.kpi:hover{border-color:var(--blue)}
.kpi-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;color:#fff}
.kpi-value.green{color:var(--green)}.kpi-value.red{color:var(--red)}.kpi-value.gold{color:var(--gold)}.kpi-value.cyan{color:var(--cyan)}
.kpi-sub{font-size:11px;color:var(--sub);margin-top:4px}

/* CHART CARDS */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.charts-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px}
.charts-row-eq{display:grid;grid-template-columns:3fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:900px){.charts-row,.charts-row-3,.charts-row-eq{grid-template-columns:1fr}}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px}
.chart-title{font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.chart-wrap{position:relative;height:200px}
.chart-wrap-tall{position:relative;height:260px}
.chart-wrap-sm{position:relative;height:150px}

/* TABLE */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.table-title{font-size:14px;font-weight:600;color:#fff}
.count-badge{background:var(--bg3);color:var(--sub);padding:2px 8px;border-radius:4px;font-size:11px}
.filters{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:12px;outline:none}
.tbl-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0}
td{padding:10px 12px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--bg3);cursor:pointer}

/* BADGES */
.badge-buy{background:#14532d;color:#4ade80;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-sell{background:#450a0a;color:#f87171;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-opened{background:#14532d;color:#4ade80;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-blocked{background:#450a0a;color:#f87171;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-open{background:#1e3a5f;color:#60a5fa;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.pill{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;display:inline-block}
.pill-live{background:#14532d;color:#4ade80}.pill-demo{background:#1e1b4b;color:#a5b4fc}
.pill-mt4{background:#1e3a5f;color:#60a5fa}.pill-mt5{background:#1e1b4b;color:#a5b4fc}

/* ACCOUNT CARD */
.acct-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.acct-card-name{font-size:18px;font-weight:700;color:#fff}
.acct-card-sub{font-size:12px;color:var(--sub);margin-top:2px}
.acct-card-pills{display:flex;gap:6px;flex-wrap:wrap}

/* EMPTY / LOADING */
.empty-state{text-align:center;padding:60px 20px;color:var(--sub)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-msg{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px}
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:var(--sub)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.no-acct{text-align:center;padding:80px 20px}
.no-acct-icon{font-size:48px;margin-bottom:16px}
.no-acct-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px}
.no-acct-sub{font-size:14px;color:var(--sub)}

/* HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;padding:20px}
.tile{border:1px solid;border-radius:8px;padding:12px;text-align:center}
.tile-sym{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px}
.tile-wr{font-size:20px;font-weight:700;margin-bottom:2px}
.tile-wl{font-size:11px;color:var(--sub);margin-bottom:4px}
.tile-pnl{font-size:12px;font-weight:600}

/* CALENDAR */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:4px}
.cal-day{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.cal-day.hit{background:#14532d;color:#4ade80}
.cal-day.loss{background:#450a0a;color:#f87171}
.cal-day.nodata{background:var(--bg3);color:var(--sub)}
.cal-day.empty{background:transparent}

/* INSPECTOR */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none}
.overlay.open{display:block}
.inspector{position:fixed;right:-420px;top:0;bottom:0;width:420px;background:var(--bg2);border-left:1px solid var(--border);z-index:201;overflow-y:auto;transition:right .3s;padding:24px}
.inspector.open{right:0}
.insp-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px}
.insp-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px;padding-right:40px}
.insp-sub{font-size:12px;color:var(--sub);margin-bottom:20px}
.insp-section{margin-bottom:20px}
.insp-section-title{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.insp-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.insp-row .lbl{color:var(--sub)}.insp-row .val{color:#fff;font-weight:500;text-align:right}
.insp-pnl{font-size:28px;font-weight:700;margin:12px 0 4px}
.lifecycle-step{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.lifecycle-dot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0}
.lifecycle-label{font-size:12px;font-weight:600;color:#fff}
.lifecycle-time{font-size:11px;color:var(--sub)}
.lifecycle-detail{font-size:11px;color:var(--sub);margin-top:2px}
.news-flag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600}
.news-clean{background:#14532d;color:#4ade80}.news-warn{background:#713f12;color:#fbbf24}.news-risk{background:#450a0a;color:#f87171}
.insp-chart-wrap{height:120px;margin-top:8px}

/* COMPOUND TRACKER */
.compound-tracker{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px}
.compound-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.compound-title{font-size:14px;font-weight:600;color:var(--gold);display:flex;align-items:center;gap:8px}
.compound-day-badge{background:#451a03;color:var(--gold);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.compound-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:600px){.compound-grid{grid-template-columns:1fr 1fr}}
.compound-stat{text-align:center;padding:12px;background:var(--bg3);border-radius:8px}
.compound-stat-val{font-size:20px;font-weight:700;color:#fff}
.compound-stat-lbl{font-size:11px;color:var(--sub);margin-top:3px}
.progress-bar-wrap{margin-bottom:6px}
.progress-bar-track{height:10px;background:var(--bg3);border-radius:6px;overflow:hidden;position:relative}
.progress-bar-fill{height:100%;border-radius:6px;transition:width .5s}
.progress-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-top:4px}
.target-hit-banner{background:linear-gradient(135deg,#14532d,#166534);border:1px solid #22c55e;border-radius:8px;padding:14px 20px;text-align:center;color:#4ade80;font-size:16px;font-weight:700;margin-bottom:16px}

/* COMPARE */
.compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.compare-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px}
.compare-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.compare-card-name{font-size:15px;font-weight:700;color:#fff}
.compare-card-sub{font-size:11px;color:var(--sub);margin-top:2px}
.compare-kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.compare-kpi{background:var(--bg3);border-radius:6px;padding:8px 10px}
.compare-kpi-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.compare-kpi-value{font-size:16px;font-weight:700;color:#fff}
.compare-kpi-value.green{color:var(--green)}.compare-kpi-value.red{color:var(--red)}.compare-kpi-value.gold{color:var(--gold)}.compare-kpi-value.cyan{color:var(--cyan)}
.compare-eq-title{font-size:11px;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.compare-eq-wrap{height:80px;position:relative}
.compare-bar-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px}
.compare-section-title{font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.compare-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.compare-bar-label{font-size:12px;color:var(--sub);width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.compare-bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.compare-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.compare-bar-value{font-size:12px;font-weight:600;color:#fff;width:52px;text-align:right}

/* CURRENCY STRENGTH CHART */
.strength-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.strength-pill{display:flex;align-items:center;gap:5px;font-size:11px;cursor:pointer;padding:3px 8px;border-radius:12px;border:1px solid var(--border);transition:all .2s}
.strength-pill:hover{border-color:var(--blue)}
.strength-pill.inactive{opacity:.35}
.strength-dot{width:8px;height:8px;border-radius:50%}

/* POSITIONS */
.pos-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px}
.float-pnl-positive{color:var(--green);font-weight:700}
.float-pnl-negative{color:var(--red);font-weight:700}
</style>
</head>
<body>

<div class="header">
  <div class="logo">CSEA <span>Intelligence</span></div>
  <div class="badge">v4.0</div>
  <div class="acct-select-wrap">
    <span class="acct-label">Account:</span>
    <select class="acct-select" id="acctSelect" onchange="onAccountChange(this.value)">
      <option value="">— Select account —</option>
    </select>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-txt" id="statusTxt">Connecting...</span>
    <span class="last-sync" id="lastSync"></span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('overview',this)">Overview</button>
  <button class="tab" onclick="setTab('positions',this)">Positions</button>
  <button class="tab" onclick="setTab('compound',this)">⚡ Compound</button>
  <button class="tab" onclick="setTab('trades',this)">Trades</button>
  <button class="tab" onclick="setTab('signals',this)">Signals</button>
  <button class="tab" onclick="setTab('strength',this)">Strength History</button>
  <button class="tab" onclick="setTab('daily',this)">Daily</button>
  <button class="tab" onclick="setTab('heatmap',this)">Pair Heatmap</button>
  <button class="tab" onclick="setTab('compare',this)">Compare</button>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div><span>Loading accounts...</span></div>
</div>

<div class="overlay" id="overlay" onclick="closeInspector()"></div>
<div class="inspector" id="inspector">
  <button class="insp-close" onclick="closeInspector()">✕</button>
  <div id="inspContent"></div>
</div>

<script>
const SUPA_URL='https://nmyveijljquxvhjelqbc.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teXZlaWpsanF1eHZoamVscWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjc2MjgsImV4cCI6MjA4Nzk0MzYyOH0.YT-sAh2Spn1805dnylTsZ2gBx-T7yC6fyOKIs0YPlP4';

let db={trades:[],signals:[],daily:[],accounts:[],positions:[]};
let currentTab='overview',charts={};
let filterSym='ALL',filterDir='ALL',filterResult='ALL';
let selectedAccountId='',selectedAccount=null;
let allAccountsData={};
// strength chart: which currencies are toggled on
let strengthVisible={EUR:true,GBP:true,AUD:true,NZD:true,USD:true,CAD:true,CHF:true,JPY:true};

// ── PAGINATED FETCH ──────────────────────────────────────────────
async function query(table,params=''){
  const PAGE=1000; let all=[],from=0;
  while(true){
    const r=await fetch(`${SUPA_URL}/rest/v1/${table}?${params}&limit=${PAGE}&offset=${from}`,{
      headers:{apikey:SUPA_KEY,Authorization:`Bearer ${SUPA_KEY}`,'Range-Unit':'items',Range:`${from}-${from+PAGE-1}`}
    });
    if(!r.ok) throw new Error(`${table}: ${r.status}`);
    const page=await r.json();
    all=all.concat(page);
    if(page.length<PAGE) break;
    from+=PAGE;
  }
  return all;
}

async function queryPositions(acctId){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/open_positions?account_id=eq.${acctId}&limit=100`,{
      headers:{apikey:SUPA_KEY,Authorization:`Bearer ${SUPA_KEY}`}
    });
    if(!r.ok) return [];
    return r.json();
  }catch(e){return [];}
}

// ── INIT ─────────────────────────────────────────────────────────
async function init(){
  try{
    const accounts=await query('accounts','order=user_id.asc');
    db.accounts=accounts;
    const sel=document.getElementById('acctSelect');
    sel.innerHTML='<option value="">— Select account —</option>';
    accounts.forEach(a=>{
      const label=a.user_id||a.account_number||a.id.slice(0,8);
      const type=a.account_type?` [${a.account_type.toUpperCase()}]`:'';
      const opt=document.createElement('option');
      opt.value=a.id; opt.textContent=label+type;
      sel.appendChild(opt);
    });
    // Background-load ALL accounts for Compare tab
    accounts.forEach(a=>prefetchAccount(a.id));
    const saved=localStorage.getItem('csea_account_id');
    if(saved&&accounts.find(a=>a.id===saved)){sel.value=saved;await onAccountChange(saved);}
    else if(accounts.length===1){sel.value=accounts[0].id;await onAccountChange(accounts[0].id);}
    else showNoAccountSelected();
    document.getElementById('statusDot').className='status-dot';
    document.getElementById('statusTxt').textContent='Live';
  }catch(e){
    document.getElementById('statusDot').className='status-dot off';
    document.getElementById('statusTxt').textContent='Error';
    document.getElementById('main').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-msg">Could not connect to Supabase</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

async function prefetchAccount(id){
  if(allAccountsData[id]) return;
  try{
    const filter=`account_id=eq.${id}`;
    const [trades,daily]=await Promise.all([
      query('trades',filter+'&order=ts.asc'),
      query('daily',filter+'&order=date.asc')
    ]);
    allAccountsData[id]={trades,daily};
  }catch(e){}
}

async function onAccountChange(id){
  if(!id){selectedAccountId='';selectedAccount=null;showNoAccountSelected();return;}
  selectedAccountId=id;
  selectedAccount=db.accounts.find(a=>a.id===id)||null;
  localStorage.setItem('csea_account_id',id);
  await loadAccountData(id);
}

async function loadAccountData(id){
  document.getElementById('main').innerHTML='<div class="loading"><div class="spinner"></div><span>Loading data...</span></div>';
  try{
    const filter=`account_id=eq.${id}`;
    const [trades,signals,daily,positions]=await Promise.all([
      query('trades',filter+'&order=ts.asc'),
      query('signals',filter+'&order=ts.asc'),
      query('daily',filter+'&order=date.asc'),
      queryPositions(id)
    ]);
    db.trades=trades; db.signals=signals; db.daily=daily; db.positions=positions;
    allAccountsData[id]={trades,daily};
    document.getElementById('lastSync').textContent='Synced '+new Date().toLocaleTimeString();
    filterSym='ALL';filterDir='ALL';filterResult='ALL';
    render();
  }catch(e){
    document.getElementById('main').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-msg">Error loading data</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

async function refresh(){
  if(!selectedAccountId||document.visibilityState!=='visible') return;
  await loadAccountData(selectedAccountId);
}

function showNoAccountSelected(){
  document.getElementById('main').innerHTML=`<div class="no-acct"><div class="no-acct-icon">👆</div><div class="no-acct-title">Select an account</div><div class="no-acct-sub">Choose an account from the dropdown above to view its trading data.</div></div>`;
}

// ── TAB + RENDER ─────────────────────────────────────────────────
function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render(){
  destroyCharts();
  const m=document.getElementById('main');
  if(currentTab==='compare'){m.innerHTML=renderCompare();afterRender();return;}
  if(!selectedAccountId){showNoAccountSelected();return;}
  if(currentTab==='overview')  m.innerHTML=renderOverview();
  else if(currentTab==='positions') m.innerHTML=renderPositions();
  else if(currentTab==='compound')  m.innerHTML=renderCompound();
  else if(currentTab==='trades')    m.innerHTML=renderTrades();
  else if(currentTab==='signals')   m.innerHTML=renderSignals();
  else if(currentTab==='strength')  m.innerHTML=renderStrengthHistory();
  else if(currentTab==='daily')     m.innerHTML=renderDaily();
  else if(currentTab==='heatmap')   m.innerHTML=renderHeatmap();

function getClosedTrades(trades,daily){
  const t=trades||db.trades, d=daily||db.daily;
  const openTickets=new Set(t.filter(x=>x.event==='OPEN').map(x=>x.ticket));
  const closed=t.filter(x=>x.event==='CLOSE'||x.event==='PARTIAL');
  return closed.map(c=>{
    const open=t.find(x=>x.ticket===c.ticket&&x.event==='OPEN');
    const partial=t.find(x=>x.ticket===c.ticket&&x.event==='PARTIAL');
    const bal=c.balance||0;
    // find balance from daily table for the close date
    const closeDate=c.ts?(c.ts+'').substring(0,10):'';
    const dayRow=d.find(x=>x.date===closeDate);
    return{
      ticket:c.ticket, symbol:c.symbol||open?.symbol,
      direction:c.direction||open?.direction,
      lot:open?.lot||c.lot,
      entry:open?.price||c.price,
      sl:open?.sl||c.sl, tp:open?.tp||c.tp,
      strong_cur:open?.strong_cur||c.strong_cur,
      weak_cur:open?.weak_cur||c.weak_cur,
      gap:open?.gap||c.gap,
      ts:open?.ts||c.ts,
      closeTime:c.ts,
      closePnL:c.pnl||0,
      balance:bal,
      event:c.event,
      hasPartial:!!partial,
      _openRaw:open, _closeRaw:c, _partialRaw:partial
    };
  }).filter(x=>x.symbol);
}

function getOpenPositions(){
  // Merge open_positions table + OPEN events not yet closed
  const fromTable=db.positions||[];
  const closedTickets=new Set(db.trades.filter(x=>x.event==='CLOSE').map(x=>x.ticket));
  const fromTrades=db.trades.filter(x=>x.event==='OPEN'&&!closedTickets.has(x.ticket));
  const merged=new Map();
  fromTable.forEach(p=>merged.set(p.ticket,{ticket:p.ticket,symbol:p.symbol,direction:p.direction,lot:p.volume||p.lot,entry:p.price_open||p.entry,sl:p.sl,tp:p.tp,pnl:p.pnl,ts:p.ts,strong_cur:p.strong_cur,weak_cur:p.weak_cur,gap:p.gap}));
  fromTrades.forEach(t=>{if(!merged.has(t.ticket))merged.set(t.ticket,{ticket:t.ticket,symbol:t.symbol,direction:t.direction,lot:t.lot,entry:t.price||t.entry,sl:t.sl,tp:t.tp,pnl:t.pnl,ts:t.ts,strong_cur:t.strong_cur,weak_cur:t.weak_cur,gap:t.gap});});
  return Array.from(merged.values());
}

function getNewsFlag(trade){
  if(!trade.ts||!trade.strong_cur) return{icon:'🟢',label:'Clean',cls:'news-clean'};
  const openTime=new Date(trade.ts).getTime();
  const nearby=db.signals.filter(s=>{
    if(s.result!=='BLOCKED') return false;
    if(!s.block_reason||!s.block_reason.toLowerCase().includes('news')) return false;
    const diff=Math.abs(new Date(s.ts).getTime()-openTime);
    return diff<4*3600000;
  });
  if(nearby.length>0) return{icon:'🔴',label:'Near News Block',cls:'news-risk'};
  const near2=db.signals.filter(s=>{
    if(s.result!=='BLOCKED') return false;
    const diff=Math.abs(new Date(s.ts).getTime()-openTime);
    return diff<2*3600000;
  });
  if(near2.length>1) return{icon:'🟡',label:'Activity Near Open',cls:'news-warn'};
  return{icon:'🟢',label:'Clean',cls:'news-clean'};
}

// ── STATS ────────────────────────────────────────────────────────
function calcStats(trades,daily){
  const t=trades||db.trades, d=daily||db.daily;
  const closed=getClosedTrades(t,d);
  if(!closed.length&&!d.length) return null;
  let wins=0,losses=0,totalWin=0,totalLoss=0;
  closed.forEach(c=>{const p=parseFloat(c.closePnL||0);if(p>0){wins++;totalWin+=p;}else if(p<0){losses++;totalLoss+=Math.abs(p);}});
  const totalPnL=totalWin-totalLoss;
  const winRate=closed.length?(wins/closed.length*100):0;
  const avgWin=wins?totalWin/wins:0;
  const avgLoss=losses?totalLoss/losses:0;
  const profitFactor=totalLoss>0?totalWin/totalLoss:totalWin>0?999:0;
  const rr=avgLoss>0?avgWin/avgLoss:avgWin>0?999:0;
  // Max drawdown from equity
  let peak=0,maxDD=0;
  const bals=d.map(x=>parseFloat(x.end_balance||0)).filter(x=>x>0);
  bals.forEach(b=>{if(b>peak)peak=b;const dd=peak>0?(peak-b)/peak*100:0;if(dd>maxDD)maxDD=dd;});
  let mxW=0,mxL=0,cW=0,cL=0;
  closed.forEach(t=>{if(t.closePnL>0){cW++;cL=0;mxW=Math.max(mxW,cW);}else{cL++;cW=0;mxL=Math.max(mxL,cL);}});
  let lastBal=d.length?parseFloat(d[d.length-1].end_balance||0):0;
  if(!lastBal&&closed.length) lastBal=parseFloat(closed[closed.length-1].balance||0);
  const lastDay=d.length?d[d.length-1]:null;
  const targetDays=d.filter(x=>x.target_hit).length;
  return{closed,wins,losses,winRate,totalPnL,avgWin,avgLoss,profitFactor,rr,maxDD,
         maxWinStreak:mxW,maxLoseStreak:mxL,lastBal,lastDay,targetDays};
}

  const news=getNewsFlag(t);

  // Build full lifecycle
  const allEvents=db.trades.filter(x=>x.ticket===t.ticket).sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const steps=allEvents.map(e=>{
    const dotColor=e.event==='OPEN'?'#60a5fa':e.event==='CLOSE'?'#22c55e':e.event==='PARTIAL'?'#f59e0b':'#a855f7';

      <div class="insp-row"><span class="lbl">Entry Price</span><span class="val">${parseFloat(t.entry||0).toFixed(5)}</span></div>
      <div class="insp-row"><span class="lbl">Stop Loss</span><span class="val" style="color:var(--red)">${parseFloat(t.sl||0).toFixed(5)}</span></div>
      <div class="insp-row"><span class="lbl">Take Profit</span><span class="val" style="color:var(--green)">${parseFloat(t.tp||0).toFixed(5)}</span></div>
      <div class="insp-row"><span class="lbl">Balance After</span><span class="val">$${parseFloat(t.balance||0).toFixed(2)}</span></div>
    </div>
    <div class="insp-section">

      <div class="insp-row"><span class="lbl">Strong Currency</span><span class="val" style="color:var(--green)">${t.strong_cur||'—'}</span></div>

// ── STRENGTH HISTORY ──────────────────────────────────────────────
function renderStrengthHistory(){
  if(!db.signals.length) return `<div class="empty-state"><div class="empty-icon">📈</div><div class="empty-msg">No signal data to reconstruct strength history</div><div class="empty-sub">Strength history is built from the signals log — it will appear after the EA has been running for a while.</div></div>`;
  // Build per-bar strength map from signals (most recent N bars)
  const BARS=120;
  // Group signals by timestamp (bar open)
  const byBar={};
  db.signals.forEach(s=>{
    if(!s.ts) return;
    const k=(s.ts+'').substring(0,13); // hour key
    if(!byBar[k]) byBar[k]={ts:s.ts};
    // store strongest/weakest seen for this bar
    if(s.strong_cur) byBar[k][s.strong_cur+'_strong']=(byBar[k][s.strong_cur+'_strong']||0)+parseFloat(s.gap||0);
    if(s.weak_cur)   byBar[k][s.weak_cur+'_weak']=(byBar[k][s.weak_cur+'_weak']||0)+parseFloat(s.gap||0);
    if(s.gap) byBar[k]['maxGap']=Math.max(byBar[k]['maxGap']||0,parseFloat(s.gap));
  });
  // Also try to pull actual strength values from trades (strong_cur, weak_cur, gap proxy)
  // Build a time-series from signals by reconstructing implied relative strengths via gap + direction
  const CURRENCIES=['EUR','GBP','AUD','NZD','USD','CAD','CHF','JPY'];
  const COLORS=['#3b82f6','#f59e0b','#22c55e','#06b6d4','#a855f7','#ef4444','#f97316','#ec4899'];
  const bars=Object.keys(byBar).sort().slice(-BARS);
  const labels=bars.map(k=>k.substring(5,13));
  // For each currency, build a score: +gap when strong, -gap when weak
  const series={};
  CURRENCIES.forEach(c=>{series[c]=[];});
  bars.forEach(k=>{
    CURRENCIES.forEach(c=>{
      const s=(byBar[k][c+'_strong']||0);
      const w=(byBar[k][c+'_weak']||0);
      // net score: strong = negative (per indicator convention), weak = positive
      series[c].push(parseFloat((s-w).toFixed(3)));
    });
  });
  const pills=CURRENCIES.map((c,i)=>`<div class="strength-pill${strengthVisible[c]?'':' inactive'}" onclick="toggleStrength('${c}')" style="border-color:${COLORS[i]}22">
    <div class="strength-dot" style="background:${COLORS[i]}"></div><span>${c}</span>
  </div>`).join('');
  return `
  <div class="chart-card" style="margin-bottom:24px">
    <div class="chart-title">Currency Strength History <span style="font-size:10px;color:var(--sub);font-weight:400;text-transform:none">(reconstructed from signals — last ${bars.length} bars)</span></div>
    <div class="strength-legend" id="strengthLegend">${pills}</div>
    <div style="position:relative;height:320px"><canvas id="strengthChart"
      data-labels='${JSON.stringify(labels)}'
      data-series='${JSON.stringify(series)}'
      data-currencies='${JSON.stringify(CURRENCIES)}'
      data-colors='${JSON.stringify(COLORS)}'></canvas></div>
  </div>
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Average Gap by Hour of Day</div>
      <div class="chart-wrap"><canvas id="gapByHourChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Signal Frequency by Pair</div>
      <div class="chart-wrap"><canvas id="sigByPairChart"></canvas></div>
    </div>
  </div>`;
}

function toggleStrength(cur){
  strengthVisible[cur]=!strengthVisible[cur];
  render();
}

function renderCalendar(){
  const map={};
  db.daily.forEach(d=>{map[d.date]=d;});
  if(!db.daily.length) return '<div style="padding:20px;color:var(--sub)">No data</div>';
  const first=new Date(db.daily[0].date),last=new Date(db.daily[db.daily.length-1].date);
  let html='<div class="calendar">';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>{html+=`<div style="text-align:center;font-size:10px;color:var(--sub);padding:4px">${d}</div>`;});
  let dow=(first.getDay()+6)%7;
  for(let i=0;i<dow;i++) html+='<div class="cal-day empty"></div>';
  const cur=new Date(first);
  while(cur<=last){
    const key=cur.toISOString().slice(0,10),d=map[key];
    if(d){const pnl=parseFloat(d.daily_pnl||0);const cls=d.target_hit?'hit':pnl<0?'loss':'nodata';html+=`<div class="cal-day ${cls}" title="${key}: ${pnl>=0?'+':''}${pnl.toFixed(2)}">${cur.getDate()}</div>`;}
    else html+=`<div class="cal-day nodata">${cur.getDate()}</div>`;
    cur.setDate(cur.getDate()+1);
  }
  return html+'</div>';
}

// ── HEATMAP ───────────────────────────────────────────────────────
function renderHeatmap(){
  const closed=getClosedTrades();
  if(!closed.length) return `<div class="empty-state"><div class="empty-icon">🔥</div><div class="empty-msg">No trade data yet</div></div>`;
  const map={};
  closed.forEach(t=>{
    if(!t.symbol) return;
    if(!map[t.symbol]) map[t.symbol]={sym:t.symbol,count:0,wins:0,pnl:0};
    map[t.symbol].count++;
    if(t.closePnL>0) map[t.symbol].wins++;
    map[t.symbol].pnl+=parseFloat(t.closePnL||0);
  });
  const pairs=Object.values(map).sort((a,b)=>b.pnl-a.pnl);
  return `
  <div class="table-card">
    <div class="table-header"><span class="table-title">Pair Performance</span><span class="count-badge">${pairs.length} pairs</span></div>
    <div class="heatmap">${pairs.map(p=>{
      const wr=p.count?p.wins/p.count*100:0;
      const bg=wr>=60?'#14532d':wr>=50?'#1a2a1a':wr>=40?'#2a2a1a':'#2a1a1a';
      const tc=wr>=60?'#22c55e':wr>=50?'#86efac':wr>=40?'#f59e0b':'#ef4444';
      return `<div class="tile" style="background:${bg};border-color:${tc}44">
        <div class="tile-sym">${p.sym}</div>
        <div class="tile-wr" style="color:${tc}">${wr.toFixed(0)}%</div>
        <div class="tile-wl">${p.wins}W / ${p.count-p.wins}L</div>
        <div class="tile-pnl" style="color:${p.pnl>=0?'var(--green)':'var(--red)'}">${p.pnl>=0?'+':''}${p.pnl.toFixed(2)}</div>
      </div>`;
    }).join('')}</div>
  </div>`;
}

// ── COMPARE ───────────────────────────────────────────────────────
function renderCompare(){
  const accounts=db.accounts;
  if(!accounts.length) return `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-msg">No accounts found</div></div>`;
  const statsList=accounts.map(a=>{
    const cached=allAccountsData[a.id];
    return{account:a,stats:cached?calcStats(cached.trades,cached.daily):null};
  });
  const colors=['#3b82f6','#22c55e','#f59e0b','#a855f7','#ef4444'];
  const withData=statsList.filter(x=>x.stats);
  let barSection='';
  if(withData.length>=2){
    const metrics=[
      {key:'winRate',label:'Win Rate',fmt:v=>v.toFixed(1)+'%',max:100},
      {key:'profitFactor',label:'Profit Factor',fmt:v=>v.toFixed(2),max:Math.max(...withData.map(x=>x.stats.profitFactor),2)},
      {key:'rr',label:'R:R Ratio',fmt:v=>v.toFixed(2),max:Math.max(...withData.map(x=>x.stats.rr),2)},
      {key:'totalPnL',label:'Total P&L',fmt:v=>(v>=0?'+':'')+v.toFixed(2),max:Math.max(...withData.map(x=>Math.abs(x.stats.totalPnL)),1)}
    ];
    barSection=`<div class="compare-bar-section"><div class="compare-section-title">Side-by-Side Comparison</div>
      ${metrics.map(m=>`<div style="margin-bottom:20px">
        <div style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${m.label}</div>
        ${withData.map(({account:a,stats:s},i)=>{
          const val=s[m.key]||0,pct=Math.min(100,Math.max(0,(Math.abs(val)/m.max)*100));
          return `<div class="compare-bar-row">
            <div class="compare-bar-label">${a.user_id||'Acct'}</div>
            <div class="compare-bar-track"><div class="compare-bar-fill" style="width:${pct}%;background:${colors[i%colors.length]}"></div></div>
            <div class="compare-bar-value">${m.fmt(val)}</div>
          </div>`;
        }).join('')}
      </div>`).join('')}
    </div>`;
  }
  const notLoaded=statsList.filter(x=>!x.stats);
  const hint=notLoaded.length?`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:12px;color:var(--sub)">⏳ Loading data for ${notLoaded.length} account(s) in background…</div>`:'';
  const cards=statsList.map(({account:a,stats:s},ai)=>{
    const name=a.user_id||'Account',broker=a.broker||'',acctNo=a.account_number?`#${a.account_number}`:'';
    const type=a.account_type||'';
    const typePill=type==='live'?'<span class="pill pill-live">● LIVE</span>':'<span class="pill pill-demo">● DEMO</span>';
    if(!s) return `<div class="compare-card" style="opacity:.5"><div class="compare-card-header"><div><div class="compare-card-name">${name}</div><div class="compare-card-sub">${[broker,acctNo].filter(Boolean).join(' · ')}</div></div>${typePill}</div><div style="color:var(--sub);font-size:12px;padding:20px 0 10px">Loading…</div></div>`;
    const eqId=`eq_${a.id.replace(/-/g,'').substring(0,8)}`;
    const eqData=allAccountsData[a.id]?.daily.map(d=>parseFloat(d.end_balance||0)).filter(x=>x>0)||[];
    const eqLabels=allAccountsData[a.id]?.daily.map(d=>d.date.slice(5))||[];
    return `<div class="compare-card" style="border-color:${colors[ai%colors.length]}33">
      <div class="compare-card-header">
        <div><div class="compare-card-name">${name}</div><div class="compare-card-sub">${[broker,acctNo].filter(Boolean).join(' · ')}</div></div>
        <div style="display:flex;gap:4px">${typePill}</div>
      </div>
      <div class="compare-kpis">
        <div class="compare-kpi"><div class="compare-kpi-label">Total P&L</div><div class="compare-kpi-value ${s.totalPnL>=0?'green':'red'}">${s.totalPnL>=0?'+':''}${s.totalPnL.toFixed(2)}</div></div>
        <div class="compare-kpi"><div class="compare-kpi-label">Win Rate</div><div class="compare-kpi-value ${s.winRate>=50?'green':'red'}">${s.winRate.toFixed(1)}%</div></div>
        <div class="compare-kpi"><div class="compare-kpi-label">Profit Factor</div><div class="compare-kpi-value ${s.profitFactor>=1?'green':'red'}">${s.profitFactor.toFixed(2)}</div></div>
        <div class="compare-kpi"><div class="compare-kpi-label">Max DD</div><div class="compare-kpi-value ${s.maxDD>20?'red':s.maxDD>10?'gold':'green'}">${s.maxDD.toFixed(1)}%</div></div>
        <div class="compare-kpi"><div class="compare-kpi-label">Trades</div><div class="compare-kpi-value cyan">${s.closed.length}</div></div>
        <div class="compare-kpi"><div class="compare-kpi-label">R:R</div><div class="compare-kpi-value ${s.rr>=1?'green':'red'}">${s.rr.toFixed(2)}</div></div>
      </div>
      <div class="compare-eq-title">Equity Curve</div>
      <div class="compare-eq-wrap"><canvas id="${eqId}" data-labels='${JSON.stringify(eqLabels)}' data-values='${JSON.stringify(eqData)}' data-color='${colors[ai%colors.length]}'></canvas></div>
    </div>`;
  }).join('');
  return hint+barSection+`<div class="compare-grid">${cards}</div>`;
}

      if(!s.ts||!s.gap) return;
      const h=parseInt((s.ts+'').substring(11,13),10);
      if(!hourMap[h]) hourMap[h]={sum:0,cnt:0};
      hourMap[h].sum+=parseFloat(s.gap); hourMap[h].cnt++;
    });
    const hours=Array.from({length:24},(_,i)=>i);
    const avgs=hours.map(h=>hourMap[h]?(hourMap[h].sum/hourMap[h].cnt):0);
    charts.gh=new Chart(gh,{type:'bar',data:{labels:hours.map(h=>h+':00'),datasets:[{data:avgs,backgroundColor:'#3b82f688',borderRadius:2}]},options:{...cdBase}});
  }

  // ── Strength: sig freq by pair ──
  const sbp=document.getElementById('sigByPairChart');
  if(sbp&&db.signals.length){
    const pairMap={};
    db.signals.forEach(s=>{if(s.symbol){pairMap[s.symbol]=(pairMap[s.symbol]||0)+1;}});
    const sorted=Object.entries(pairMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
    charts.sbp=new Chart(sbp,{type:'bar',data:{labels:sorted.map(x=>x[0]),datasets:[{data:sorted.map(x=>x[1]),backgroundColor:'#06b6d488',borderRadius:2}]},options:{...cdBase}});
  }

  // ── Compare: mini equity canvases ──
  document.querySelectorAll('[id^="eq_"]').forEach(canvas=>{
    try{
      const labels=JSON.parse(canvas.dataset.labels||'[]');
      const values=JSON.parse(canvas.dataset.values||'[]');
      const color=canvas.dataset.color||'#3b82f6';
      if(!values.length) return;
      charts[canvas.id]=new Chart(canvas,{type:'line',data:{labels,datasets:[{data:values,borderColor:color,backgroundColor:color+'18',fill:true,tension:.3,pointRadius:0,borderWidth:1.5}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}});
    }catch(e){}
  });
}

init();
setInterval(refresh,60000);
</script>
</body>
</html>
