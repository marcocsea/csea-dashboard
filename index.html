<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CSEA Trading Intelligence v5.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#1e293b;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
:root{--blue:#3b82f6;--green:#16a34a;--red:#dc2626;--gold:#d97706;--cyan:#0891b2;--purple:#7c3aed;
  --bg1:#f1f5f9;--bg2:#fff;--bg3:#f8fafc;--border:#e2e8f0;--text:#1e293b;--sub:#64748b}
/* HEADER */
.header{background:linear-gradient(135deg,#1e3a5f,#1e1b4b);padding:0 20px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.logo{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.5px;white-space:nowrap}.logo span{color:#d97706}
.badge{background:rgba(255,255,255,.15);color:#bfdbfe;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.mode-toggle{display:flex;background:rgba(0,0,0,.25);border-radius:7px;padding:3px;gap:2px;margin-left:6px}
.mode-btn{padding:4px 12px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;border:none;color:#93c5fd;background:transparent;transition:all .2s;white-space:nowrap}
.mode-btn.active{background:#1e40af;color:#fff}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#22c55e;box-shadow:0 0 6px #22c55e}
.status-dot.off{background:#ef4444;box-shadow:0 0 6px #ef4444}
.status-txt,.last-sync{font-size:11px;color:#bfdbfe;white-space:nowrap}
.acct-label{font-size:11px;color:#93c5fd;white-space:nowrap}
.acct-select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:4px 8px;border-radius:6px;font-size:12px;font-weight:600;outline:none;cursor:pointer;max-width:180px}
.acct-select option{background:#1e3a5f;color:#fff}
/* DAY STRIP */
.day-strip{background:linear-gradient(135deg,#0f172a,#1e1b4b);border-bottom:1px solid #312e81;padding:7px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:52px;z-index:199}
.ds-item{display:flex;flex-direction:column;gap:1px}
.ds-label{font-size:9px;color:#818cf8;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.ds-value{font-size:13px;font-weight:700;color:#fff}
.ds-value.green{color:#4ade80}.ds-value.red{color:#f87171}.ds-value.gold{color:#fbbf24}
.ds-sep{width:1px;height:30px;background:#312e81;flex-shrink:0}
.ds-progress{flex:1;min-width:200px}
.progress-label{display:flex;justify-content:space-between;font-size:10px;color:#a5b4fc;margin-bottom:4px}
.progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#16a34a,#4ade80);transition:width .5s}
.progress-fill.hit{background:linear-gradient(90deg,#d97706,#fbbf24)}
/* DATE BAR */
.date-bar{background:#fff;border-bottom:1px solid var(--border);padding:7px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-bar-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.preset-btns{display:flex;gap:3px;flex-wrap:wrap}
.preset{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--sub);transition:all .15s}
.preset:hover{border-color:var(--blue);color:var(--blue)}
.preset.active{background:#eff6ff;border-color:var(--blue);color:var(--blue)}
.date-inputs{display:flex;align-items:center;gap:5px}
.date-inputs input{padding:3px 7px;border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text);outline:none;background:var(--bg3)}
.date-sep{color:var(--sub);font-size:11px}
.range-count{margin-left:auto;font-size:11px;color:var(--sub);white-space:nowrap;background:var(--bg3);padding:2px 9px;border-radius:5px;border:1px solid var(--border)}
/* TABS */
.tabs{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:10px 14px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;transition:all .15s;white-space:nowrap}
.tab:hover{color:#1e293b}.tab.active{color:#1e40af;border-bottom-color:#3b82f6}
/* MAIN */
.main{padding:18px;max-width:1400px;margin:0 auto}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kpi-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:20px;font-weight:700;color:#1e293b}
.kpi-value.green{color:var(--green)}.kpi-value.red{color:var(--red)}.kpi-value.gold{color:var(--gold)}.kpi-value.cyan{color:var(--cyan)}.kpi-value.purple{color:var(--purple)}
.kpi-sub{font-size:10px;color:var(--sub);margin-top:2px}
/* CHARTS */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:18px}
.charts-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.charts-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.chart-title{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.chart-wrap{position:relative;height:180px}
/* TABLES */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.table-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.table-title{font-size:14px;font-weight:700;color:#1e293b}
.count-badge{background:var(--bg3);color:var(--sub);padding:2px 7px;border-radius:4px;font-size:11px;border:1px solid var(--border)}
.filters{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.filters select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 7px;border-radius:6px;font-size:12px;outline:none}
.btn{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--sub);transition:all .15s}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn-green{border-color:var(--green);color:var(--green)}.btn-green:hover{background:#dcfce7}
.tbl-wrap{overflow-x:auto;max-height:400px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:8px 11px;text-align:left;font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;border-bottom:1px solid var(--border)}
td{padding:8px 11px;border-bottom:1px solid var(--border);color:#334155}
tr:hover td{background:#f8fafc;cursor:pointer}
/* BADGES */
.badge-buy{background:#dcfce7;color:#16a34a;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.badge-sell{background:#fee2e2;color:#dc2626;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.badge-open{background:#dcfce7;color:#16a34a;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.badge-closed{background:#eff6ff;color:#2563eb;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.badge-partial{background:#fef9c3;color:#d97706;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.badge-opened{background:#dcfce7;color:#16a34a;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.badge-blocked{background:#fee2e2;color:#dc2626;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.pill{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.pill-demo{background:#dbeafe;color:#1d4ed8}.pill-live{background:#dcfce7;color:#16a34a}
.pill-mt5{background:#ede9fe;color:#7c3aed}.pill-mt4{background:#fef3c7;color:#b45309}
/* HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:18px}
.tile{border:1px solid transparent;border-radius:8px;padding:12px 8px;text-align:center;cursor:pointer;transition:transform .15s}
.tile:hover{transform:scale(1.04)}
.tile-sym{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:3px}
.tile-wr{font-size:11px;font-weight:600}
.tile-pnl{font-size:12px;font-weight:700}
/* CURRENCY STRENGTH */
.cur-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:18px}
.cur-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.cur-name{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cur-flag{font-size:16px}
.cur-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border)}
.cur-row:last-child{border-bottom:none}
.cur-row span:first-child{color:var(--sub)}
/* POSITIONS */
.float-bar{background:linear-gradient(135deg,#1e1b4b,#0f172a);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.float-label{font-size:10px;color:#a5b4fc;text-transform:uppercase;letter-spacing:.5px}
.float-value{font-size:22px;font-weight:700}
/* COMPARE */
.compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:18px}
.compare-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.compare-card-hdr{background:linear-gradient(135deg,#1e1b4b,#0f172a);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.compare-card-name{font-size:13px;font-weight:700;color:#fff}
.compare-kpis{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.compare-kpi{background:var(--bg2);padding:10px 12px}
.compare-kpi-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.compare-kpi-value{font-size:16px;font-weight:700;color:#1e293b}
.compare-kpi-value.green{color:var(--green)}.compare-kpi-value.red{color:var(--red)}.compare-kpi-value.gold{color:var(--gold)}.compare-kpi-value.cyan{color:var(--cyan)}
.compare-equity{padding:12px 16px;border-top:1px solid var(--border)}
.compare-eq-title{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.compare-eq-wrap{height:60px;position:relative}
/* INSPECTOR */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500}
.overlay.open{display:block}
.inspector{position:fixed;right:-420px;top:0;bottom:0;width:380px;background:#fff;z-index:501;box-shadow:-4px 0 24px rgba(0,0,0,.15);transition:right .3s;overflow-y:auto;padding:20px}
.inspector.open{right:0}
.insp-close{position:absolute;top:14px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#64748b}
.insp-title{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:2px;margin-top:8px}
.insp-sub{font-size:12px;color:var(--sub);margin-bottom:14px}
.insp-section{margin-bottom:14px;border:1px solid var(--border);border-radius:8px;padding:12px}
.insp-section-title{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.insp-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.insp-row .lbl{color:var(--sub)}.insp-row .val{color:#1e293b;font-weight:500}
.news-flag{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:5px;font-size:12px;font-weight:600;margin-top:5px}
.news-clean{background:#dcfce7;color:#16a34a}.news-warn{background:#fef9c3;color:#d97706}.news-risk{background:#fee2e2;color:#dc2626}
/* STREAK */
.streak-bar{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.streak-dot{width:14px;height:14px;border-radius:3px}
/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--sub)}
.empty-icon{font-size:40px;margin-bottom:10px}.empty-msg{font-size:14px}
/* ACCT CARD */
.acct-banner{background:linear-gradient(135deg,#1e1b4b,#0f172a);border:1px solid #312e81;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.acct-banner-name{font-size:14px;font-weight:700;color:#fff}
.acct-banner-sub{font-size:11px;color:#a5b4fc;margin-top:2px}
.edit-name-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#a5b4fc;padding:3px 10px;border-radius:5px;font-size:11px;cursor:pointer}
.edit-name-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.edit-name-input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 10px;border-radius:5px;font-size:13px;outline:none}
/* RESPONSIVE */
@media(max-width:768px){
  .hdr-right .status-txt,.hdr-right .last-sync{display:none}
  .charts-row{grid-template-columns:1fr}
  .charts-row-2,.charts-row-3{grid-template-columns:1fr}
  .day-strip{gap:10px}
  .ds-sep{display:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">CSEA <span>Trading</span> Intelligence</div>
  <div class="badge">v5.0</div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnStrategy" onclick="setMode('strategy')">📊 Strategy</button>
    <button class="mode-btn" id="btnPortfolio" onclick="setMode('portfolio')">💼 Portfolio</button>
  </div>
  <div class="hdr-right">
    <div class="acct-label">Account:</div>
    <select class="acct-select" id="acctSelect" onchange="onAcctChange()"><option value="">Loading...</option></select>
    <div class="status-dot off" id="statusDot"></div>
    <div class="status-txt" id="statusTxt">Connecting…</div>
    <div class="last-sync" id="lastSync"></div>
  </div>
</div>

<!-- DAY STRIP -->
<div class="day-strip" id="dayStrip">
  <div class="ds-item"><div class="ds-label">Day</div><div class="ds-value gold" id="dsDay">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Lot</div><div class="ds-value" id="dsLot">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Today P&L</div><div class="ds-value" id="dsPnl">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Trades</div><div class="ds-value" id="dsTrades">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Open</div><div class="ds-value cyan" id="dsOpen">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-progress">
    <div class="progress-label"><span id="dsProgLabel">Target Progress</span><span id="dsPct">—</span></div>
    <div class="progress-bar"><div class="progress-fill" id="dsBar" style="width:0%"></div></div>
  </div>
</div>

<!-- DATE BAR -->
<div class="date-bar">
  <span class="date-bar-label">📅 Range:</span>
  <div class="preset-btns">
    <button class="preset" onclick="setPreset('today')">Today</button>
    <button class="preset" onclick="setPreset('week')">This Week</button>
    <button class="preset" onclick="setPreset('month')">This Month</button>
    <button class="preset" onclick="setPreset('year')">This Year</button>
    <button class="preset" onclick="setPreset('last30')">Last 30d</button>
    <button class="preset" onclick="setPreset('last90')">Last 3M</button>
    <button class="preset" onclick="setPreset('last180')">Last 6M</button>
    <button class="preset active" onclick="setPreset('all')">All Time</button>
  </div>
  <div class="date-inputs">
    <input type="date" id="dateFrom" onchange="onDateChange()"/>
    <span class="date-sep">→</span>
    <input type="date" id="dateTo" onchange="onDateChange()"/>
  </div>
  <div class="range-count" id="rangeCount">— trades in range</div>
</div>

<div class="tabs" id="tabBar"></div>
<div class="main" id="mainContent"></div>

<div class="overlay" id="overlay" onclick="closeInspector()"></div>
<div class="inspector" id="inspector">
  <button class="insp-close" onclick="closeInspector()">✕</button>
  <div id="inspBody"></div>
</div>

<script>
const SB_URL='https://nmyveijljquxvhjelqbc.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teXZlaWpsanF1eHZoamVscWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjc2MjgsImV4cCI6MjA4Nzk0MzYyOH0.YT-sAh2Spn1805dnylTsZ2gBx-T7yC6fyOKIs0YPlP4';
const HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

const CUR_FLAGS={EUR:'🇪🇺',GBP:'🇬🇧',AUD:'🇦🇺',NZD:'🇳🇿',USD:'🇺🇸',CAD:'🇨🇦',CHF:'🇨🇭',JPY:'🇯🇵'};
const CURRENCIES=['EUR','GBP','AUD','NZD','USD','CAD','CHF','JPY'];

let mode='strategy',activeTab='overview',acctId='';
let allAccounts=[],rawDb={trades:[],signals:[],daily:[],positions:[]},db={trades:[],signals:[],daily:[],positions:[]};
let charts={},dateFrom='',dateTo='',activePreset='all';
let refreshTimer=null;

const STRAT_TABS=['overview','positions','trades','signals','daily','heatmap','currencies','compare'];
const PORT_TABS=['overview','trades','performance','compare'];
const TAB_LABELS={overview:'Overview',positions:'Positions',trades:'Trades',signals:'Signals',daily:'Daily',heatmap:'Pair Heatmap',currencies:'Currencies',compare:'Compare',performance:'Performance'};

// ── SUPABASE ──────────────────────────────────────────────────────
async function sb(table,params=''){
  const PAGE=1000;let all=[],from=0;
  while(true){
    const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}&limit=${PAGE}&offset=${from}`,
      {headers:{...HDR,'Range-Unit':'items',Range:`${from}-${from+PAGE-1}`}});
    if(!r.ok) break;
    const page=await r.json();
    all=all.concat(page);
    if(page.length<PAGE) break;
    from+=PAGE;
  }
  return all;
}

async function sbPatch(table,id,body){
  return fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:'PATCH',headers:{...HDR,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});
}

// ── INIT ──────────────────────────────────────────────────────────
async function init(){
  const saved=localStorage.getItem('csea_acct');
  const savedMode=localStorage.getItem('csea_mode')||'strategy';
  setMode(savedMode,false);
  allAccounts=await sb('accounts','select=*&order=created_at');
  const sel=document.getElementById('acctSelect');
  sel.innerHTML='<option value="">All Accounts</option>';
  allAccounts.forEach(a=>{const o=document.createElement('option');o.value=a.id;o.textContent=a.name||a.account_number;sel.appendChild(o);});
  if(saved){sel.value=saved;acctId=saved;}
  await loadData();
  startPositionRefresh();
}

async function loadData(){
  const dot=document.getElementById('statusDot'),txt=document.getElementById('statusTxt');
  dot.className='status-dot off';txt.textContent='Loading…';
  const f=acctId?`account_id=eq.${acctId}`:'';
  const q=p=>f?`select=*&order=${p}&${f}`:`select=*&order=${p}`;
  const [trades,signals,daily,positions]=await Promise.all([sb('trades',q('ts')),sb('signals',q('ts')),sb('daily',q('date')),sb('positions',q('ts')||'select=*')]);
  rawDb={trades,signals,daily,positions:positions||[]};
  applyDateFilter();
  updateDayStrip();
  renderTabs();renderContent();
  dot.className='status-dot';txt.textContent='Live';
  document.getElementById('lastSync').textContent='Updated '+new Date().toLocaleTimeString();
}

function startPositionRefresh(){
  if(refreshTimer) clearInterval(refreshTimer);
  refreshTimer=setInterval(async()=>{
    if(activeTab!=='positions'&&activeTab!=='overview') return;
    const f=acctId?`select=*&account_id=eq.${acctId}`:'select=*';
    const pos=await sb('positions',f);

// ── DATE FILTER ───────────────────────────────────────────────────
function applyDateFilter(){
  const today=new Date().toISOString().slice(0,10);
  db.trades=rawDb.trades.filter(t=>{
    if(!t.ts) return true;
    const d=t.ts.slice(0,10);
    if(dateFrom&&d<dateFrom) return false;
    if(dateTo&&d>dateTo) return false;
    return true;
  });
  db.signals=rawDb.signals.filter(s=>{
    if(!s.ts) return true;
    const d=s.ts.slice(0,10);
    if(dateFrom&&d<dateFrom) return false;
    if(dateTo&&d>dateTo) return false;
    return true;
  });
  db.daily=rawDb.daily.filter(d=>{
    if(!d.date) return true;
    if(dateFrom&&d.date<dateFrom) return false;
    if(dateTo&&d.date>dateTo) return false;
    return true;
  });
  db.positions=rawDb.positions;
  const cl=closed();
  document.getElementById('rangeCount').textContent=cl.length+' trades in range';
}

function setPreset(p){
  activePreset=p;
  document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  const now=new Date(),fmt=d=>d.toISOString().slice(0,10);
  const df=document.getElementById('dateFrom'),dt=document.getElementById('dateTo');
  if(p==='all'){df.value='';dt.value='';dateFrom='';dateTo='';}
  else if(p==='today'){const s=fmt(now);df.value=s;dt.value=s;dateFrom=s;dateTo=s;}
  else if(p==='week'){const m=new Date(now);m.setDate(now.getDate()-now.getDay()+1);df.value=fmt(m);dt.value=fmt(now);dateFrom=fmt(m);dateTo=fmt(now);}
  else if(p==='month'){const s=new Date(now.getFullYear(),now.getMonth(),1);df.value=fmt(s);dt.value=fmt(now);dateFrom=fmt(s);dateTo=fmt(now);}
  else if(p==='year'){const s=new Date(now.getFullYear(),0,1);df.value=fmt(s);dt.value=fmt(now);dateFrom=fmt(s);dateTo=fmt(now);}
  else if(p==='last30'){const s=new Date(now);s.setDate(now.getDate()-30);df.value=fmt(s);dt.value=fmt(now);dateFrom=fmt(s);dateTo=fmt(now);}
  else if(p==='last90'){const s=new Date(now);s.setDate(now.getDate()-90);df.value=fmt(s);dt.value=fmt(now);dateFrom=fmt(s);dateTo=fmt(now);}
  else if(p==='last180'){const s=new Date(now);s.setDate(now.getDate()-180);df.value=fmt(s);dt.value=fmt(now);dateFrom=fmt(s);dateTo=fmt(now);}
  applyDateFilter();destroyCharts();renderContent();
}

function onDateChange(){

}

// ── DAY STRIP ─────────────────────────────────────────────────────
function updateDayStrip(){
  const today=new Date().toISOString().slice(0,10);
  const todayRow=rawDb.daily.find(d=>d.date===today)||(rawDb.daily.length?rawDb.daily[rawDb.daily.length-1]:null);
  const todayTrades=rawDb.trades.filter(t=>t.ts&&t.ts.slice(0,10)===today&&t.event==='CLOSE');
  const todayPnl=todayTrades.reduce((s,t)=>s+parseFloat(t.pnl||0),0);

  const compDay=todayRow?.compound_day||'—';
  const compLot=todayRow?.compound_lot||'—';
  const compTarget=parseFloat(todayRow?.compound_target||0);
  const targetHit=todayRow?.target_hit||false;
  const pct=compTarget>0?Math.min(100,(todayPnl/compTarget*100)):0;

  document.getElementById('dsDay').textContent=compDay!=='—'?'Day '+compDay:'—';
  document.getElementById('dsLot').textContent=compLot!=='—'?compLot+' lots':'—';
  const pnlEl=document.getElementById('dsPnl');
  pnlEl.textContent=(todayPnl>=0?'+':'')+todayPnl.toFixed(2);
  pnlEl.className='ds-value '+(todayPnl>=0?'green':'red');
  document.getElementById('dsTrades').textContent=todayTrades.length;
  document.getElementById('dsOpen').textContent=db.positions.length;
  document.getElementById('dsProgLabel').textContent=targetHit?'✅ Target Hit':'Target Progress';
  document.getElementById('dsPct').textContent=compTarget>0?pct.toFixed(0)+'% of $'+compTarget.toFixed(2):'—';
  const bar=document.getElementById('dsBar');
  bar.style.width=Math.max(0,pct)+'%';
  bar.className='progress-fill'+(targetHit?' hit':'');
}

// ── HELPERS ───────────────────────────────────────────────────────
const fmtPnl=v=>(v>0?'+':'')+parseFloat(v).toFixed(2);
const fmtPct=v=>(v>0?'+':'')+parseFloat(v).toFixed(1)+'%';
const closed=()=>db.trades.filter(t=>t.event==='CLOSE');
function winRate(cl){const w=cl.filter(t=>parseFloat(t.pnl||0)>0);return cl.length?w.length/cl.length*100:0;}
function totalPnL(cl){return cl.reduce((s,t)=>s+parseFloat(t.pnl||0),0);}
function avgWin(cl){const w=cl.filter(t=>parseFloat(t.pnl||0)>0);return w.length?totalPnL(w)/w.length:0;}
function avgLoss(cl){const l=cl.filter(t=>parseFloat(t.pnl||0)<0);return l.length?Math.abs(totalPnL(l)/l.length):0;}
function profitFactor(cl){
  const g=cl.filter(t=>parseFloat(t.pnl||0)>0).reduce((s,t)=>s+parseFloat(t.pnl||0),0);
  const ls=Math.abs(cl.filter(t=>parseFloat(t.pnl||0)<0).reduce((s,t)=>s+parseFloat(t.pnl||0),0));
  return ls===0?999:g/ls;
}
function maxDD(cl){
  let peak=0,dd=0,run=0;
  [...cl].sort((a,b)=>new Date(a.ts)-new Date(b.ts)).forEach(t=>{
    run+=parseFloat(t.pnl||0);if(run>peak)peak=run;if(peak>0)dd=Math.max(dd,(peak-run)/peak*100);
  });
  return dd;
}
function getAcctName(id){const a=allAccounts.find(x=>x.id===id);return a?a.name||a.account_number:'Unknown';}

          <td style="font-weight:700;color:${pnl>=0?'#16a34a':'#dc2626'}">${fmtPnl(pnl)}</td>
          <td>${d.target_hit?'✅':'—'}</td>
          <td>${d.trades_opened||0}</td><td>${d.trades_closed||0}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
}

// ── HEATMAP ───────────────────────────────────────────────────────
function renderHeatmap(){
  const cl=closed();const map={};
  cl.forEach(t=>{const s=t.symbol||'?';if(!map[s])map[s]={pnl:0,w:0,l:0};const p=parseFloat(t.pnl||0);map[s].pnl+=p;p>=0?map[s].w++:map[s].l++;});
  const entries=Object.entries(map).sort((a,b)=>b[1].pnl-a[1].pnl);
  if(!entries.length) return`<div class="empty-state"><div class="empty-icon">🔥</div><div class="empty-msg">No trade data</div></div>`;
  const maxAbs=Math.max(...entries.map(([,v])=>Math.abs(v.pnl)));
  return`<div class="heatmap">${entries.map(([sym,v])=>{
    const wr=v.w+v.l>0?(v.w/(v.w+v.l)*100):0;
    const intensity=maxAbs>0?Math.abs(v.pnl)/maxAbs:0;
    const bg=v.pnl>=0?`rgba(22,163,74,${.12+intensity*.5})`:`rgba(220,38,38,${.12+intensity*.5})`;
    return`<div class="tile" style="background:${bg};border-color:${v.pnl>=0?'#16a34a':'#dc2626'}40" onclick="filterTradesToPair('${sym}')">
      <div class="tile-sym">${sym}</div>
      <div class="tile-wr" style="color:${wr>=50?'#16a34a':'#dc2626'}">${wr.toFixed(0)}% WR</div>
      <div class="tile-pnl" style="color:${v.pnl>=0?'#16a34a':'#dc2626'}">${fmtPnl(v.pnl)}</div>
      <div style="font-size:10px;color:#64748b">${v.w+v.l} trades</div>
    </div>`;
  }).join('')}</div>`;
}

function filterTradesToPair(sym){setTab('trades');setTimeout(()=>{const s=document.getElementById('trdSymF');if(s){s.value=sym;filterTrades();}},100);}

// ── CURRENCIES ────────────────────────────────────────────────────
function renderCurrencies(){
  const cl=closed();
  const data={};
  CURRENCIES.forEach(c=>{data[c]={asStrong:{pnl:0,w:0,l:0},asWeak:{pnl:0,w:0,l:0}};});
  cl.forEach(t=>{
    const sc=t.strong_cur,wc=t.weak_cur,pnl=parseFloat(t.pnl||0);
    if(sc&&data[sc]){data[sc].asStrong.pnl+=pnl;pnl>=0?data[sc].asStrong.w++:data[sc].asStrong.l++;}
    if(wc&&data[wc]){data[wc].asWeak.pnl+=pnl;pnl>=0?data[wc].asWeak.w++:data[wc].asWeak.l++;}
  });
  const cards=CURRENCIES.map(c=>{
    const d=data[c];
    const swTotal=d.asStrong.w+d.asStrong.l,wwTotal=d.asWeak.w+d.asWeak.l;
    const swRate=swTotal?d.asStrong.w/swTotal*100:0,wwRate=wwTotal?d.asWeak.w/wwTotal*100:0;
    return`<div class="cur-card">
      <div class="cur-name"><span class="cur-flag">${CUR_FLAGS[c]||''}</span>${c}</div>
      <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">As Strong Currency</div>
      <div class="cur-row"><span>P&L</span><span style="font-weight:700;color:${d.asStrong.pnl>=0?'#16a34a':'#dc2626'}">${fmtPnl(d.asStrong.pnl)}</span></div>
      <div class="cur-row"><span>Win Rate</span><span style="color:${swRate>=50?'#16a34a':'#dc2626'}">${swRate.toFixed(0)}%</span></div>
      <div class="cur-row"><span>Trades</span><span>${d.asStrong.w}W / ${d.asStrong.l}L</span></div>
      <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px">As Weak Currency</div>
      <div class="cur-row"><span>P&L</span><span style="font-weight:700;color:${d.asWeak.pnl>=0?'#16a34a':'#dc2626'}">${fmtPnl(d.asWeak.pnl)}</span></div>
      <div class="cur-row"><span>Win Rate</span><span style="color:${wwRate>=50?'#16a34a':'#dc2626'}">${wwRate.toFixed(0)}%</span></div>
      <div class="cur-row"><span>Trades</span><span>${d.asWeak.w}W / ${d.asWeak.l}L</span></div>
    </div>`;
  }).join('');
  return`
  <div style="margin-bottom:14px;font-size:13px;color:var(--sub)">Per-currency breakdown — <strong>As Strong</strong> means this currency was the buy side of the signal. <strong>As Weak</strong> means it was the sell side.</div>
  <div class="cur-grid">${cards}</div>
  <div class="charts-row-2">
    <div class="chart-card"><div class="chart-title">Net P&L as Strong Currency</div><div class="chart-wrap"><canvas id="curStrongChart"></canvas></div>
      <div style="display:none" id="curStrongData" data-keys='${JSON.stringify(CURRENCIES)}' data-vals='${JSON.stringify(CURRENCIES.map(c=>+data[c].asStrong.pnl.toFixed(2)))}'></div>
    </div>
    <div class="chart-card"><div class="chart-title">Net P&L as Weak Currency</div><div class="chart-wrap"><canvas id="curWeakChart"></canvas></div>
      <div style="display:none" id="curWeakData" data-keys='${JSON.stringify(CURRENCIES)}' data-vals='${JSON.stringify(CURRENCIES.map(c=>+data[c].asWeak.pnl.toFixed(2)))}'></div>
    </div>
  </div>`;
}

// ── COMPARE ───────────────────────────────────────────────────────
function renderCompare(){
  const accounts=allAccounts.length?allAccounts:[{id:'',name:'All',account_number:'All'}];
  const cards=accounts.map((a,i)=>{
    const atrades=rawDb.trades.filter(t=>(a.id?t.account_id===a.id:true)&&t.event==='CLOSE');
    const apnl=totalPnL(atrades),awr=winRate(atrades),apf=profitFactor(atrades),add=maxDD(atrades);
    const eqId='eq_'+i;
    let run=0;const eqD=[],eqL=[];
    [...atrades].sort((a,b)=>new Date(a.ts)-new Date(b.ts)).forEach(t=>{run+=parseFloat(t.pnl||0);eqD.push(+run.toFixed(2));eqL.push(t.ts?.slice(5,10)||'');});
    return`<div class="compare-card">
      <div class="compare-card-hdr">
        <span class="compare-card-name">${a.name||a.account_number}</span>
        <span class="pill pill-${a.account_type||'demo'}">${a.account_type||'demo'}</span>
      </div>
      <div class="compare-kpis">
        <div class="compare-kpi"><div class="compare-kpi-label">P&L</div><div class="compare-kpi-value ${apnl>=0?'green':'red'}">${fmtPnl(apnl)}</div></div>
        <div class="compare-kpi"><div class="compare-kpi-label">Win Rate</div><div class="compare-kpi-value ${awr>=50?'green':'red'}">${awr.toFixed(1)}%</div></div>
        <div class="compare-kpi"><div class="compare-kpi-label">Profit Factor</div><div class="compare-kpi-value ${apf>=1?'green':'red'}">${apf===999?'∞':apf.toFixed(2)}</div></div>
        <div class="compare-kpi"><div class="compare-kpi-label">Max DD</div><div class="compare-kpi-value ${add>20?'red':add>10?'gold':'green'}">${add.toFixed(1)}%</div></div>
        <div class="compare-kpi"><div class="compare-kpi-label">Trades</div><div class="compare-kpi-value cyan">${atrades.length}</div></div>
      </div>
      <div class="compare-equity">
        <div class="compare-eq-title">Equity Curve</div>
        <div class="compare-eq-wrap"><canvas id="${eqId}" data-labels='${JSON.stringify(eqL)}' data-values='${JSON.stringify(eqD)}'></canvas></div>
      </div>
    </div>`;
  }).join('');
  return`<div class="compare-grid">${cards}</div>`;
}

// ── PERFORMANCE ───────────────────────────────────────────────────
function renderPerformance(){
  const cl=closed();
  const monthMap={},weekMap={};
  cl.forEach(t=>{
    const m=t.ts?t.ts.slice(0,7):'?';monthMap[m]=(monthMap[m]||0)+parseFloat(t.pnl||0);
    if(!t.ts) return;
    const d=new Date(t.ts),mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1);
    const w=mon.toISOString().slice(0,10);weekMap[w]=(weekMap[w]||0)+parseFloat(t.pnl||0);
  });
  const months=Object.keys(monthMap).sort();
  const weeks=Object.keys(weekMap).sort();
  return`
  <div class="charts-row-2">
    <div class="chart-card"><div class="chart-title">Monthly P&L</div><div class="chart-wrap"><canvas id="perfMonthly"></canvas>
      <div style="display:none" id="perfMData" data-labels='${JSON.stringify(months)}' data-vals='${JSON.stringify(months.map(m=>+monthMap[m].toFixed(2)))}'></div>
    </div></div>
    <div class="chart-card"><div class="chart-title">Weekly P&L (last 20)</div><div class="chart-wrap"><canvas id="perfWeekly"></canvas>
      <div style="display:none" id="perfWData" data-labels='${JSON.stringify(weeks.slice(-20))}' data-vals='${JSON.stringify(weeks.slice(-20).map(w=>+weekMap[w].toFixed(2)))}'></div>
    </div></div>
  </div>
  <div class="charts-row-2">
    <div class="chart-card"><div class="chart-title">Time of Day P&L</div><div class="chart-wrap"><canvas id="todChart"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">P&L by Pair</div><div class="chart-wrap"><canvas id="pairChart"></canvas>
      ${(()=>{const byPair={};cl.forEach(t=>{const s=t.symbol||'?';if(!byPair[s])byPair[s]=0;byPair[s]+=parseFloat(t.pnl||0);});const keys=Object.keys(byPair).sort((a,b)=>byPair[b]-byPair[a]).slice(0,8);return`<div style="display:none" id="pairData" data-keys='${JSON.stringify(keys)}' data-vals='${JSON.stringify(keys.map(k=>+byPair[k].toFixed(2)))}'>`;})()}</div>
    </div>
  </div>`;
}

// ── INSPECTOR ─────────────────────────────────────────────────────
function openInspector(ticket){
  const t=db.trades.find(x=>String(x.ticket)===String(ticket)&&x.event==='CLOSE');
  if(!t) return;
  const pnl=parseFloat(t.pnl||0);
  const events=db.trades.filter(x=>String(x.ticket)===String(ticket)).sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  document.getElementById('inspBody').innerHTML=`
    <div class="insp-title">${t.symbol||'—'} ${t.direction||''}</div>
    <div class="insp-sub">Ticket #${t.ticket}</div>
    <div class="insp-section"><div class="insp-section-title">Trade Details</div>
      <div class="insp-row"><span class="lbl">P&L</span><span class="val" style="color:${pnl>=0?'#16a34a':'#dc2626'};font-weight:700">${fmtPnl(pnl)}</span></div>
      <div class="insp-row"><span class="lbl">Lot</span><span class="val">${parseFloat(t.lot||0).toFixed(2)}</span></div>
      <div class="insp-row"><span class="lbl">Entry</span><span class="val">${parseFloat(t.entry||0).toFixed(5)}</span></div>
      <div class="insp-row"><span class="lbl">SL</span><span class="val">${parseFloat(t.sl||0).toFixed(5)}</span></div>
      <div class="insp-row"><span class="lbl">TP</span><span class="val">${parseFloat(t.tp||0).toFixed(5)}</span></div>
      <div class="insp-row"><span class="lbl">Close Time</span><span class="val">${t.ts?t.ts.slice(0,16).replace('T',' '):'—'}</span></div>
      <div class="insp-row"><span class="lbl">Balance After</span><span class="val">${t.balance?'$'+parseFloat(t.balance).toFixed(2):'—'}</span></div>
    </div>
    <div class="insp-section"><div class="insp-section-title">Signal Context</div>
      <div class="insp-row"><span class="lbl">Strong</span><span class="val" style="color:#16a34a">${t.strong_cur||'—'} (${parseFloat(t.strong_val||0).toFixed(4)})</span></div>
      <div class="insp-row"><span class="lbl">Weak</span><span class="val" style="color:#dc2626">${t.weak_cur||'—'} (${parseFloat(t.weak_val||0).toFixed(4)})</span></div>
      <div class="insp-row"><span class="lbl">Gap</span><span class="val">${t.gap?parseFloat(t.gap).toFixed(4):'—'}</span></div>
    </div>
    <div class="insp-section"><div class="insp-section-title">Event Timeline</div>
      ${events.map(e=>`<div class="insp-row"><span class="lbl">${e.event}</span><span class="val">${e.ts?e.ts.slice(0,16).replace('T',' '):'—'} · ${parseFloat(e.lot||0).toFixed(2)} lots</span></div>`).join('')}
    </div>`;
  document.getElementById('inspector').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeInspector(){
  document.getElementById('inspector').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── CHARTS ────────────────────────────────────────────────────────
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

const CD={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
  scales:{x:{ticks:{color:'#94a3b8',maxTicksLimit:8,font:{size:10}},grid:{color:'#f1f5f9'}},
          y:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'#f1f5f9'}}}};

function renderCharts(){
  // Equity curve (trade-based)
  const eq=document.getElementById('eqChart');
  const eqD=document.getElementById('eqData');
  if(eq&&eqD){
    const labels=JSON.parse(eqD.dataset.labels||'[]'),vals=JSON.parse(eqD.dataset.vals||'[]');
    charts.eq=new Chart(eq,{type:'line',data:{labels,datasets:[{data:vals,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',fill:true,tension:.3,pointRadius:0,borderWidth:2}]},options:{...CD}});
  }
  // Equity from daily balance
  if(eq&&!eqD&&db.daily.length){
    charts.eq=new Chart(eq,{type:'line',data:{labels:db.daily.map(d=>d.date.slice(5)),datasets:[{data:db.daily.map(d=>parseFloat(d.end_balance||0)),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',fill:true,tension:.3,pointRadius:2,borderWidth:2}]},options:{...CD}});
  }
  // Pair chart
  const pc=document.getElementById('pairChart'),pd=document.getElementById('pairData');
  if(pc&&pd){
    const keys=JSON.parse(pd.dataset.keys||'[]'),vals=JSON.parse(pd.dataset.vals||'[]');
    charts.pair=new Chart(pc,{type:'bar',data:{labels:keys,datasets:[{data:vals,backgroundColor:vals.map(v=>v>=0?'#86efac':'#fca5a5')}]},options:{...CD}});
  }
  // Block reasons
  const blk=document.getElementById('blockChart');
  if(blk){
    const reasons={};
    db.signals.filter(s=>s.result==='BLOCKED').forEach(s=>{const r=s.block_reason||'Unknown';reasons[r]=(reasons[r]||0)+1;});
    const keys=Object.keys(reasons);
    if(keys.length) charts.blk=new Chart(blk,{type:'bar',data:{labels:keys,datasets:[{data:keys.map(k=>reasons[k]),backgroundColor:'#fca5a5'}]},options:{...CD,indexAxis:'y'}});
  }
  // Signal pie
  const sp=document.getElementById('sigPieChart');
  if(sp){
    const op=db.signals.filter(s=>s.result==='OPENED').length,bl=db.signals.filter(s=>s.result==='BLOCKED').length;
    charts.sp=new Chart(sp,{type:'doughnut',data:{labels:['Opened','Blocked'],datasets:[{data:[op,bl],backgroundColor:['#86efac','#fca5a5'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#64748b',font:{size:11}}}}}});
  }
  // Daily P&L bar
  const dpnl=document.getElementById('dailyPnlChart');
  if(dpnl&&db.daily.length){
    const sl=db.daily.slice(-30);
    charts.dpnl=new Chart(dpnl,{type:'bar',data:{labels:sl.map(d=>d.date.slice(5)),datasets:[{data:sl.map(d=>parseFloat(d.daily_pnl||0)),backgroundColor:sl.map(d=>d.target_hit?'#16a34a':parseFloat(d.daily_pnl||0)>=0?'#86efac':'#fca5a5')}]},options:{...CD}});
  }
  // Time of day chart
  const tod=document.getElementById('todChart');
  if(tod){
    const hours={};
    closed().forEach(t=>{if(!t.ts) return;const h=new Date(t.ts).getUTCHours();if(!hours[h])hours[h]=0;hours[h]+=parseFloat(t.pnl||0);});
    const hkeys=Array.from({length:24},(_,i)=>i);
    charts.tod=new Chart(tod,{type:'bar',data:{labels:hkeys.map(h=>h+':00'),datasets:[{data:hkeys.map(h=>+(hours[h]||0).toFixed(2)),backgroundColor:hkeys.map(h=>(hours[h]||0)>=0?'#86efac':'#fca5a5')}]},options:{...CD}});
  }
  // Currency charts
  const csD=document.getElementById('curStrongData'),cwD=document.getElementById('curWeakData');
  const cs=document.getElementById('curStrongChart'),cw=document.getElementById('curWeakChart');
  if(cs&&csD){const keys=JSON.parse(csD.dataset.keys||'[]'),vals=JSON.parse(csD.dataset.vals||'[]');charts.cs=new Chart(cs,{type:'bar',data:{labels:keys,datasets:[{data:vals,backgroundColor:vals.map(v=>v>=0?'#86efac':'#fca5a5')}]},options:{...CD}});}
  if(cw&&cwD){const keys=JSON.parse(cwD.dataset.keys||'[]'),vals=JSON.parse(cwD.dataset.vals||'[]');charts.cw=new Chart(cw,{type:'bar',data:{labels:keys,datasets:[{data:vals,backgroundColor:vals.map(v=>v>=0?'#86efac':'#fca5a5')}]},options:{...CD}});}
  // Monthly bar
  const mb=document.getElementById('monthlyBarChart');
  if(mb){const mm={};closed().forEach(t=>{const m=t.ts?t.ts.slice(0,7):'?';mm[m]=(mm[m]||0)+parseFloat(t.pnl||0);});const months=Object.keys(mm).sort().slice(-12);charts.mb=new Chart(mb,{type:'bar',data:{labels:months.map(m=>m.slice(5)),datasets:[{data:months.map(m=>+(mm[m]||0).toFixed(2)),backgroundColor:months.map(m=>(mm[m]||0)>=0?'#86efac':'#fca5a5')}]},options:{...CD}});}
  // Weekly bar
  const wk=document.getElementById('weeklyChart');
  if(wk){const wm={};closed().forEach(t=>{if(!t.ts)return;const d=new Date(t.ts),mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1);const w=mon.toISOString().slice(0,10);wm[w]=(wm[w]||0)+parseFloat(t.pnl||0);});const wks=Object.keys(wm).sort().slice(-20);charts.wk=new Chart(wk,{type:'bar',data:{labels:wks.map(w=>w.slice(5)),datasets:[{data:wks.map(w=>+(wm[w]||0).toFixed(2)),backgroundColor:wks.map(w=>(wm[w]||0)>=0?'#86efac':'#fca5a5')}]},options:{...CD}});}
  // Performance tab charts
  const pmd=document.getElementById('perfMData'),pwd=document.getElementById('perfWData');
  const pm=document.getElementById('perfMonthly'),pw=document.getElementById('perfWeekly');
  if(pm&&pmd){const labels=JSON.parse(pmd.dataset.labels||'[]'),vals=JSON.parse(pmd.dataset.vals||'[]');charts.pm=new Chart(pm,{type:'bar',data:{labels:labels.map(l=>l.slice(5)),datasets:[{data:vals,backgroundColor:vals.map(v=>v>=0?'#86efac':'#fca5a5')}]},options:{...CD}});}
  if(pw&&pwd){const labels=JSON.parse(pwd.dataset.labels||'[]'),vals=JSON.parse(pwd.dataset.vals||'[]');charts.pw=new Chart(pw,{type:'bar',data:{labels:labels.map(l=>l.slice(5)),datasets:[{data:vals,backgroundColor:vals.map(v=>v>=0?'#86efac':'#fca5a5')}]},options:{...CD}});}
  // Compare mini curves
  document.querySelectorAll('[id^="eq_"]').forEach(canvas=>{
    try{
      const labels=JSON.parse(canvas.dataset.labels||'[]'),values=JSON.parse(canvas.dataset.values||'[]');
      if(!values.length) return;
      charts[canvas.id]=new Chart(canvas,{type:'line',data:{labels,datasets:[{data:values,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',fill:true,tension:.3,pointRadius:0,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}});
    }catch(e){}
  });
}
