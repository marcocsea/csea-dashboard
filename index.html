<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CSEA Trading Intelligence v5.5.3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{--bg:#f0f4f8;--bg2:#fff;--bg3:#f8fafc;--border:#e2e8f0;--text:#1e293b;--sub:#64748b;--green:#16a34a;--red:#dc2626;--blue:#3b82f6;--gold:#d97706;--cyan:#0891b2}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
.header{background:#1e293b;color:#e2e8f0;padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200}
.logo{font-size:16px;font-weight:800;letter-spacing:-.3px}.logo span{color:#60a5fa}
.badge{background:#334155;border:1px solid #475569;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;color:#94a3b8}
.mode-toggle{display:flex;gap:4px;margin-left:8px}
.mode-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #475569;background:transparent;color:#94a3b8;transition:all .15s}
.mode-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.acct-label{font-size:11px;color:#94a3b8}
.acct-select{background:#334155;border:1px solid #475569;color:#e2e8f0;padding:4px 8px;border-radius:6px;font-size:12px;outline:none}
.status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
.status-dot.off{background:#ef4444;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.status-txt{font-size:12px;color:#94a3b8}
.last-sync{font-size:10px;color:#64748b}
.day-strip{background:#0f172a;border-bottom:1px solid #1e293b;padding:6px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:56px;z-index:99}
.ds-item{display:flex;flex-direction:column;gap:2px;white-space:nowrap}
.ds-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.ds-val{font-size:13px;font-weight:700;color:#e2e8f0}
.ds-val.pos{color:#4ade80}.ds-val.neg{color:#f87171}.ds-val.gold{color:#fbbf24}
.ds-sep{width:1px;height:28px;background:#334155;flex-shrink:0}
.ds-progress{flex:1;min-width:120px;display:flex;flex-direction:column;gap:3px}
.ds-prog-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:flex;justify-content:space-between}
.ds-prog-track{height:6px;background:#334155;border-radius:3px;overflow:hidden}
.ds-prog-fill{height:6px;background:#4ade80;border-radius:3px;transition:width .4s}
.ds-prog-fill.gold{background:#fbbf24}
.date-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-bar-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.preset-btns{display:flex;gap:4px;flex-wrap:wrap}
.preset{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--sub);transition:all .15s}
.preset:hover{border-color:var(--blue);color:var(--blue)}
.preset.active{background:#eff6ff;border-color:var(--blue);color:var(--blue)}
.date-inputs{display:flex;align-items:center;gap:6px;margin-left:8px}
.date-inputs input{padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text);outline:none;background:var(--bg3)}
.date-sep{color:var(--sub);font-size:11px}
.range-count{margin-left:auto;font-size:11px;color:var(--sub);white-space:nowrap;background:var(--bg3);padding:3px 10px;border-radius:5px;border:1px solid var(--border)}
.tabs{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:11px 15px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;transition:all .15s;white-space:nowrap}
.tab:hover{color:#1e293b}
.tab.active{color:#1e40af;border-bottom-color:#3b82f6}
.main{padding:20px;max-width:1400px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:15px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kpi-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-val{font-size:21px;font-weight:700;color:#1e293b}
.kpi-val.pos{color:var(--green)}.kpi-val.neg{color:var(--red)}.kpi-val.gold{color:var(--gold)}.kpi-val.cyan{color:var(--cyan)}
.kpi-sub{font-size:11px;color:var(--sub);margin-top:3px}
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.charts-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.charts-row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.chart-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-wrap{position:relative;height:190px}
.chart-wrap.tall{height:240px}
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.table-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.table-title{font-size:14px;font-weight:700;color:#1e293b}
.count-badge{background:var(--bg3);color:var(--sub);padding:2px 8px;border-radius:4px;font-size:11px;border:1px solid var(--border)}
.filters{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:12px;outline:none}
.tbl-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:#334155}
tr:hover td{background:#f8fafc;cursor:pointer}
.badge-buy{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-sell{background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-opened{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-blocked{background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-open{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-close{background:#eff6ff;color:#2563eb;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.monthly-table-wrap{overflow-x:auto;padding:4px 0 8px}
.monthly-table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
.monthly-table th{background:var(--bg3);padding:9px 10px;text-align:center;font-size:11px;font-weight:600;color:var(--sub);border:1px solid var(--border);white-space:nowrap}
.monthly-table th.left{text-align:left}
.monthly-table td{padding:9px 10px;text-align:center;border:1px solid var(--border);font-weight:600;white-space:nowrap}
.monthly-table .year-col{text-align:left;font-weight:700;color:#1e293b;min-width:56px}
.monthly-table .m-pos{color:#16a34a;background:#f0fdf4}
.monthly-table .m-neg{color:#dc2626;background:#fef2f2}
.monthly-table .m-zero{color:#94a3b8;background:var(--bg3)}
.monthly-table .ytd-col{font-weight:800;border-left:2px solid #cbd5e1}
.heatmap-grid{display:grid;gap:4px;margin-bottom:20px}
.heatmap-cell{padding:10px 6px;border-radius:6px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;transition:transform .1s}
.heatmap-cell:hover{transform:scale(1.05)}
.cur-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.perf-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:20px}
.equity-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.equity-wrap{position:relative;height:220px}
.float-bar{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.float-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.float-val{font-size:22px;font-weight:800}
.refresh-btn{margin-left:auto;padding:6px 16px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.streak-dots{display:flex;gap:4px;flex-wrap:wrap;padding:4px 0}
.streak-dot{width:18px;height:18px;border-radius:4px;display:inline-block}
.inspector{position:fixed;right:-420px;top:0;width:400px;height:100vh;background:#fff;border-left:1px solid var(--border);z-index:500;padding:20px;overflow-y:auto;transition:right .3s;box-shadow:-4px 0 16px rgba(0,0,0,.08)}
.inspector.open{right:0}
.insp-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub)}
.insp-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.insp-label{color:var(--sub);font-weight:500}
.insp-val{font-weight:700;color:#1e293b}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:499;display:none}
.overlay.open{display:block}
.compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.compare-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.compare-card-title{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.compare-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.compare-kpi{background:var(--bg3);border-radius:7px;padding:8px 10px;border:1px solid var(--border)}
.compare-kpi-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.3px;font-weight:600;margin-bottom:2px}
.compare-kpi-val{font-size:14px;font-weight:700}
.eq-mini{position:relative;height:60px}
.empty-state{text-align:center;padding:60px 20px;color:var(--sub)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-msg{font-size:15px;font-weight:600}
.empty-sub{font-size:12px;margin-top:6px}
.csv-btn{background:#22c55e;border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.csv-btn:hover{background:#16a34a}
@media(max-width:768px){
  .charts-row-3,.charts-row-2,.compare-grid,.cur-grid,.perf-grid{grid-template-columns:1fr}
  .day-strip{gap:8px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">&#9889; <span>CSEA</span> Intelligence</div>
  <div class="badge">v5.5.3</div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnStrategy" onclick="setMode('strategy')">&#128202; Strategy</button>
    <button class="mode-btn" id="btnPortfolio" onclick="setMode('portfolio')">&#128188; Portfolio</button>
  </div>
  <div class="hdr-right">
    <div class="acct-label">Account:</div>
    <select class="acct-select" id="acctSelect" onchange="onAcctChange()"><option value="">Loading&#8230;</option></select>
    <div class="status-dot off" id="statusDot"></div>
    <div class="status-txt" id="statusTxt">Connecting&#8230;</div>
    <div class="last-sync" id="lastSync"></div>
  </div>
</div>

<div class="day-strip">
  <div class="ds-item"><div class="ds-label">Day</div><div class="ds-val" id="dsDay">&#8212;</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Lot</div><div class="ds-val" id="dsLot">&#8212;</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Today P&amp;L</div><div class="ds-val" id="dsPnl">&#8212;</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Trades</div><div class="ds-val" id="dsTrades">&#8212;</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Open Pos</div><div class="ds-val" id="dsPos">&#8212;</div></div>
  <div class="ds-sep"></div>
  <div class="ds-progress">
    <div class="ds-prog-label"><span>Compound Progress</span><span id="dsProgPct">&#8212;</span></div>
    <div class="ds-prog-track"><div class="ds-prog-fill" id="dsProgFill" style="width:0%"></div></div>
  </div>
</div>

<div class="date-bar">
  <span class="date-bar-label">&#128197; Range:</span>
  <div class="preset-btns">
    <button class="preset active" onclick="setPreset('all')">All Time</button>
    <button class="preset" onclick="setPreset('today')">Today</button>
    <button class="preset" onclick="setPreset('week')">This Week</button>
    <button class="preset" onclick="setPreset('month')">This Month</button>
    <button class="preset" onclick="setPreset('year')">This Year</button>
    <button class="preset" onclick="setPreset('last30')">Last 30d</button>
    <button class="preset" onclick="setPreset('last90')">Last 3M</button>
    <button class="preset" onclick="setPreset('last180')">Last 6M</button>
  </div>
  <div class="date-inputs">
    <input type="date" id="dateFrom" onchange="onDateChange()">
    <span class="date-sep">&#8594;</span>
    <input type="date" id="dateTo" onchange="onDateChange()">
  </div>
  <div class="range-count" id="rangeCount">0 trades in range</div>
</div>

<div class="tabs" id="tabBar"></div>

<div class="main" id="mainContent"></div>

<div class="overlay" id="overlay" onclick="closeInspector()"></div>
<div class="inspector" id="inspector">
  <button class="insp-close" onclick="closeInspector()">&#x2715;</button>
  <div id="inspBody"></div>
</div>

<script>
var SUPA_URL='https://nmyveijljquxvhjelqbc.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teXZlaWpsanF1eHZoamVscWJjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjM2NzYyOCwiZXhwIjoyMDg3OTQzNjI4fQ.rodcstH6Y4nDAnMvoc6vuyENyPbjpJD3b6E7Zs-5qQQ';
var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var STRATEGY_TABS=['overview','positions','trades','signals','daily','heatmap','currencies','compare'];
var PORTFOLIO_TABS=['overview','trades','performance','compare'];
var TAB_LABELS={overview:'Overview',positions:'Positions',trades:'Trades',signals:'Signals',daily:'Daily',heatmap:'Pair Heatmap',currencies:'Currencies',compare:'Compare',performance:'Performance'};

var mode='strategy',activeTab='overview',acctId='',dateFrom='',dateTo='',activePreset='all';
var rawDb={trades:[],signals:[],daily:[],positions:[]};
var db={trades:[],signals:[],daily:[],positions:[]};
var allAccounts=[],allAccountsData={},charts={};

// ── SUPABASE ──────────────────────────────────────────────────────
async function sb(table,qs){
  var rows=[],offset=0,limit=1000,done=false;
  while(!done){
    var url=SUPA_URL+'/rest/v1/'+table+'?'+qs+'&limit='+limit+'&offset='+offset;
    var r=await fetch(url,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    var d=await r.json();
    if(!Array.isArray(d)||d.length===0){done=true;}
    else{rows=rows.concat(d);if(d.length<limit)done=true;else offset+=limit;}
  }
  return rows;
}

// ── INIT ──────────────────────────────────────────────────────────
window.onload=function(){
  var sm=localStorage.getItem('csea_mode');
  var sa=localStorage.getItem('csea_account_id');
  if(sm) mode=sm;
  if(sa) acctId=sa;
  document.getElementById('btnStrategy').className='mode-btn'+(mode==='strategy'?' active':'');
  document.getElementById('btnPortfolio').className='mode-btn'+(mode==='portfolio'?' active':'');
  loadData();
};

// ── LOAD ──────────────────────────────────────────────────────────
async function loadData(){
  var dot=document.getElementById('statusDot');
  var txt=document.getElementById('statusTxt');
  dot.className='status-dot off'; txt.textContent='Loading...';

  // Load accounts
  var accts=await sb('accounts','select=*&active=eq.true&order=label');
  allAccounts=accts||[];
  var sel=document.getElementById('acctSelect');
  sel.innerHTML='<option value="">All Accounts</option>'
    +allAccounts.map(function(a){return'<option value="'+a.id+'"'+(a.id===acctId?' selected':'')+'>'+a.label+'</option>';}).join('');
  if(mode==='portfolio') sel.options[0].textContent='&#128202; All Accounts (Combined)';

  var f=acctId?'&account_id=eq.'+acctId:'';
  var results=await Promise.all([
    sb('trades','select=*&order=ts'+f),
    sb('signals','select=*&order=ts'+f),
    sb('daily','select=*&order=date'+f)
  ]);
  rawDb={trades:results[0]||[],signals:results[1]||[],daily:results[2]||[]};

  if(allAccounts.length>1){
    var perAcct=await Promise.all(allAccounts.map(function(a){
      return sb('trades','select=*&order=ts&account_id=eq.'+a.id);
    }));
    allAccounts.forEach(function(a,i){allAccountsData[a.id]=perAcct[i]||[];});
  }

  // Compute open positions: OPEN with no matching CLOSE/COMPOUND_CLOSE/PARTIAL
  // Uses rawDb (full unfiltered dataset) to correctly identify orphans
  rawDb.positions=rawDb.trades.filter(function(t){
    if(t.event!=='OPEN') return false;
    return !rawDb.trades.some(function(x){
      return x.ticket===t.ticket
        && x.account_id===t.account_id
        && (x.event==='CLOSE'||x.event==='COMPOUND_CLOSE'||x.event==='PARTIAL');
    });
  });

  applyDateFilter();
  dot.className='status-dot'; txt.textContent='Live';
  document.getElementById('lastSync').textContent='Updated '+new Date().toLocaleTimeString();
  updateDayStrip();
  renderTabs();
  renderContent();
}

function applyDateFilter(){
  var from=dateFrom?new Date(dateFrom):null;
  var to=dateTo?new Date(dateTo+' 23:59:59'):null;
  function inRange(ts){
    if(!ts) return true;
    var d=new Date(ts);
    return(!from||d>=from)&&(!to||d<=to);
  }
  db.trades=rawDb.trades.filter(function(t){return inRange(t.ts);});
  db.signals=rawDb.signals.filter(function(s){return inRange(s.ts);});
  db.daily=rawDb.daily.filter(function(r){return inRange(r.date);});
  // positions never date-filtered — always use full raw computation
  db.positions=rawDb.positions;
  document.getElementById('rangeCount').textContent=closed().length+' trades in range';
}

function closed(){
  return db.trades.filter(function(t){return t.event==='CLOSE'||t.event==='COMPOUND_CLOSE';});
}
function fmtPnl(v){return(v>=0?'+':'')+parseFloat(v).toFixed(2);}

function updateDayStrip(){
  var today=new Date().toISOString().slice(0,10);
  var dr=rawDb.daily.slice().sort(function(a,b){return a.date.localeCompare(b.date);}).slice(-1)[0]||{};
  var allCl=rawDb.trades.filter(function(t){return t.event==='CLOSE'||t.event==='COMPOUND_CLOSE';});
  var todayTrades=allCl.filter(function(t){return(t.ts||'').slice(0,10)===today;});
  var pnl=todayTrades.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
  var target=parseFloat(dr.compound_target||0);
  var pct=target>0?(pnl/target)*100:0;
  var hit=dr.target_hit;
  var openPos=rawDb.positions.length;
  document.getElementById('dsDay').textContent=dr.compound_day||'--';
  document.getElementById('dsLot').textContent=dr.compound_lot?parseFloat(dr.compound_lot).toFixed(2):'--';
  var pnlEl=document.getElementById('dsPnl');
  pnlEl.textContent=todayTrades.length?'$'+fmtPnl(pnl):'--';
  pnlEl.className='ds-val '+(pnl>0?'pos':pnl<0?'neg':'');
  document.getElementById('dsTrades').textContent=todayTrades.length;
  var posEl=document.getElementById('dsPos');
  posEl.className='ds-val '+(openPos>0?'pos':'');
  posEl.textContent=openPos;
  document.getElementById('dsProgPct').textContent=hit?'&#10003; HIT':(target>0?pct.toFixed(0)+'%':'--');
  var fill=document.getElementById('dsProgFill');
  fill.style.width=Math.max(0,pct)+'%';
  fill.className='ds-prog-fill'+(hit?' gold':'');
}

function setPreset(p){
  activePreset=p;
  document.querySelectorAll('.preset').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');
  var now=new Date(),d=now.getDate();
  var fmt=function(x){return x.toISOString().slice(0,10);};
  if(p==='today'){dateFrom=dateTo=fmt(now);}
  else if(p==='week'){var m=new Date(now);m.setDate(d-((now.getDay()+6)%7));dateFrom=fmt(m);dateTo=fmt(now);}
  else if(p==='month'){dateFrom=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';dateTo=fmt(now);}
  else if(p==='year'){dateFrom=now.getFullYear()+'-01-01';dateTo=fmt(now);}
  else if(p==='last30'){var x=new Date(now);x.setDate(d-30);dateFrom=fmt(x);dateTo=fmt(now);}
  else if(p==='last90'){var x=new Date(now);x.setDate(d-90);dateFrom=fmt(x);dateTo=fmt(now);}
  else if(p==='last180'){var x=new Date(now);x.setDate(d-180);dateFrom=fmt(x);dateTo=fmt(now);}
  else{dateFrom='';dateTo='';}
  document.getElementById('dateFrom').value=dateFrom;
  document.getElementById('dateTo').value=dateTo;
  applyDateFilter();destroyCharts();renderContent();
}
function onDateChange(){
  dateFrom=document.getElementById('dateFrom').value;
  dateTo=document.getElementById('dateTo').value;
  applyDateFilter();destroyCharts();renderContent();
}

function setMode(m,reload){
  mode=m;localStorage.setItem('csea_mode',m);
  document.getElementById('btnStrategy').className='mode-btn'+(m==='strategy'?' active':'');
  document.getElementById('btnPortfolio').className='mode-btn'+(m==='portfolio'?' active':'');
  activeTab='overview';
  var sel=document.getElementById('acctSelect');
  sel.options[0].textContent=m==='portfolio'?'&#128202; All Accounts (Combined)':'All Accounts';
  if(reload!==false){renderTabs();renderContent();}
}

function onAcctChange(){
  acctId=document.getElementById('acctSelect').value;
  localStorage.setItem('csea_account_id',acctId);
  loadData();
}

function renderTabs(){
  var tabs=mode==='strategy'?STRATEGY_TABS:PORTFOLIO_TABS;
  document.getElementById('tabBar').innerHTML=tabs.map(function(t){
    return'<button class="tab'+(activeTab===t?' active':'')+'" onclick="switchTab(\''+t+'\')">'+(TAB_LABELS[t]||t)+'</button>';
  }).join('');
}

function switchTab(t){
  activeTab=t;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  var found=document.querySelector('.tab[onclick="switchTab(\''+t+'\')"]');
  if(found) found.classList.add('active');
  destroyCharts();
  renderContent();
}

function renderContent(){
  var el=document.getElementById('mainContent');
  if(mode==='strategy'){
    if(activeTab==='overview')       el.innerHTML=renderStratOverview();
    else if(activeTab==='positions') el.innerHTML=renderPositions();
    else if(activeTab==='trades')    el.innerHTML=renderTrades();
    else if(activeTab==='signals')   el.innerHTML=renderSignals();
    else if(activeTab==='daily')     el.innerHTML=renderDaily();

function destroyCharts(){
  Object.values(charts).forEach(function(c){try{c.destroy();}catch(e){}});
  charts={};
}

function buildMonthlyGrid(cl){
  var yearMap={};
  cl.forEach(function(t){
    if(!t.ts) return;
    var yr=t.ts.slice(0,4),mo=parseInt(t.ts.slice(5,7))-1;
    if(!yearMap[yr]) yearMap[yr]=new Array(12).fill(null);
    yearMap[yr][mo]=(yearMap[yr][mo]||0)+parseFloat(t.pnl||0);
  });
  var years=Object.keys(yearMap).sort();
  if(!years.length) return '';
  var thead='<tr><th class="left">Year</th>'+MON.map(function(m){return'<th>'+m+'</th>';}).join('')+'<th>YTD</th></tr>';
  var tbody=years.map(function(yr){
    var row=yearMap[yr];
    var ytd=row.reduce(function(s,v){return s+(v||0);},0);
    var cells=row.map(function(v){
      if(v===null) return'<td class="m-zero">--</td>';
      return'<td class="'+(v>0?'m-pos':v<0?'m-neg':'m-zero')+'">$'+fmtPnl(v)+'</td>';
    }).join('');
    return'<tr><td class="year-col">'+yr+'</td>'+cells+'<td class="ytd-col '+(ytd>=0?'m-pos':'m-neg')+'">$'+fmtPnl(ytd)+'</td></tr>';
  }).join('');
  return'<div class="table-card" style="margin-bottom:20px"><div class="table-header"><span class="table-title">&#128197; Monthly Performance ($)</span></div>'
    +'<div class="monthly-table-wrap"><table class="monthly-table"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div></div>';
}

// ── STRATEGY OVERVIEW ─────────────────────────────────────────────
function renderStratOverview(){
  var cl=closed();
  var totalPnl=cl.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
  var openPnl=rawDb.positions.reduce(function(s,p){return s+parseFloat(p.pnl||0);},0);
  var wins=cl.filter(function(t){return parseFloat(t.pnl||0)>0;});
  var losses=cl.filter(function(t){return parseFloat(t.pnl||0)<0;});
  var winRate=cl.length?((wins.length/cl.length)*100).toFixed(1):'--';
  var gw=wins.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
  var gl=Math.abs(losses.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0));
  var pf=gl===0?'&#8734;':(gw/gl).toFixed(2);
  var avgWin=wins.length?(gw/wins.length).toFixed(2):'0.00';
  var avgLoss=losses.length?(gl/losses.length).toFixed(2):'0.00';
  var sorted=cl.slice().sort(function(a,b){return(a.ts||'').localeCompare(b.ts||'');});
  var run=0,peak=0,maxDD=0;
  sorted.forEach(function(t){
    run+=parseFloat(t.pnl||0);
    if(run>peak) peak=run;
    var dd=peak-run;
    if(dd>maxDD) maxDD=dd;
  });
  var bal=[],runB=0;
  sorted.forEach(function(t){runB+=parseFloat(t.pnl||0);bal.push(+runB.toFixed(2));});
  var avgDur='--';

  return'<div class="kpi-grid">'
    +'<div class="kpi"><div class="kpi-label">Total P&L</div><div class="kpi-val '+(totalPnl>=0?'pos':'neg')+'">$'+fmtPnl(totalPnl)+'</div><div class="kpi-sub">'+cl.length+' trades</div></div>'
    +'<div class="kpi"><div class="kpi-label">Float P&L</div><div class="kpi-val '+(openPnl>=0?'pos':'neg')+'">$'+fmtPnl(openPnl)+'</div><div class="kpi-sub">'+rawDb.positions.length+' open</div></div>'
    +'<div class="kpi"><div class="kpi-label">Win Rate</div><div class="kpi-val">'+winRate+'%</div><div class="kpi-sub">'+wins.length+'W / '+losses.length+'L</div></div>'
    +'<div class="kpi"><div class="kpi-label">Profit Factor</div><div class="kpi-val '+(parseFloat(pf)>=1.5?'pos':parseFloat(pf)<1?'neg':'')+'">'+pf+'</div><div class="kpi-sub">Gross W/L ratio</div></div>'
    +'<div class="kpi"><div class="kpi-label">Avg Win</div><div class="kpi-val pos">$'+avgWin+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Avg Loss</div><div class="kpi-val neg">$'+avgLoss+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Max Drawdown</div><div class="kpi-val neg">$'+maxDD.toFixed(2)+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Avg Duration</div><div class="kpi-val">'+avgDur+'h</div></div>'
    +'</div>'
    +'<div class="equity-card"><div class="chart-title">Equity Curve</div>'
    +'<div class="equity-wrap"><canvas id="equityChart" data-labels="'+encodeURIComponent(JSON.stringify(sorted.map(function(t){return(t.ts||'').slice(0,10);})))+'" data-values="'+encodeURIComponent(JSON.stringify(bal))+'"></canvas></div></div>'
    +'<div style="display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:20px">'
    +'<div class="chart-card"><div class="chart-title">Monthly P&L (12M)</div><div class="chart-wrap"><canvas id="monthlyChart"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Weekly P&L (4W)</div><div class="chart-wrap"><canvas id="weeklyChart"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Duration P&L</div><div class="chart-wrap"><canvas id="durationChart"></canvas></div></div>'
    +'</div>'
    +'<div class="table-card"><div class="table-header"><span class="table-title">Recent Closed Trades</span><span class="count-badge">'+cl.length+'</span>'
    +'<div class="filters">'
    +'<select id="symF" onchange="filterTrades()"><option value="">All Pairs</option>'+[...new Set(cl.map(function(t){return t.symbol;}))].sort().map(function(s){return'<option>'+s+'</option>';}).join('')+'</select>'
    +'<select id="dirF" onchange="filterTrades()"><option value="">Both</option><option>BUY</option><option>SELL</option></select>'
    +'<button class="csv-btn" onclick="exportCSV()">&#8595; CSV</button>'
    +'</div></div>'
    +'<div class="tbl-wrap"><table><thead><tr><th>Time</th><th>Symbol</th><th>Dir</th><th>Strong</th><th>Weak</th><th>Lot</th><th>Entry</th><th>P&L</th><th>Balance</th></tr></thead>'
    +'<tbody id="trdBody">'+renderTradeRows(cl)+'</tbody></table></div></div>';
}

// ── DAILY TAB ─────────────────────────────────────────────────────
// Layout order:
//   1. KPI strip
//   2. Last 20 Days dots
//   3. Monthly P&L (12M) — full width
//   4. Weekly P&L (4W) + Daily P&L (Last 5 Days) — side by side
//   5. Time of Day P&L — full width, taller
//   6. Monthly performance grid table
//   7. Daily log table
function renderDaily(){
  var cl=closed();
  if(!db.daily.length) return'<div class="empty-state"><div class="empty-icon">&#128197;</div><div class="empty-msg">No daily data yet</div></div>';
  var sorted=db.daily.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  var streak=0,streakDir='';
  for(var i=sorted.length-1;i>=0;i--){
    var p=parseFloat(sorted[i].daily_pnl||0);
    var dir=p>=0?'W':'L';
    if(!streakDir) streakDir=dir;
    if(dir===streakDir) streak++; else break;
  }
  var last20=sorted.slice(-20);
  var dots=last20.map(function(r){
    var v=parseFloat(r.daily_pnl||0);
    return'<span class="streak-dot" style="background:'+(v>=0?'#4ade80':'#f87171')+'" title="'+r.date+' $'+fmtPnl(v)+'"></span>';
  }).join('');

  // Weekly (4W)
  var wMap={};
  cl.forEach(function(t){
    if(!t.ts) return;
    var d=new Date(t.ts),m=new Date(d);
    m.setDate(d.getDate()-((d.getDay()+6)%7));
    var w=m.toISOString().slice(0,10);
    wMap[w]=(wMap[w]||0)+parseFloat(t.pnl||0);
  });
  var wKeys=Object.keys(wMap).sort().slice(-4);
  var wVals=wKeys.map(function(k){return+(wMap[k]).toFixed(2);});

  // Monthly (12M)
  var mMap={};
  cl.forEach(function(t){if(t.ts){var m=t.ts.slice(0,7);mMap[m]=(mMap[m]||0)+parseFloat(t.pnl||0);}});
  var mKeys=Object.keys(mMap).sort().slice(-12);
  var mLabels=mKeys.map(function(k){return MON[parseInt(k.slice(5))-1];});
  var mVals=mKeys.map(function(k){return+(mMap[k]).toFixed(2);});

  // Daily P&L last 5 days (from rawDb — all closed trades, not date-filtered)
  var allCl=rawDb.trades.filter(function(t){return t.event==='CLOSE'||t.event==='COMPOUND_CLOSE';});
  var dayMap={};
  allCl.forEach(function(t){
    if(!t.ts) return;
    var day=t.ts.slice(0,10);
    dayMap[day]=(dayMap[day]||0)+parseFloat(t.pnl||0);
  });
  var d5keys=Object.keys(dayMap).sort().slice(-5);
  var d5labels=d5keys.map(function(d){return d.slice(5);});
  var d5vals=d5keys.map(function(d){return+dayMap[d].toFixed(2);});

  // Time of Day (24h buckets)
  var hVals=new Array(24).fill(0);
  cl.forEach(function(t){if(t.ts) hVals[new Date(t.ts).getUTCHours()]+=parseFloat(t.pnl||0);});
  hVals=hVals.map(function(v){return+v.toFixed(2);});

  var perfTable=buildMonthlyGrid(cl);
  var winDays=sorted.filter(function(r){return parseFloat(r.daily_pnl||0)>0;}).length;
  var lossDays=sorted.filter(function(r){return parseFloat(r.daily_pnl||0)<0;}).length;

  return'<div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr))">'
    +'<div class="kpi"><div class="kpi-label">Streak</div><div class="kpi-val '+(streakDir==='W'?'pos':'neg')+'">'+streak+(streakDir||'')+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Total Days</div><div class="kpi-val">'+sorted.length+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Win Days</div><div class="kpi-val pos">'+winDays+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Loss Days</div><div class="kpi-val neg">'+lossDays+'</div></div>'
    +'</div>'
    +'<div class="chart-card" style="margin-bottom:20px"><div class="chart-title">Last 20 Days</div>'
    +'<div class="streak-dots">'+dots+'</div></div>'
    // Row 1: Monthly P&L full width
    +'<div class="chart-card" style="margin-bottom:20px"><div class="chart-title">Monthly P&L (12M)</div>'
    +'<div class="chart-wrap"><canvas id="monthlyDailyChart" data-mkeys="'+encodeURIComponent(JSON.stringify(mLabels))+'" data-mvals="'+encodeURIComponent(JSON.stringify(mVals))+'"></canvas></div></div>'
    // Row 2: Weekly + Daily P&L side by side
    +'<div class="charts-row-2">'
    +'<div class="chart-card"><div class="chart-title">Weekly P&L (4W)</div><div class="chart-wrap"><canvas id="weeklyDailyChart" data-wkeys="'+encodeURIComponent(JSON.stringify(wKeys))+'" data-wvals="'+encodeURIComponent(JSON.stringify(wVals))+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Daily P&L (Last 5 Days)</div><div class="chart-wrap"><canvas id="daily5Chart" data-keys="'+encodeURIComponent(JSON.stringify(d5labels))+'" data-vals="'+encodeURIComponent(JSON.stringify(d5vals))+'"></canvas></div></div>'
    +'</div>'
    // Row 3: Time of Day full width, taller
    +'<div class="chart-card" style="margin-bottom:20px"><div class="chart-title">Time of Day P&L (UTC)</div>'
    +'<div class="chart-wrap tall"><canvas id="todChart" data-hvals="'+encodeURIComponent(JSON.stringify(hVals))+'"></canvas></div></div>'
    +perfTable
    +'<div class="table-card"><div class="table-header"><span class="table-title">Daily Log</span><span class="count-badge">'+sorted.length+' days</span></div>'
    +'<div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Day #</th><th>Start Bal</th><th>Daily P&L</th><th>Trades</th><th>Lot</th><th>Target</th><th>Hit?</th></tr></thead><tbody>'
    +sorted.slice().reverse().map(function(r){
      var pnl=parseFloat(r.daily_pnl||0);
      return'<tr>'
        +'<td>'+r.date+'</td>'
        +'<td>'+r.compound_day+'</td>'
        +'<td>$'+parseFloat(r.start_balance||0).toFixed(2)+'</td>'
        +'<td style="color:'+(pnl>=0?'#16a34a':'#dc2626')+';font-weight:700">$'+fmtPnl(pnl)+'</td>'
        +'<td>'+(r.trades_closed||0)+'</td>'
        +'<td>'+parseFloat(r.compound_lot||0).toFixed(2)+'</td>'
        +'<td>$'+parseFloat(r.compound_target||0).toFixed(2)+'</td>'
        +'<td>'+(r.target_hit?'<span style="color:#16a34a;font-weight:700">&#10003;</span>':'<span style="color:#94a3b8">&#8212;</span>')+'</td>'
        +'</tr>';
    }).join('')
    +'</tbody></table></div></div>';
}

// ── HEATMAP ───────────────────────────────────────────────────────
function renderHeatmap(){
  var cl=closed();
  var pairMap={};
  cl.forEach(function(t){
    if(!t.symbol) return;
    if(!pairMap[t.symbol]) pairMap[t.symbol]={pnl:0,trades:0,wins:0};
    pairMap[t.symbol].pnl+=parseFloat(t.pnl||0);
    pairMap[t.symbol].trades++;
    if(parseFloat(t.pnl||0)>0) pairMap[t.symbol].wins++;
  });
  var pairs=Object.keys(pairMap).sort(function(a,b){return pairMap[b].pnl-pairMap[a].pnl;});
  if(!pairs.length) return'<div class="empty-state"><div class="empty-icon">&#128200;</div><div class="empty-msg">No trade data</div></div>';
  var maxAbs=Math.max(...pairs.map(function(p){return Math.abs(pairMap[p].pnl);}));
  var cells=pairs.map(function(p){
    var d=pairMap[p];
    var pnl=d.pnl;
    var wr=d.trades?(d.wins/d.trades*100).toFixed(0):0;
    var intensity=maxAbs>0?Math.abs(pnl)/maxAbs:0;
    var bg=pnl>=0?'rgba(22,163,74,'+(.1+intensity*.6)+')'  :'rgba(220,38,38,'+(.1+intensity*.6)+')';
    var col=pnl>=0?'#14532d':'#7f1d1d';
    return'<div class="heatmap-cell" style="background:'+bg+';color:'+col+'">'
      +'<div style="font-size:12px;font-weight:800">'+p+'</div>'
      +'<div style="font-size:11px;margin-top:3px">$'+fmtPnl(pnl)+'</div>'
      +'<div style="font-size:10px;opacity:.7">'+d.trades+'t &bull; '+wr+'%</div>'
      +'</div>';
  }).join('');
  return'<div class="heatmap-grid" style="grid-template-columns:repeat(auto-fill,minmax(110px,1fr))">'+cells+'</div>';
}

// ── CURRENCIES ────────────────────────────────────────────────────
function renderCurrencies(){
  var cl=closed();
  var curMap={};
  cl.forEach(function(t){
    var curs=[t.strong_cur,t.weak_cur].filter(Boolean);
    curs.forEach(function(c){
      if(!curMap[c]) curMap[c]={pnl:0,trades:0,wins:0,strong:0,weak:0};
      curMap[c].pnl+=parseFloat(t.pnl||0);
      curMap[c].trades++;
      if(parseFloat(t.pnl||0)>0) curMap[c].wins++;
      if(t.strong_cur===c) curMap[c].strong++;
      else curMap[c].weak++;
    });
  });
  var curs=Object.keys(curMap).sort(function(a,b){return curMap[b].pnl-curMap[a].pnl;});
  if(!curs.length) return'<div class="empty-state"><div class="empty-icon">&#128176;</div><div class="empty-msg">No currency data</div></div>';
  return'<div class="cur-grid">'+curs.map(function(c){
    var d=curMap[c];
    var wr=d.trades?(d.wins/d.trades*100).toFixed(1):0;
    return'<div class="kpi">'
      +'<div class="kpi-label">'+c+'</div>'
      +'<div class="kpi-val '+(d.pnl>=0?'pos':'neg')+'">$'+fmtPnl(d.pnl)+'</div>'
      +'<div class="kpi-sub">'+d.trades+' trades &bull; '+wr+'% WR</div>'
      +'<div class="kpi-sub">Strong: '+d.strong+' &bull; Weak: '+d.weak+'</div>'
      +'</div>';
  }).join('')+'</div>';
}

// ── COMPARE ───────────────────────────────────────────────────────
function renderCompare(){
  if(allAccounts.length<2) return'<div class="empty-state"><div class="empty-icon">&#128202;</div><div class="empty-msg">Need 2+ accounts to compare</div></div>';
  var cards=allAccounts.map(function(a){
    var cl=(allAccountsData[a.id]||[]).filter(function(t){return t.event==='CLOSE'||t.event==='COMPOUND_CLOSE';});
    var pnl=cl.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
    var wins=cl.filter(function(t){return parseFloat(t.pnl||0)>0;}).length;
    var wr=cl.length?(wins/cl.length*100).toFixed(1):0;
    return'<div class="compare-card">'
      +'<div class="compare-card-title">'+a.label+'</div>'
      +'<div class="compare-kpi-grid">'
      +'<div class="compare-kpi"><div class="compare-kpi-label">Total P&L</div><div class="compare-kpi-val" style="color:'+(pnl>=0?'#16a34a':'#dc2626')+'">$'+fmtPnl(pnl)+'</div></div>'
      +'<div class="compare-kpi"><div class="compare-kpi-label">Win Rate</div><div class="compare-kpi-val">'+wr+'%</div></div>'
      +'<div class="compare-kpi"><div class="compare-kpi-label">Trades</div><div class="compare-kpi-val">'+cl.length+'</div></div>'
      +'<div class="compare-kpi"><div class="compare-kpi-label">Wins</div><div class="compare-kpi-val">'+wins+'</div></div>'
      +'</div></div>';
  }).join('');
  return'<div class="compare-grid">'+cards+'</div>';
}

// ── PORTFOLIO OVERVIEW ────────────────────────────────────────────
function renderPortOverview(){
  var cl=closed();
  var totalPnl=cl.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
  var openPnl=rawDb.positions.reduce(function(s,p){return s+parseFloat(p.pnl||0);},0);
  var wins=cl.filter(function(t){return parseFloat(t.pnl||0)>0;});
  var losses=cl.filter(function(t){return parseFloat(t.pnl||0)<0;});
  var wr=cl.length?((wins.length/cl.length)*100).toFixed(1):0;
  var gw=wins.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0);
  var gl=Math.abs(losses.reduce(function(s,t){return s+parseFloat(t.pnl||0);},0));
  var pf=gl===0?'&#8734;':(gw/gl).toFixed(2);
  return'<div class="kpi-grid">'
    +'<div class="kpi"><div class="kpi-label">Total P&L</div><div class="kpi-val '+(totalPnl>=0?'pos':'neg')+'">$'+fmtPnl(totalPnl)+'</div><div class="kpi-sub">'+cl.length+' trades</div></div>'
    +'<div class="kpi"><div class="kpi-label">Float P&L</div><div class="kpi-val '+(openPnl>=0?'pos':'neg')+'">$'+fmtPnl(openPnl)+'</div><div class="kpi-sub">'+rawDb.positions.length+' open</div></div>'
    +'<div class="kpi"><div class="kpi-label">Win Rate</div><div class="kpi-val">'+wr+'%</div></div>'
    +'<div class="kpi"><div class="kpi-label">Profit Factor</div><div class="kpi-val">'+pf+'</div></div>'
    +'</div>'
    +'<div class="equity-card"><div class="chart-title">Portfolio Equity Curve</div><div class="equity-wrap"><canvas id="portEquityChart"></canvas></div></div>'
    +'<div style="display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:20px">'
    +'<div class="chart-card"><div class="chart-title">Monthly P&L (12M)</div><div class="chart-wrap"><canvas id="monthlyBarChart"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Weekly P&L (4W)</div><div class="chart-wrap"><canvas id="weeklyChart"></canvas></div></div>'
    +'</div>';
}

// ── PERFORMANCE ───────────────────────────────────────────────────
function renderPerformance(){
  var cl=closed();
  var hVals=new Array(24).fill(0);
  cl.forEach(function(t){if(t.ts) hVals[new Date(t.ts).getUTCHours()]+=parseFloat(t.pnl||0);});
  hVals=hVals.map(function(v){return+v.toFixed(2);});

  var wMap={};
  cl.forEach(function(t){if(!t.ts)return;var d=new Date(t.ts),m=new Date(d);m.setDate(d.getDate()-((d.getDay()+6)%7));var w=m.toISOString().slice(0,10);wMap[w]=(wMap[w]||0)+parseFloat(t.pnl||0);});
  var wks=Object.keys(wMap).sort().slice(-4),wvs=wks.map(function(k){return+wMap[k].toFixed(2);});

  var mMap={};
  cl.forEach(function(t){if(t.ts){var m=t.ts.slice(0,7);mMap[m]=(mMap[m]||0)+parseFloat(t.pnl||0);}});
  var mons=Object.keys(mMap).sort().slice(-12),mvs=mons.map(function(k){return+mMap[k].toFixed(2);});

  var dMap={'<1h':0,'1-4h':0,'4-24h':0,'>24h':0};
  cl.forEach(function(t){var dur=parseFloat(t.duration_min||0);if(dur<60)dMap['<1h']+=parseFloat(t.pnl||0);else if(dur<240)dMap['1-4h']+=parseFloat(t.pnl||0);else if(dur<1440)dMap['4-24h']+=parseFloat(t.pnl||0);else dMap['>24h']+=parseFloat(t.pnl||0);});
  var dk=Object.keys(dMap),dv=Object.values(dMap).map(function(v){return+v.toFixed(2);});

  var allCl=rawDb.trades.filter(function(t){return t.event==='CLOSE'||t.event==='COMPOUND_CLOSE';});
  var dayMap={};
  allCl.forEach(function(t){if(!t.ts)return;var day=t.ts.slice(0,10);dayMap[day]=(dayMap[day]||0)+parseFloat(t.pnl||0);});
  var d5keys=Object.keys(dayMap).sort().slice(-5);
  var d5labels=d5keys.map(function(d){return d.slice(5);});
  var d5vals=d5keys.map(function(d){return+dayMap[d].toFixed(2);});

  var perfTable=buildMonthlyGrid(cl);

  return'<div class="perf-grid">'
    +'<div class="chart-card"><div class="chart-title">Daily P&L (Last 5 Days)</div><div class="chart-wrap"><canvas id="perfDaily5" data-labels="'+encodeURIComponent(JSON.stringify(d5labels))+'" data-vals="'+encodeURIComponent(JSON.stringify(d5vals))+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Weekly P&L (4W)</div><div class="chart-wrap"><canvas id="perfWeekly" data-labels="'+encodeURIComponent(JSON.stringify(wks))+'" data-vals="'+encodeURIComponent(JSON.stringify(wvs))+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Monthly P&L (12M)</div><div class="chart-wrap"><canvas id="perfMonthly" data-labels="'+encodeURIComponent(JSON.stringify(mons.map(function(m){return MON[parseInt(m.slice(5))-1];})))+'" data-vals="'+encodeURIComponent(JSON.stringify(mvs))+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Time of Day P&L</div><div class="chart-wrap"><canvas id="perfTod" data-vals="'+encodeURIComponent(JSON.stringify(hVals))+'"></canvas></div></div>'
    +'<div class="chart-card"><div class="chart-title">Duration P&L</div><div class="chart-wrap"><canvas id="perfDuration" data-keys="'+encodeURIComponent(JSON.stringify(dk))+'" data-vals="'+encodeURIComponent(JSON.stringify(dv))+'"></canvas></div></div>'
    +'</div>'
    +'<div class="table-card">'
    +'<div class="table-header"><span class="table-title">&#128197; Monthly Performance ($)</span></div>'
    +perfTable
    +'</div>';
}

// ── INSPECTOR ─────────────────────────────────────────────────────
function openInspector(ticket){
  var t=db.trades.find(function(x){return String(x.ticket)===String(ticket)&&(x.event==='CLOSE'||x.event==='COMPOUND_CLOSE');});
  if(!t) return;
  var oe=rawDb.trades.find(function(x){return String(x.ticket)===String(ticket)&&x.event==='OPEN';});
  var dur=null;
  if(oe&&oe.ts&&t.ts) dur=Math.round((new Date(t.ts)-new Date(oe.ts))/60000);
  var pnl=parseFloat(t.pnl||0);
  var rows=[
    ['Symbol',t.symbol],['Direction',t.direction],['Ticket',t.ticket],
    ['P&L','$'+fmtPnl(pnl)],['Balance','$'+parseFloat(t.balance||0).toFixed(2)],
    ['Lot',parseFloat(t.lot||0).toFixed(2)],['Entry',parseFloat(t.entry||0).toFixed(5)],
    ['SL',t.sl?parseFloat(t.sl).toFixed(5):'--'],['TP',t.tp?parseFloat(t.tp).toFixed(5):'--'],
    ['Open Time',oe?(oe.ts||'').slice(0,16):'--'],['Close Time',(t.ts||'').slice(0,16)],
    ['Duration',dur!==null?(dur<60?dur+'m':Math.floor(dur/60)+'h '+dur%60+'m'):'--'],
    ['Strong',t.strong_cur||'--'],['Weak',t.weak_cur||'--'],['Gap',t.gap?parseFloat(t.gap).toFixed(4):'--']
  ];
  document.getElementById('inspBody').innerHTML='<h3 style="margin-bottom:16px;font-size:16px">Trade Details</h3>'
    +rows.map(function(r){return'<div class="insp-row"><span class="insp-label">'+r[0]+'</span><span class="insp-val">'+r[1]+'</span></div>';}).join('');
  document.getElementById('inspector').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeInspector(){
  document.getElementById('inspector').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── CHARTS ────────────────────────────────────────────────────────
function lineOpts(cd){
  var o=JSON.parse(JSON.stringify(cd));
  o.elements={point:{radius:0}};
  return o;
}
function barColors(vals,posC,negC){
  return vals.map(function(v){return v>=0?(posC||'rgba(59,130,246,.75)'):(negC||'rgba(239,68,68,.75)');});
}

function renderCharts(){
  var cd={
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return'$'+ctx.raw.toFixed(2);}}}},
    scales:{x:{ticks:{color:'#94a3b8',font:{size:9}},grid:{display:false}},y:{ticks:{color:'#94a3b8',font:{size:9}},grid:{color:'#f1f5f9'}}}
  };
  var cl=closed();
  var allCl=rawDb.trades.filter(function(t){return t.event==='CLOSE'||t.event==='COMPOUND_CLOSE';});

  // Equity curve
  var eq=document.getElementById('equityChart');
  if(eq){
    var el=JSON.parse(decodeURIComponent(eq.dataset.labels||'[]'));
    var ev=JSON.parse(decodeURIComponent(eq.dataset.values||'[]'));
    charts.eq=new Chart(eq,{type:'line',data:{labels:el,datasets:[{data:ev,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.3,pointRadius:0,borderWidth:2}]},options:lineOpts(cd)});
  }

  // Portfolio equity
  var peq=document.getElementById('portEquityChart');
  if(peq){
    var run=0,bal2=[];
    cl.slice().sort(function(a,b){return(a.ts||'').localeCompare(b.ts||'');}).forEach(function(t){run+=parseFloat(t.pnl||0);bal2.push(+run.toFixed(2));});
    charts.peq=new Chart(peq,{type:'line',data:{labels:bal2.map(function(_,i){return String(i);}),datasets:[{data:bal2,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.3,pointRadius:0,borderWidth:2}]},options:lineOpts(cd)});
  }

  // Monthly — strategy overview (last 12M, full history)
  var mc=document.getElementById('monthlyChart');
  if(mc){
    var mm={};allCl.forEach(function(t){if(t.ts){var m=t.ts.slice(0,7);mm[m]=(mm[m]||0)+parseFloat(t.pnl||0);}});
    var mk=Object.keys(mm).sort().slice(-12),mv=mk.map(function(k){return+mm[k].toFixed(2);});
    charts.mc=new Chart(mc,{type:'bar',data:{labels:mk.map(function(m){return MON[parseInt(m.slice(5))-1];}),datasets:[{data:mv,backgroundColor:barColors(mv)}]},options:cd});
  }

  // Portfolio monthly bar
  var mbc=document.getElementById('monthlyBarChart');
  if(mbc){
    var mm2={};allCl.forEach(function(t){if(t.ts){var m=t.ts.slice(0,7);mm2[m]=(mm2[m]||0)+parseFloat(t.pnl||0);}});
    var mk2=Object.keys(mm2).sort().slice(-12),mv2=mk2.map(function(k){return+mm2[k].toFixed(2);});
    charts.mbc=new Chart(mbc,{type:'bar',data:{labels:mk2.map(function(m){return MON[parseInt(m.slice(5))-1];}),datasets:[{data:mv2,backgroundColor:barColors(mv2)}]},options:cd});
  }

  // Weekly — strategy overview
  var wc=document.getElementById('weeklyChart');
  if(wc){
    var wm={};allCl.forEach(function(t){if(!t.ts)return;var d=new Date(t.ts),mo=new Date(d);mo.setDate(d.getDate()-((d.getDay()+6)%7));var w=mo.toISOString().slice(0,10);wm[w]=(wm[w]||0)+parseFloat(t.pnl||0);});
    var wk=Object.keys(wm).sort().slice(-4),wv=wk.map(function(k){return+wm[k].toFixed(2);});
    charts.wc=new Chart(wc,{type:'bar',data:{labels:wk.map(function(d){return d.slice(5);}),datasets:[{data:wv,backgroundColor:barColors(wv)}]},options:cd});
  }

  // Duration
  var dc=document.getElementById('durationChart');
  if(dc){
    var dm={'<1h':0,'1-4h':0,'4-24h':0,'>24h':0};
    cl.forEach(function(t){var dur=parseFloat(t.duration_min||0);if(dur<60)dm['<1h']+=parseFloat(t.pnl||0);else if(dur<240)dm['1-4h']+=parseFloat(t.pnl||0);else if(dur<1440)dm['4-24h']+=parseFloat(t.pnl||0);else dm['>24h']+=parseFloat(t.pnl||0);});
    var dk2=Object.keys(dm),dv2=Object.values(dm).map(function(v){return+v.toFixed(2);});
    charts.dc=new Chart(dc,{type:'bar',data:{labels:dk2,datasets:[{data:dv2,backgroundColor:barColors(dv2)}]},options:cd});
  }

  // ── DAILY TAB CHARTS ──────────────────────────────────────────

  // Monthly Daily tab (12M)
  var mdc=document.getElementById('monthlyDailyChart');
  if(mdc){
    var mdkeys=JSON.parse(decodeURIComponent(mdc.dataset.mkeys||'[]'));
    var mdvals=JSON.parse(decodeURIComponent(mdc.dataset.mvals||'[]'));
    charts.mdc=new Chart(mdc,{type:'bar',data:{labels:mdkeys,datasets:[{data:mdvals,backgroundColor:barColors(mdvals)}]},options:cd});
  }

  // Weekly Daily tab
  var wdc=document.getElementById('weeklyDailyChart');
  if(wdc){
    var wdkeys=JSON.parse(decodeURIComponent(wdc.dataset.wkeys||'[]'));
    var wdvals=JSON.parse(decodeURIComponent(wdc.dataset.wvals||'[]'));
    charts.wdc=new Chart(wdc,{type:'bar',data:{labels:wdkeys.map(function(d){return d.slice(5);}),datasets:[{data:wdvals,backgroundColor:barColors(wdvals)}]},options:cd});
  }

  // Daily 5 days
  var d5c=document.getElementById('daily5Chart');
  if(d5c){
    var d5keys2=JSON.parse(decodeURIComponent(d5c.dataset.keys||'[]'));
    var d5vals2=JSON.parse(decodeURIComponent(d5c.dataset.vals||'[]'));
    charts.d5c=new Chart(d5c,{type:'bar',data:{labels:d5keys2,datasets:[{data:d5vals2,backgroundColor:barColors(d5vals2)}]},options:cd});
  }

  // Time of Day
  var todc=document.getElementById('todChart');
  if(todc){
    var hv=JSON.parse(decodeURIComponent(todc.dataset.hvals||'[]'));
    var hlabels=Array.from({length:24},function(_,i){return String(i).padStart(2,'0')+':00';});
    charts.tod=new Chart(todc,{type:'bar',data:{labels:hlabels,datasets:[{data:hv,backgroundColor:barColors(hv)}]},options:cd});
  }

  // Performance tab charts
  var pd5=document.getElementById('perfDaily5');
  if(pd5){
    var pd5l=JSON.parse(decodeURIComponent(pd5.dataset.labels||'[]'));
    var pd5v=JSON.parse(decodeURIComponent(pd5.dataset.vals||'[]'));
    charts.pd5=new Chart(pd5,{type:'bar',data:{labels:pd5l,datasets:[{data:pd5v,backgroundColor:barColors(pd5v)}]},options:cd});
  }
  var pw=document.getElementById('perfWeekly');
  if(pw){
    var pwl=JSON.parse(decodeURIComponent(pw.dataset.labels||'[]'));
    var pwv=JSON.parse(decodeURIComponent(pw.dataset.vals||'[]'));
    charts.pw=new Chart(pw,{type:'bar',data:{labels:pwl.map(function(d){return d.slice(5);}),datasets:[{data:pwv,backgroundColor:barColors(pwv)}]},options:cd});
  }
  var pm=document.getElementById('perfMonthly');
  if(pm){
    var pml=JSON.parse(decodeURIComponent(pm.dataset.labels||'[]'));
    var pmv=JSON.parse(decodeURIComponent(pm.dataset.vals||'[]'));
    charts.pm=new Chart(pm,{type:'bar',data:{labels:pml,datasets:[{data:pmv,backgroundColor:barColors(pmv)}]},options:cd});
  }
  var ptod=document.getElementById('perfTod');
  if(ptod){
    var pthv=JSON.parse(decodeURIComponent(ptod.dataset.vals||'[]'));
    var ptlabels=Array.from({length:24},function(_,i){return String(i).padStart(2,'0')+':00';});
    charts.ptod=new Chart(ptod,{type:'bar',data:{labels:ptlabels,datasets:[{data:pthv,backgroundColor:barColors(pthv)}]},options:cd});
  }
  var pdur=document.getElementById('perfDuration');
  if(pdur){
    var pdk=JSON.parse(decodeURIComponent(pdur.dataset.keys||'[]'));
    var pdv=JSON.parse(decodeURIComponent(pdur.dataset.vals||'[]'));
    charts.pdur=new Chart(pdur,{type:'bar',data:{labels:pdk,datasets:[{data:pdv,backgroundColor:barColors(pdv)}]},options:cd});
  }
}
