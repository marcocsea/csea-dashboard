<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CSEA Trading Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
:root{--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--gold:#f59e0b;--cyan:#06b6d4;--purple:#a855f7;--bg1:#0a0e1a;--bg2:#111827;--bg3:#1f2937;--bg4:#374151;--border:#2d3748;--text:#e2e8f0;--sub:#9ca3af}

/* HEADER */
.header{background:linear-gradient(135deg,#0f172a,#1e1b4b);border-bottom:1px solid #312e81;padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.logo span{color:var(--gold)}
.badge{background:#312e81;color:#a5b4fc;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.off{background:var(--red);box-shadow:0 0 6px var(--red)}
.status-txt{font-size:12px;color:var(--sub)}
.last-sync{font-size:11px;color:var(--sub)}

/* TABS */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px}
.tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text)}
.tab.active{color:#fff;border-bottom-color:var(--blue)}

/* MAIN */
.main{padding:24px;max-width:1400px;margin:0 auto}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .2s}
.kpi:hover{border-color:var(--blue)}
.kpi-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;color:#fff}
.kpi-value.green{color:var(--green)}
.kpi-value.red{color:var(--red)}
.kpi-value.gold{color:var(--gold)}
.kpi-value.cyan{color:var(--cyan)}
.kpi-sub{font-size:11px;color:var(--sub);margin-top:4px}

/* CHARTS ROW */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px}
.chart-title{font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.chart-wrap{position:relative;height:200px}

/* TABLE */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.table-title{font-size:14px;font-weight:600;color:#fff}
.count-badge{background:var(--bg3);color:var(--sub);padding:2px 8px;border-radius:4px;font-size:11px}
.filters{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:12px;outline:none}
.tbl-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0}
td{padding:10px 12px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--bg3);cursor:pointer}
.badge-open{background:#1a3a2a;color:var(--green);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.badge-closed{background:#1a2035;color:#60a5fa;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.badge-partial{background:#2a2a1a;color:var(--gold);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.badge-blocked{background:#2a1a1a;color:var(--red);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.badge-opened{background:#1a3a2a;color:var(--green);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}

/* HEATMAP */
.heatmap{display:flex;flex-wrap:wrap;gap:10px;padding:20px}
.tile{border-radius:8px;padding:14px 18px;min-width:120px;text-align:center;border:1px solid transparent}
.tile-sym{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px}
.tile-wr{font-size:22px;font-weight:700}
.tile-wl{font-size:10px;color:var(--sub);margin-top:2px}
.tile-pnl{font-size:10px;margin-top:2px}

/* SLIDE-OUT INSPECTOR */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none}
.overlay.open{display:block}
.inspector{position:fixed;right:0;top:0;bottom:0;width:400px;background:#0f172a;border-left:1px solid #312e81;z-index:201;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;padding:24px}
.inspector.open{transform:translateX(0)}
.insp-close{position:absolute;top:16px;right:16px;background:var(--bg3);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.insp-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;padding-right:40px}
.insp-sub{font-size:12px;color:var(--sub);margin-bottom:20px}
.insp-section{margin-bottom:16px}
.insp-section-title{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.insp-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}
.insp-row .lbl{color:var(--sub)}
.insp-row .val{color:#fff;font-weight:500}
.news-flag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;margin-top:8px}
.news-clean{background:#1a3a2a;color:var(--green)}
.news-adjacent{background:#2a2a1a;color:var(--gold)}
.news-high{background:#2a1a1a;color:var(--red)}

/* DAILY CALENDAR */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:20px}
.cal-day{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;cursor:pointer;position:relative}
.cal-day.hit{background:#1a3a2a;color:var(--green)}
.cal-day.loss{background:#2a1a1a;color:var(--red)}
.cal-day.nodata{background:var(--bg3);color:var(--sub)}
.cal-day.empty{background:transparent}

/* LOADING / EMPTY */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:var(--sub);gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px;color:var(--sub)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-msg{font-size:14px;margin-bottom:6px;color:var(--text)}
.empty-sub{font-size:12px}

/* RESPONSIVE */
@media(max-width:768px){
  .charts-row{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .inspector{width:100%}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚡ <span>CSEA</span> Intelligence</div>
  <div class="badge">v1.0</div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-txt" id="statusTxt">Connecting...</span>
    <span class="last-sync" id="lastSync"></span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('overview',this)">Overview</button>
  <button class="tab" onclick="setTab('trades',this)">Trades</button>
  <button class="tab" onclick="setTab('signals',this)">Signals</button>
  <button class="tab" onclick="setTab('daily',this)">Daily</button>
  <button class="tab" onclick="setTab('heatmap',this)">Pair Heatmap</button>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div><span>Loading data...</span></div>
</div>

<!-- Trade Inspector -->
<div class="overlay" id="overlay" onclick="closeInspector()"></div>
<div class="inspector" id="inspector">
  <button class="insp-close" onclick="closeInspector()">✕</button>
  <div id="inspContent"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SUPA_URL  = 'https://nmyveijljquxvhjelqbc.supabase.co';
const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teXZlaWpsanF1eHZoamVscWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjc2MjgsImV4cCI6MjA4Nzk0MzYyOH0.placeholder'; // replaced by env on Vercel

// ── STATE ───────────────────────────────────────────────────────
let db = { trades:[], signals:[], daily:[], accounts:[] };
let currentTab = 'overview';
let charts = {};
let filterSym = 'ALL', filterDir = 'ALL', filterResult = 'ALL';

// ── SUPABASE FETCH ───────────────────────────────────────────────
async function query(table, params='') {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}&limit=5000`, {
    headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
  });
  if(!r.ok) throw new Error(`${table}: ${r.status}`);
  return r.json();
}

async function loadAll() {
  try {
    const [trades, signals, daily, accounts] = await Promise.all([
      query('trades','order=ts.asc'),
      query('signals','order=ts.asc'),
      query('daily','order=date.asc'),
      query('accounts','select=id,label,account_number,account_type,strategy')
    ]);
    db = { trades, signals, daily, accounts };
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusTxt').textContent = 'Live';
    document.getElementById('lastSync').textContent = 'Synced ' + new Date().toLocaleTimeString();
    render();
  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot off';
    document.getElementById('statusTxt').textContent = 'Error';
    document.getElementById('main').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-msg">Could not connect to Supabase</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

// ── TAB ROUTING ──────────────────────────────────────────────────
function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  destroyCharts();
  const m = document.getElementById('main');
  if(currentTab==='overview') m.innerHTML = renderOverview();
  else if(currentTab==='trades') m.innerHTML = renderTrades();
  else if(currentTab==='signals') m.innerHTML = renderSignals();
  else if(currentTab==='daily') m.innerHTML = renderDaily();
  else if(currentTab==='heatmap') m.innerHTML = renderHeatmap();
  afterRender();
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try{c.destroy()}catch(e){} });
  charts = {};
}

// ── STATS ────────────────────────────────────────────────────────
function getClosedTrades() {
  // Group by ticket, find CLOSE/COMPOUND_CLOSE events
  const map = {};
  db.trades.forEach(r => {
    if(!map[r.ticket]) map[r.ticket] = {};
    map[r.ticket][r.event] = r;
    if(!map[r.ticket]._open && r.event==='OPEN') map[r.ticket]._open = r;
  });
  return Object.values(map).filter(t => t.CLOSE||t.COMPOUND_CLOSE).map(t => {
    const open = t.OPEN||t._open||{};
    const close = t.CLOSE||t.COMPOUND_CLOSE||{};
    return { ...open, closePnL: close.pnl||0, closeTime: close.ts, event: close.event };
  });
}

function calcStats() {
  const closed = getClosedTrades();
  if(!closed.length) return null;
  const wins = closed.filter(t => t.closePnL > 0);
  const losses = closed.filter(t => t.closePnL < 0);
  const winRate = closed.length ? (wins.length/closed.length*100) : 0;
  const totalPnL = closed.reduce((s,t) => s+t.closePnL, 0);
  const avgWin = wins.length ? wins.reduce((s,t)=>s+t.closePnL,0)/wins.length : 0;
  const avgLoss = losses.length ? losses.reduce((s,t)=>s+t.closePnL,0)/losses.length : 0;
  const sumWins = wins.reduce((s,t)=>s+t.closePnL,0);
  const sumLoss = Math.abs(losses.reduce((s,t)=>s+t.closePnL,0));
  const profitFactor = sumLoss > 0 ? sumWins/sumLoss : sumWins > 0 ? 999 : 0;
  const rr = avgLoss !== 0 ? Math.abs(avgWin/avgLoss) : 0;

  // Max drawdown from daily
  let peak = 0, maxDD = 0;
  db.daily.forEach(d => {
    const b = parseFloat(d.end_balance||0);
    if(b > peak) peak = b;
    const dd = peak > 0 ? (peak-b)/peak*100 : 0;
    if(dd > maxDD) maxDD = dd;
  });

  // Streaks
  let maxWinStreak=0, maxLoseStreak=0, curWin=0, curLose=0;
  closed.forEach(t => {
    if(t.closePnL>0){ curWin++; curLose=0; maxWinStreak=Math.max(maxWinStreak,curWin); }
    else{ curLose++; curWin=0; maxLoseStreak=Math.max(maxLoseStreak,curLose); }
  });

  const lastBal = db.daily.length ? parseFloat(db.daily[db.daily.length-1].end_balance||0) : 0;
  const lastDay = db.daily.length ? db.daily[db.daily.length-1] : null;

  return { closed, wins, losses, winRate, totalPnL, avgWin, avgLoss,
           profitFactor, rr, maxDD, maxWinStreak, maxLoseStreak,
           lastBal, lastDay };
}

// ── OVERVIEW ─────────────────────────────────────────────────────
function renderOverview() {
  const s = calcStats();
  if(!s) return `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-msg">No trade data yet</div><div class="empty-sub">Data will appear here once the EA starts pushing on Monday</div></div>`;

  const pnlClr = s.totalPnL>=0?'green':'red';
  const lastDay = s.lastDay;
  const compDay = lastDay ? lastDay.compound_day : '—';
  const compLot = lastDay ? lastDay.compound_lot : '—';
  const compTgt = lastDay ? '$'+parseFloat(lastDay.compound_target||0).toFixed(2) : '—';
  const targetDays = db.daily.filter(d=>d.target_hit).length;

  // Build equity data from daily
  const eqLabels = db.daily.map(d=>d.date);
  const eqData   = db.daily.map(d=>parseFloat(d.end_balance||0));

  // Daily PnL bars
  const pnlLabels = db.daily.slice(-30).map(d=>d.date.slice(5));
  const pnlData   = db.daily.slice(-30).map(d=>parseFloat(d.daily_pnl||0));
  const pnlColors = db.daily.slice(-30).map(d => d.target_hit ? '#22c55e' : parseFloat(d.daily_pnl||0)>=0 ? '#3b82f6' : '#ef4444');

  return `
  <div class="kpi-grid">
    ${kpi('Closed Trades', s.closed.length, '', 'cyan')}
    ${kpi('Win Rate', s.winRate.toFixed(1)+'%', '', s.winRate>=50?'green':'red')}
    ${kpi('Total P&L', (s.totalPnL>=0?'+':'')+s.totalPnL.toFixed(2), '', pnlClr)}
    ${kpi('Balance', '$'+(s.lastBal||0).toFixed(2), '', 'gold')}
    ${kpi('Profit Factor', s.profitFactor.toFixed(2), '', s.profitFactor>=1?'green':'red')}
    ${kpi('R:R Ratio', s.rr.toFixed(2), '', s.rr>=1?'green':'red')}
    ${kpi('Max Drawdown', s.maxDD.toFixed(1)+'%', '', s.maxDD>20?'red':s.maxDD>10?'gold':'green')}
    ${kpi('Avg Win', '+'+s.avgWin.toFixed(2), '', 'green')}
    ${kpi('Avg Loss', s.avgLoss.toFixed(2), '', 'red')}
    ${kpi('Win Streak', s.maxWinStreak, 'best', 'green')}
    ${kpi('Lose Streak', s.maxLoseStreak, 'worst', 'red')}
    ${kpi('Target Days', targetDays+'/'+db.daily.length, '', 'gold')}
    ${kpi('Compound Day', compDay, '', 'cyan')}
    ${kpi('Current Lot', compLot, '', 'cyan')}
    ${kpi('Daily Target', compTgt, '', 'gold')}
  </div>
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Equity Curve</div>
      <div class="chart-wrap"><canvas id="eqChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Daily P&L (last 30 days)</div>
      <div class="chart-wrap"><canvas id="pnlChart"></canvas></div>
    </div>
  </div>`;

  function kpi(label, val, sub, clr) {
    return `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value ${clr||''}">${val}</div>${sub?`<div class="kpi-sub">${sub}</div>`:''}</div>`;
  }
}

// ── TRADES ───────────────────────────────────────────────────────
function renderTrades() {
  const closed = getClosedTrades();
  const syms = ['ALL',...new Set(closed.map(t=>t.symbol).filter(Boolean))];
  const filtered = closed.filter(t =>
    (filterSym==='ALL'||t.symbol===filterSym) &&
    (filterDir==='ALL'||t.direction===filterDir)
  );

  if(!closed.length) return `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">No trades yet</div><div class="empty-sub">Trades will appear here once the market opens Monday</div></div>`;

  return `
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Trade History</span>
      <span class="count-badge">${filtered.length} trades</span>
      <div class="filters">
        <select onchange="filterSym=this.value;render()">
          ${syms.map(s=>`<option${filterSym===s?' selected':''}>${s}</option>`).join('')}
        </select>
        <select onchange="filterDir=this.value;render()">
          ${['ALL','BUY','SELL'].map(d=>`<option${filterDir===d?' selected':''}>${d}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Time</th><th>Symbol</th><th>Dir</th><th>Lot</th>
          <th>Entry</th><th>SL</th><th>TP</th>
          <th>Strong</th><th>Weak</th><th>Gap</th><th>P&L</th><th>News</th>
        </tr></thead>
        <tbody>
          ${filtered.map((t,i) => {
            const pnl = parseFloat(t.closePnL||0);
            const pnlClr = pnl>0?'#22c55e':pnl<0?'#ef4444':'#9ca3af';
            const news = getNewsFlag(t);
            return `<tr onclick="openInspector(${i},${JSON.stringify(filtered).replace(/"/g,'&quot;')})">
              <td style="color:#9ca3af">${(t.ts||'').substring(0,16)}</td>
              <td style="color:#60a5fa;font-weight:700">${t.symbol||'—'}</td>
              <td style="color:${t.direction==='BUY'?'#22c55e':'#ef4444'}">${t.direction||'—'}</td>
              <td>${t.lot||'—'}</td>
              <td>${parseFloat(t.entry||0).toFixed(5)}</td>
              <td style="color:#ef4444">${parseFloat(t.sl||0).toFixed(5)}</td>
              <td style="color:#22c55e">${parseFloat(t.tp||0).toFixed(5)}</td>
              <td style="color:#22c55e">${t.strong_cur||'—'}</td>
              <td style="color:#ef4444">${t.weak_cur||'—'}</td>
              <td>${parseFloat(t.gap||0).toFixed(3)}</td>
              <td style="color:${pnlClr};font-weight:700">${pnl>=0?'+':''}${pnl.toFixed(2)}</td>
              <td>${news.icon}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ── SIGNALS ──────────────────────────────────────────────────────
function renderSignals() {
  if(!db.signals.length) return `<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-msg">No signal data yet</div></div>`;
  const filtered = db.signals.filter(s =>
    filterResult==='ALL'||s.result===filterResult
  );
  const opened = db.signals.filter(s=>s.result==='OPENED').length;
  const blocked = db.signals.filter(s=>s.result==='BLOCKED').length;
  const conv = db.signals.length ? (opened/db.signals.length*100).toFixed(1) : 0;

  // Block reason counts
  const reasons = {};
  db.signals.filter(s=>s.result==='BLOCKED').forEach(s => {
    const r = s.block_reason||'Unknown';
    reasons[r] = (reasons[r]||0)+1;
  });

  return `
  <div class="kpi-grid" style="margin-bottom:24px">
    <div class="kpi"><div class="kpi-label">Total Signals</div><div class="kpi-value cyan">${db.signals.length}</div></div>
    <div class="kpi"><div class="kpi-label">Opened</div><div class="kpi-value green">${opened}</div></div>
    <div class="kpi"><div class="kpi-label">Blocked</div><div class="kpi-value red">${blocked}</div></div>
    <div class="kpi"><div class="kpi-label">Conversion</div><div class="kpi-value gold">${conv}%</div></div>
  </div>
  <div class="charts-row" style="margin-bottom:24px">
    <div class="chart-card">
      <div class="chart-title">Block Reasons</div>
      <div class="chart-wrap"><canvas id="blockChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Signal Outcome</div>
      <div class="chart-wrap"><canvas id="sigPieChart"></canvas></div>
    </div>
  </div>
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Signal Log</span>
      <span class="count-badge">${filtered.length} signals</span>
      <div class="filters">
        <select onchange="filterResult=this.value;render()">
          ${['ALL','OPENED','BLOCKED'].map(r=>`<option${filterResult===r?' selected':''}>${r}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Time</th><th>Symbol</th><th>Dir</th><th>Strong</th><th>Weak</th><th>Gap</th><th>Result</th><th>Reason</th></tr></thead>
        <tbody>
          ${filtered.slice(-200).reverse().map(s => `<tr>
            <td style="color:#9ca3af">${(s.ts||'').substring(0,16)}</td>
            <td style="color:#60a5fa;font-weight:700">${s.symbol||'—'}</td>
            <td style="color:${s.direction==='BUY'?'#22c55e':'#ef4444'}">${s.direction||'—'}</td>
            <td style="color:#22c55e">${s.strong_cur||'—'}</td>
            <td style="color:#ef4444">${s.weak_cur||'—'}</td>
            <td>${parseFloat(s.gap||0).toFixed(3)}</td>
            <td><span class="${s.result==='OPENED'?'badge-opened':'badge-blocked'}">${s.result}</span></td>
            <td style="color:#9ca3af">${s.block_reason||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ── DAILY ────────────────────────────────────────────────────────
function renderDaily() {
  if(!db.daily.length) return `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-msg">No daily data yet</div></div>`;
  return `
  <div class="table-card" style="margin-bottom:24px">
    <div class="table-header"><span class="table-title">Daily Summary</span><span class="count-badge">${db.daily.length} days</span></div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Date</th><th>Day</th><th>Start Bal</th><th>End Bal</th><th>P&L</th><th>Target</th><th>Opened</th><th>Closed</th><th>Lot</th></tr></thead>
        <tbody>
          ${[...db.daily].reverse().map(d => {
            const pnl = parseFloat(d.daily_pnl||0);
            return `<tr>
              <td style="color:#9ca3af">${d.date}</td>
              <td style="color:var(--gold)">Day ${d.compound_day}</td>
              <td>$${parseFloat(d.start_balance||0).toFixed(2)}</td>
              <td style="color:${parseFloat(d.end_balance)>=parseFloat(d.start_balance)?'#22c55e':'#ef4444'}">$${parseFloat(d.end_balance||0).toFixed(2)}</td>
              <td style="color:${pnl>=0?'#22c55e':'#ef4444'};font-weight:700">${pnl>=0?'+':''}${pnl.toFixed(2)}</td>
              <td style="color:${d.target_hit?'#22c55e':'#9ca3af'}">${d.target_hit?'✓ YES':'NO'}</td>
              <td>${d.trades_opened||0}</td>
              <td>${d.trades_closed||0}</td>
              <td style="color:var(--gold)">${d.compound_lot}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Calendar — Target Days</div>
    ${renderCalendar()}
  </div>`;
}

function renderCalendar() {
  const map = {};
  db.daily.forEach(d => { map[d.date] = d; });
  if(!db.daily.length) return '<div class="empty-sub" style="padding:20px">No data</div>';
  const first = new Date(db.daily[0].date);
  const last  = new Date(db.daily[db.daily.length-1].date);
  let html = '<div class="calendar">';
  // Day headers
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    html += `<div style="text-align:center;font-size:10px;color:var(--sub);padding:4px">${d}</div>`;
  });
  // Fill empty days before first
  let dow = (first.getDay()+6)%7; // Mon=0
  for(let i=0;i<dow;i++) html += '<div class="cal-day empty"></div>';
  // Fill days
  const cur = new Date(first);
  while(cur <= last) {
    const key = cur.toISOString().slice(0,10);
    const d = map[key];
    if(d) {
      const pnl = parseFloat(d.daily_pnl||0);
      const cls = d.target_hit ? 'hit' : pnl < 0 ? 'loss' : 'nodata';
      html += `<div class="cal-day ${cls}" title="${key}: ${pnl>=0?'+':''}${pnl.toFixed(2)}">${cur.getDate()}</div>`;
    } else {
      html += `<div class="cal-day nodata">${cur.getDate()}</div>`;
    }
    cur.setDate(cur.getDate()+1);
  }
  html += '</div>';
  return html;
}

// ── HEATMAP ──────────────────────────────────────────────────────
function renderHeatmap() {
  const closed = getClosedTrades();
  if(!closed.length) return `<div class="empty-state"><div class="empty-icon">🔥</div><div class="empty-msg">No trade data yet</div></div>`;
  const map = {};
  closed.forEach(t => {
    if(!t.symbol) return;
    if(!map[t.symbol]) map[t.symbol]={sym:t.symbol,count:0,wins:0,pnl:0};
    map[t.symbol].count++;
    if(t.closePnL>0) map[t.symbol].wins++;
    map[t.symbol].pnl += t.closePnL||0;
  });
  const pairs = Object.values(map).sort((a,b)=>b.pnl-a.pnl);
  return `
  <div class="table-card">
    <div class="table-header"><span class="table-title">Pair Performance</span><span class="count-badge">${pairs.length} pairs</span></div>
    <div class="heatmap">
      ${pairs.map(p => {
        const wr = p.count ? p.wins/p.count*100 : 0;
        const bg = wr>=60?'#1a3a2a':wr>=50?'#1a2a1a':wr>=40?'#2a2a1a':'#2a1a1a';
        const tc = wr>=60?'#22c55e':wr>=50?'#86efac':wr>=40?'#f59e0b':'#ef4444';
        return `<div class="tile" style="background:${bg};border-color:${tc}33">
          <div class="tile-sym">${p.sym}</div>
          <div class="tile-wr" style="color:${tc}">${wr.toFixed(0)}%</div>
          <div class="tile-wl">${p.wins}W / ${p.count-p.wins}L</div>
          <div class="tile-pnl" style="color:${p.pnl>=0?'#22c55e':'#ef4444'}">${p.pnl>=0?'+':''}${p.pnl.toFixed(2)}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── NEWS FLAG ────────────────────────────────────────────────────
function getNewsFlag(trade) {
  if(!trade.ts || !trade.strong_cur) return {icon:'🟢', label:'Clean', cls:'news-clean'};
  const openTime = new Date(trade.ts).getTime();
  const nearby = db.signals.filter(s => {
    if(s.result!=='BLOCKED') return false;
    if(!(s.block_reason||'').includes('News')) return false;
    if(s.strong_cur!==trade.strong_cur && s.weak_cur!==trade.weak_cur) return false;
    const diff = Math.abs(new Date(s.ts).getTime() - openTime);
    return diff <= 30*60*1000;
  });
  if(!nearby.length) return {icon:'🟢', label:'Clean', cls:'news-clean'};
  const closest = Math.min(...nearby.map(s=>Math.abs(new Date(s.ts).getTime()-openTime)));
  if(closest <= 10*60*1000) return {icon:'🔴', label:'High Risk', cls:'news-high'};
  return {icon:'🟡', label:'Adjacent', cls:'news-adjacent'};
}

// ── TRADE INSPECTOR ──────────────────────────────────────────────
function openInspector(idx, trades) {
  const t = trades[idx];
  const news = getNewsFlag(t);
  const pnl = parseFloat(t.closePnL||0);
  // Find all events for this ticket
  const events = db.trades.filter(r=>r.ticket===t.ticket).sort((a,b)=>new Date(a.ts)-new Date(b.ts));

  let html = `
  <div class="insp-title">${t.symbol||'—'} ${t.direction||''}</div>
  <div class="insp-sub">Ticket #${t.ticket||'—'} · Compound Day ${t.compound_day||'—'}</div>
  <div class="insp-section">
    <div class="insp-section-title">Entry Details</div>
    <div class="insp-row"><span class="lbl">Entry Price</span><span class="val">${parseFloat(t.entry||0).toFixed(5)}</span></div>
    <div class="insp-row"><span class="lbl">Stop Loss</span><span class="val" style="color:#ef4444">${parseFloat(t.sl||0).toFixed(5)}</span></div>
    <div class="insp-row"><span class="lbl">Take Profit</span><span class="val" style="color:#22c55e">${parseFloat(t.tp||0).toFixed(5)}</span></div>
    <div class="insp-row"><span class="lbl">Lot Size</span><span class="val">${t.lot||'—'}</span></div>
    <div class="insp-row"><span class="lbl">Time</span><span class="val">${(t.ts||'').substring(0,16)}</span></div>
  </div>
  <div class="insp-section">
    <div class="insp-section-title">Currency Context</div>
    <div class="insp-row"><span class="lbl">Strong</span><span class="val" style="color:#22c55e">${t.strong_cur||'—'} (${parseFloat(t.strong_val||0).toFixed(4)})</span></div>
    <div class="insp-row"><span class="lbl">Weak</span><span class="val" style="color:#ef4444">${t.weak_cur||'—'} (${parseFloat(t.weak_val||0).toFixed(4)})</span></div>
    <div class="insp-row"><span class="lbl">Gap at Entry</span><span class="val">${parseFloat(t.gap||0).toFixed(4)}</span></div>
  </div>
  <div class="insp-section">
    <div class="insp-section-title">Result</div>
    <div class="insp-row"><span class="lbl">P&L</span><span class="val" style="color:${pnl>=0?'#22c55e':'#ef4444'};font-size:18px;font-weight:700">${pnl>=0?'+':''}${pnl.toFixed(2)}</span></div>
    <div class="insp-row"><span class="lbl">Close Time</span><span class="val">${(t.closeTime||'').substring(0,16)||'—'}</span></div>
    <div class="insp-row"><span class="lbl">Balance After</span><span class="val">$${parseFloat(t.balance||0).toFixed(2)}</span></div>
  </div>
  <div class="insp-section">
    <div class="insp-section-title">News Risk</div>
    <span class="news-flag ${news.cls}">${news.icon} ${news.label}</span>
  </div>
  <div class="insp-section">
    <div class="insp-section-title">Trade Lifecycle</div>
    ${events.map(e=>`<div class="insp-row">
      <span class="lbl">${e.event}</span>
      <span class="val">${(e.ts||'').substring(0,16)}</span>
    </div>`).join('')}
  </div>`;

  document.getElementById('inspContent').innerHTML = html;
  document.getElementById('inspector').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeInspector() {
  document.getElementById('inspector').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── CHARTS (after render) ────────────────────────────────────────
function afterRender() {
  const chartDefaults = {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{ x:{ticks:{color:'#6b7280',maxTicksLimit:8}, grid:{color:'#1f2937'}},
             y:{ticks:{color:'#6b7280'}, grid:{color:'#1f2937'}} }
  };

  // Equity curve
  const eq = document.getElementById('eqChart');
  if(eq && db.daily.length) {
    charts.eq = new Chart(eq, { type:'line', data:{
      labels: db.daily.map(d=>d.date.slice(5)),
      datasets:[{ data: db.daily.map(d=>parseFloat(d.end_balance||0)),
        borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.1)',
        fill:true, tension:.3, pointRadius:2 }]
    }, options: {...chartDefaults} });
  }

  // Daily PnL bars
  const pnl = document.getElementById('pnlChart');
  if(pnl && db.daily.length) {
    const slice = db.daily.slice(-30);
    charts.pnl = new Chart(pnl, { type:'bar', data:{
      labels: slice.map(d=>d.date.slice(5)),
      datasets:[{ data: slice.map(d=>parseFloat(d.daily_pnl||0)),
        backgroundColor: slice.map(d => d.target_hit?'#22c55e':parseFloat(d.daily_pnl||0)>=0?'#3b82f6':'#ef4444') }]
    }, options: {...chartDefaults} });
  }

  // Block reasons bar
  const blk = document.getElementById('blockChart');
  if(blk) {
    const reasons = {};
    db.signals.filter(s=>s.result==='BLOCKED').forEach(s=>{
      const r=s.block_reason||'Unknown'; reasons[r]=(reasons[r]||0)+1;
    });
    const keys = Object.keys(reasons);
    const vals = keys.map(k=>reasons[k]);
    charts.blk = new Chart(blk, { type:'bar', data:{
      labels:keys, datasets:[{data:vals, backgroundColor:'#ef4444'}]
    }, options:{...chartDefaults, indexAxis:'y'} });
  }

  // Signal pie
  const sp = document.getElementById('sigPieChart');
  if(sp) {
    const opened = db.signals.filter(s=>s.result==='OPENED').length;
    const blocked = db.signals.filter(s=>s.result==='BLOCKED').length;
    charts.sp = new Chart(sp, { type:'doughnut', data:{
      labels:['Opened','Blocked'],
      datasets:[{data:[opened,blocked], backgroundColor:['#22c55e','#ef4444'], borderWidth:0}]
    }, options:{responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{color:'#9ca3af',font:{size:11}}}}} });
  }
}
