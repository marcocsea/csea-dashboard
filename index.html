<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CSEA Trading Intelligence v5.2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#f8fafc;--bg2:#fff;--bg3:#f1f5f9;--border:#e2e8f0;--text:#1e293b;--sub:#64748b;--green:#16a34a;--red:#dc2626;--gold:#d97706;--blue:#2563eb;--cyan:#0891b2}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
.header{background:#0f172a;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.logo{font-size:18px;font-weight:800;color:#fff;display:flex;align-items:center;gap:6px}
.logo span{color:#38bdf8}
.badge{background:#1e40af;color:#bfdbfe;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.5px}
.mode-toggle{display:flex;gap:4px;background:#1e293b;padding:3px;border-radius:8px;margin-left:8px}
.mode-btn{padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#94a3b8;background:transparent;transition:all .15s}
.mode-btn.active{background:#3b82f6;color:#fff}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.acct-label{font-size:11px;color:#94a3b8}
.acct-select{padding:5px 10px;border-radius:6px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:12px;outline:none}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80}
.status-dot.off{background:#f87171;box-shadow:none}
.status-txt{font-size:11px;color:#94a3b8}
.last-sync{font-size:11px;color:#64748b}
.day-strip{background:#1e293b;padding:8px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:1px solid #334155}
.ds-item{display:flex;flex-direction:column;gap:2px;white-space:nowrap}
.ds-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.ds-val{font-size:13px;font-weight:700;color:#e2e8f0}
.ds-val.pos{color:#4ade80}.ds-val.neg{color:#f87171}.ds-val.gold{color:#fbbf24}
.ds-sep{width:1px;height:28px;background:#334155;flex-shrink:0}
.ds-progress{flex:1;min-width:140px;display:flex;flex-direction:column;gap:3px}
.ds-prog-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:flex;justify-content:space-between}
.ds-prog-track{height:6px;background:#334155;border-radius:3px;overflow:hidden}
.ds-prog-fill{height:6px;background:#4ade80;border-radius:3px;transition:width .4s ease}
.ds-prog-fill.gold{background:#fbbf24}
.date-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-bar-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.preset-btns{display:flex;gap:4px;flex-wrap:wrap}
.preset{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--sub);transition:all .15s}
.preset:hover{border-color:var(--blue);color:var(--blue)}
.preset.active{background:#eff6ff;border-color:var(--blue);color:var(--blue)}
.date-inputs{display:flex;align-items:center;gap:6px;margin-left:8px}
.date-inputs input{padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text);outline:none;background:var(--bg3)}
.date-sep{color:var(--sub);font-size:11px}
.range-count{margin-left:auto;font-size:11px;color:var(--sub);white-space:nowrap;background:var(--bg3);padding:3px 10px;border-radius:5px;border:1px solid var(--border)}
.tabs{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:11px 15px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;transition:all .15s;white-space:nowrap}
.tab:hover{color:#1e293b}.tab.active{color:#1e40af;border-bottom-color:#3b82f6}
.main{padding:20px;max-width:1400px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:800}
.kpi-value.green{color:var(--green)}.kpi-value.red{color:var(--red)}.kpi-value.gold{color:var(--gold)}.kpi-value.cyan{color:var(--cyan)}
.kpi-sub{font-size:11px;color:var(--sub);margin-top:2px}
/* Full-width chart cards */
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:16px}
.chart-title{font-size:13px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.chart-title::before{content:'';display:inline-block;width:3px;height:14px;background:#3b82f6;border-radius:2px}
.chart-wrap{position:relative;height:260px}
.chart-wrap.tall{height:340px}
/* 2-col only for pair+weekday side by side on overview */
.charts-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:16px}
.table-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.table-title{font-size:14px;font-weight:700;color:var(--text)}
.count-badge{background:#eff6ff;color:#1e40af;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8fafc;padding:9px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);font-weight:700;border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid #f8fafc;cursor:pointer}
tr:hover td{background:#f8fafc}
tr:last-child td{border-bottom:none}
.filters{display:flex;gap:6px;margin-left:auto}
.filters select{padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text);background:var(--bg3);outline:none}
.csv-btn{padding:4px 12px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--sub);font-size:11px;font-weight:600;cursor:pointer}
.csv-btn:hover{border-color:var(--blue);color:var(--blue)}
.badge-buy{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-sell{background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-open{background:#dbeafe;color:#1e40af;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-close{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-compound_close{background:#fef3c7;color:#d97706;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-partial{background:#f3e8ff;color:#7c3aed;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-opened{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-blocked{background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.float-bar{background:linear-gradient(135deg,#1e1b4b,#0f172a);border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.float-label{font-size:11px;color:#a5b4fc;text-transform:uppercase;letter-spacing:.5px}
.float-value{font-size:22px;font-weight:700}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200}
.overlay.open{display:block}
.inspector{position:fixed;right:-420px;top:0;bottom:0;width:420px;background:#fff;z-index:201;overflow-y:auto;padding:24px;box-shadow:-4px 0 20px rgba(0,0,0,.15);transition:right .25s}
.inspector.open{right:0}
.insp-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--sub)}
.insp-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.insp-row .lbl{color:var(--sub)}.insp-row .val{color:#1e293b;font-weight:500}
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-msg{font-size:16px;color:var(--sub);font-weight:500}
/* Monthly performance table */
.monthly-tbl{width:100%;border-collapse:collapse;font-size:12px}
.monthly-tbl th{background:#f8fafc;padding:8px 10px;text-align:center;font-size:10px;text-transform:uppercase;color:var(--sub);border:1px solid var(--border);font-weight:700}
.monthly-tbl td{padding:8px 10px;text-align:right;border:1px solid var(--border);font-weight:600}
.monthly-tbl td:first-child{text-align:left;font-weight:700;color:var(--text)}
.m-pos{color:var(--green)}.m-neg{color:var(--red)}.m-zero{color:var(--sub)}
.ytd-col{color:#1e40af;font-weight:800!important;background:#eff6ff}
.streak-dots{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.streak-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;cursor:default}
.compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.compare-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.compare-card-header{background:linear-gradient(135deg,#1e1b4b,#0f172a);padding:14px 18px}
.compare-card-name{font-size:14px;font-weight:700;color:#fff}
.compare-kpis{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.compare-kpi{background:var(--bg2);padding:12px 14px}
.compare-kpi-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.compare-kpi-value{font-size:17px;font-weight:700}
.compare-kpi-value.green{color:var(--green)}.compare-kpi-value.red{color:var(--red)}.compare-kpi-value.gold{color:var(--gold)}
.compare-equity{padding:14px 18px;border-top:1px solid var(--border)}
.compare-eq-wrap{height:70px;position:relative}
.pos-refresh-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:11px;color:var(--sub)}
.live-badge{background:#dcfce7;color:#16a34a;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.inspector{width:100%}.charts-2col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">⚡ <span>CSEA</span> Intelligence</div>
  <div class="badge">v5.2</div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnStrategy" onclick="setMode('strategy')">📊 Strategy</button>
    <button class="mode-btn" id="btnPortfolio" onclick="setMode('portfolio')">💼 Portfolio</button>
  </div>
  <div class="hdr-right">
    <div class="acct-label">Account:</div>
    <select class="acct-select" id="acctSelect" onchange="onAcctChange()"><option value="">Loading...</option></select>
    <div class="status-dot off" id="statusDot"></div>
    <div class="status-txt" id="statusTxt">Connecting…</div>
    <div class="last-sync" id="lastSync"></div>
  </div>
</div>

<div class="day-strip">
  <div class="ds-item"><div class="ds-label">Day</div><div class="ds-val gold" id="dsDay">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Lot</div><div class="ds-val" id="dsLot">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Today P&L</div><div class="ds-val" id="dsPnl">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Trades</div><div class="ds-val" id="dsTrades">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Positions</div><div class="ds-val" id="dsPos">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-progress">
    <div class="ds-prog-label"><span>Compound Progress</span><span id="dsProgPct">—</span></div>
    <div class="ds-prog-track"><div class="ds-prog-fill" id="dsProgFill" style="width:0%"></div></div>
  </div>
</div>

<div class="date-bar">
  <span class="date-bar-label">📅 Range:</span>
  <div class="preset-btns">
    <button class="preset" onclick="setPreset('today',event)">Today</button>
    <button class="preset" onclick="setPreset('week',event)">This Week</button>
    <button class="preset" onclick="setPreset('month',event)">This Month</button>
    <button class="preset" onclick="setPreset('year',event)">This Year</button>
    <button class="preset" onclick="setPreset('last30',event)">Last 30d</button>
    <button class="preset" onclick="setPreset('last90',event)">Last 3M</button>
    <button class="preset" onclick="setPreset('last180',event)">Last 6M</button>
    <button class="preset active" onclick="setPreset('all',event)">All Time</button>
  </div>
  <div class="date-inputs">
    <input type="date" id="dateFrom" onchange="onDateChange()"/>
    <span class="date-sep">→</span>
    <input type="date" id="dateTo" onchange="onDateChange()"/>
  </div>
  <div class="range-count" id="rangeCount">— trades in range</div>
</div>

<div class="tabs" id="tabBar"></div>
<div class="main" id="mainContent"></div>

<div class="overlay" id="overlay" onclick="closeInspector()"></div>
<div class="inspector" id="inspector">
  <button class="insp-close" onclick="closeInspector()">✕</button>
  <div id="inspBody"></div>
</div>

<script>
const SB_URL='https://nmyveijljquxvhjelqbc.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teXZlaWpsanF1eHZoamVscWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjc2MjgsImV4cCI6MjA4Nzk0MzYyOH0.YT-sAh2Spn1805dnylTsZ2gBx-T7yC6fyOKIs0YPlP4';
const HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let mode='strategy', activeTab='overview', acctId='';
let allAccounts=[], charts={};
let rawDb={trades:[],signals:[],daily:[]};
let db={trades:[],signals:[],daily:[]};
let dateFrom='', dateTo='';
let posRefreshTimer=null;
let autoRefreshTimer=null;  // single global timer — never stacked

const STRATEGY_TABS=['overview','positions','trades','signals','daily','heatmap','currencies','compare'];
const PORTFOLIO_TABS=['overview','trades','performance','compare'];
const TAB_LABELS={overview:'Overview',positions:'Positions',trades:'Trades',signals:'Signals',daily:'Daily',heatmap:'Pair Heatmap',currencies:'Currencies',performance:'Performance',compare:'Compare'};

// ── SUPABASE ──────────────────────────────────────────────────────
async function sb(table,params=''){
  const PAGE=1000; let all=[],from=0;
  while(true){
    const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}&limit=${PAGE}&offset=${from}`,
      {headers:{...HDR,'Range-Unit':'items',Range:`${from}-${from+PAGE-1}`}});
    if(!r.ok) break;
    const page=await r.json();
    all=all.concat(page);
    if(page.length<PAGE) break;
    from+=PAGE;
  }
  return all;
}

// ── INIT ──────────────────────────────────────────────────────────
async function init(){
  const saved=localStorage.getItem('csea_acct');
  const savedMode=localStorage.getItem('csea_mode')||'strategy';
  setMode(savedMode,false);
  allAccounts=await sb('accounts','select=*&order=created_at');
  const sel=document.getElementById('acctSelect');
  sel.innerHTML='<option value="">All Accounts</option>';
  allAccounts.forEach(a=>{
    const o=document.createElement('option');
    o.value=a.id; o.textContent=a.label||a.name||a.account_number;
    sel.appendChild(o);
  });
  if(saved){sel.value=saved; acctId=saved;}
  await loadData();
}

async function loadData(){
  const dot=document.getElementById('statusDot'), txt=document.getElementById('statusTxt');
  dot.className='status-dot off'; txt.textContent='Loading…';
  const f=acctId?`&account_id=eq.${acctId}`:'';
  const [trades,signals,daily]=await Promise.all([
    sb('trades',`select=*&order=ts${f}`),
    sb('signals',`select=*&order=ts${f}`),
    sb('daily',`select=*&order=date${f}`)
  ]);
  rawDb={trades:trades||[],signals:signals||[],daily:daily||[]};
  applyDateFilter();
  dot.className='status-dot'; txt.textContent='Live';
  document.getElementById('lastSync').textContent='Updated '+new Date().toLocaleTimeString();
  updateDayStrip();
  renderTabs();
  renderContent();

  // Single auto-refresh — cancel any previous before starting new
  if(autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer=setInterval(()=>{if(document.visibilityState==='visible') silentRefresh();},60000);
}

// Silent refresh: fetch data + update strip only — no full re-render (prevents blank flash)
async function silentRefresh(){
  const f=acctId?`&account_id=eq.${acctId}`:'';
  const [trades,signals,daily]=await Promise.all([
    sb('trades',`select=*&order=ts${f}`),
    sb('signals',`select=*&order=ts${f}`),
    sb('daily',`select=*&order=date${f}`)
  ]);
  rawDb={trades:trades||[],signals:signals||[],daily:daily||[]};
  applyDateFilter();
  document.getElementById('lastSync').textContent='Updated '+new Date().toLocaleTimeString();
  updateDayStrip();
  // Only re-render positions body if on positions tab (live data needed)
  if(activeTab==='positions'){
    const pos=getOpenPositions();
    const body=document.getElementById('posBody');
    if(body) body.innerHTML=renderPosRows(pos);
    document.getElementById('dsPos').textContent=pos.length;
  }
}

// ── POSITIONS from trades ─────────────────────────────────────────
function getOpenPositions(){
  const closedTix=new Set(
    rawDb.trades.filter(t=>['CLOSE','COMPOUND_CLOSE','PARTIAL'].includes(t.event)).map(t=>t.ticket)
  );
  return rawDb.trades.filter(t=>t.event==='OPEN'&&!closedTix.has(t.ticket));
}

// ── DATE FILTER ───────────────────────────────────────────────────
function applyDateFilter(){
  const from=dateFrom?new Date(dateFrom+'T00:00:00'):null;
  const to=dateTo?new Date(dateTo+'T23:59:59'):null;
  const inR=ts=>{if(!ts)return true;const d=new Date(ts);return(!from||d>=from)&&(!to||d<=to);};
  const inD=s=>{if(!s)return true;const d=new Date(s+'T12:00:00');return(!from||d>=from)&&(!to||d<=to);};
  db.trades=rawDb.trades.filter(t=>inR(t.ts));
  db.signals=rawDb.signals.filter(s=>inR(s.ts));
  db.daily=rawDb.daily.filter(d=>inD(d.date));
  document.getElementById('rangeCount').textContent=`${closed().length} trades in range`;
}

function setPreset(p,ev){
  document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));
  if(ev&&ev.target) ev.target.classList.add('active');
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth(),d=now.getDate();
  const fmt=x=>x.toISOString().slice(0,10);
  if(p==='all'){dateFrom='';dateTo='';}
  else if(p==='today'){dateFrom=dateTo=fmt(now);}
  else if(p==='week'){const m=new Date(now);m.setDate(d-now.getDay()+1);dateFrom=fmt(m);dateTo=fmt(now);}
  else if(p==='month'){dateFrom=`${y}-${String(mo+1).padStart(2,'0')}-01`;dateTo=fmt(now);}
  else if(p==='year'){dateFrom=`${y}-01-01`;dateTo=fmt(now);}
  else if(p==='last30'){const t=new Date(now);t.setDate(d-30);dateFrom=fmt(t);dateTo=fmt(now);}
  else if(p==='last90'){const t=new Date(now);t.setDate(d-90);dateFrom=fmt(t);dateTo=fmt(now);}
  else if(p==='last180'){const t=new Date(now);t.setDate(d-180);dateFrom=fmt(t);dateTo=fmt(now);}
  document.getElementById('dateFrom').value=dateFrom;
  document.getElementById('dateTo').value=dateTo;
  applyDateFilter(); destroyCharts(); renderContent();
}
function onDateChange(){
  dateFrom=document.getElementById('dateFrom').value;
  dateTo=document.getElementById('dateTo').value;
  document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));
  applyDateFilter(); destroyCharts(); renderContent();
}

// ── DAY STRIP ─────────────────────────────────────────────────────
function updateDayStrip(){
  const today=new Date().toISOString().slice(0,10);
  const rows=[...rawDb.daily].sort((a,b)=>a.date.localeCompare(b.date));
  const d=rows.find(r=>r.date===today)||rows[rows.length-1];
  const openPos=getOpenPositions();
  document.getElementById('dsPos').textContent=openPos.length;
  if(!d) return;
  const pnl=parseFloat(d.daily_pnl||0);
  const lot=parseFloat(d.compound_lot||0);
  const target=parseFloat(d.compound_target||0);
  const pct=target>0?Math.min(100,(pnl/target)*100):0;
  const hit=d.target_hit;
  document.getElementById('dsDay').textContent=d.compound_day?'Day '+d.compound_day:'—';
  document.getElementById('dsLot').textContent=lot>0?lot.toFixed(2)+'L':'—';
  const pe=document.getElementById('dsPnl');
  pe.textContent=(pnl>=0?'+':'')+pnl.toFixed(2);
  pe.className='ds-val '+(hit?'gold':pnl>=0?'pos':'neg');
  const today_trades=rawDb.trades.filter(t=>t.ts&&t.ts.slice(0,10)===today&&['CLOSE','COMPOUND_CLOSE'].includes(t.event));
  document.getElementById('dsTrades').textContent=today_trades.length;
  document.getElementById('dsProgFill').style.width=Math.max(0,pct)+'%';
  document.getElementById('dsProgFill').className='ds-prog-fill'+(hit?' gold':'');
  document.getElementById('dsProgPct').textContent=pct.toFixed(1)+'%';
}

// ── HELPERS ───────────────────────────────────────────────────────
// Real closed trades = CLOSE or COMPOUND_CLOSE with non-zero pnl
const closed=()=>db.trades.filter(t=>['CLOSE','COMPOUND_CLOSE'].includes(t.event)&&parseFloat(t.pnl||0)!==0);
const wins=arr=>arr.filter(t=>parseFloat(t.pnl||0)>0);
const loses=arr=>arr.filter(t=>parseFloat(t.pnl||0)<0);
const totalPnL=arr=>arr.reduce((s,t)=>s+parseFloat(t.pnl||0),0);
const winRate=arr=>arr.length?wins(arr).length/arr.length*100:0;
const avgWin=arr=>wins(arr).length?totalPnL(wins(arr))/wins(arr).length:0;
const avgLoss=arr=>loses(arr).length?totalPnL(loses(arr))/loses(arr).length:0;
const profitFactor=arr=>{const g=totalPnL(wins(arr)),l=Math.abs(totalPnL(loses(arr)));return l===0?999:+(g/l).toFixed(2);};
const fmtPnl=v=>(parseFloat(v)>=0?'+':'')+parseFloat(v).toFixed(2);
const fmtMoney=v=>(parseFloat(v)>=0?'$':'-$')+Math.abs(parseFloat(v)).toFixed(2);
function maxDD(arr){
  let peak=0,dd=0,run=0;
  arr.forEach(t=>{run+=parseFloat(t.pnl||0);if(run>peak)peak=run;const d=peak>0?(peak-run)/peak*100:0;if(d>dd)dd=d;});
  return dd;
}
// Get Friday-ending week key
function getWeekKey(ts){
  if(!ts)return'';
  const d=new Date(ts);
  const fri=new Date(d);
  fri.setDate(d.getDate()+(5-d.getDay()+7)%7);
  return fri.toISOString().slice(0,10);
}
// Build weekly map ensuring last N weeks always present (zero-filled)
function buildWeekMap(trades,nWeeks=8){
  const map={};
  trades.forEach(t=>{const w=getWeekKey(t.ts);if(w)map[w]=(map[w]||0)+parseFloat(t.pnl||0);});
  // Ensure last nWeeks always exist
  const now=new Date();
  for(let i=0;i<nWeeks;i++){
    const d=new Date(now);
    d.setDate(now.getDate()-(now.getDay()-5+7)%7-i*7); // go back i Fridays
    const k=d.toISOString().slice(0,10);
    if(!map[k])map[k]=0;
  }
  return map;
}
// Build monthly map ensuring all 12 months of each year with data
function buildMonthMap(trades){
  const map={};
  trades.forEach(t=>{
    if(!t.ts)return;
    const m=t.ts.slice(0,7);
    map[m]=(map[m]||0)+parseFloat(t.pnl||0);
  });
  return map;
}
// Get last 12 months as keys (zero-filled)
function getLast12Months(){
  const keys=[];
  const now=new Date();
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    keys.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  return keys;
}

// ── CHART FACTORY ─────────────────────────────────────────────────
const baseOpts={
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{display:false}},
  scales:{
    x:{ticks:{color:'#94a3b8',font:{size:10},maxTicksLimit:14},grid:{color:'#f1f5f9'}},
    y:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'#f1f5f9'}}
  }
};

function makeBar(id,vals,labels,opts={}){
  const c=document.getElementById(id);
  if(!c||charts[id])return;
  charts[id]=new Chart(c,{
    type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:vals.map(v=>v>=0?'#16a34a':'#dc2626'),borderRadius:4}]},
    options:{...baseOpts,...opts,
      plugins:{...baseOpts.plugins,
        tooltip:{callbacks:{label:ctx=>'$'+parseFloat(ctx.raw).toFixed(2)}}
      }
    }
  });
}

function makeEquity(id,vals,labels){
  const c=document.getElementById(id);
  if(!c||charts[id]||!vals.length)return;
  charts[id]=new Chart(c,{
    type:'line',
    data:{labels,datasets:[{data:vals,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.1)',fill:true,tension:.35,pointRadius:0,borderWidth:2}]},
    options:{...baseOpts,
      plugins:{...baseOpts.plugins,
        tooltip:{callbacks:{label:ctx=>'$'+parseFloat(ctx.raw).toFixed(2)}}
      },
      scales:{
        x:{ticks:{color:'#94a3b8',font:{size:10},maxTicksLimit:12},grid:{color:'#f1f5f9'}},
        y:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'#f1f5f9'}}
      }
    }
  });
}

function renderCharts(){
  // Pull all canvases with data-vals attribute and render
  document.querySelectorAll('canvas[data-type="bar"]').forEach(c=>{
    if(charts[c.id])return;
    makeBar(c.id,JSON.parse(c.dataset.vals||'[]'),JSON.parse(c.dataset.labels||'[]'));
  });
  document.querySelectorAll('canvas[data-type="equity"]').forEach(c=>{
    if(charts[c.id])return;
    makeEquity(c.id,JSON.parse(c.dataset.vals||'[]'),JSON.parse(c.dataset.labels||'[]'));
  });
  document.querySelectorAll('canvas[data-type="hbar"]').forEach(c=>{
    if(charts[c.id])return;
    const vals=JSON.parse(c.dataset.vals||'[]');
    const labels=JSON.parse(c.dataset.labels||'[]');
    const c2=document.getElementById(c.id);
    if(!c2||charts[c.id])return;
    charts[c.id]=new Chart(c2,{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:'#dc2626',borderRadius:4}]},
      options:{...baseOpts,indexAxis:'y',plugins:{...baseOpts.plugins,tooltip:{callbacks:{label:ctx=>ctx.raw}}}}});
  });
  document.querySelectorAll('canvas[data-type="mini"]').forEach(c=>{
    if(charts[c.id])return;
    const vals=JSON.parse(c.dataset.vals||'[]');
    if(!vals.length)return;
    charts[c.id]=new Chart(c,{type:'line',data:{labels:vals.map((_,i)=>i),datasets:[{data:vals,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',fill:true,tension:.3,pointRadius:0,borderWidth:1.5}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}});
  });
}

function renderDaily(){
  const cl=closed();
  const allDailySorted=[...rawDb.daily].sort((a,b)=>a.date.localeCompare(b.date));
  const dbDailySorted=[...db.daily].sort((a,b)=>a.date.localeCompare(b.date));
  if(!dbDailySorted.length&&!cl.length) return`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-msg">No daily data</div></div>`;

  // Streak from all-time daily rows
  let streak=0,sDir='';
  for(let i=allDailySorted.length-1;i>=0;i--){
    const p=parseFloat(allDailySorted[i].daily_pnl||0);
    const dir=p>=0?'W':'L';
    if(!sDir){sDir=dir;streak=1;}else if(dir===sDir)streak++;else break;
  }
  const last20=dbDailySorted.slice(-20);

  // Weekly P&L — last 8 weeks minimum
  const wMap=buildWeekMap(cl,8);
  const wKeys=Object.keys(wMap).sort().slice(-8);
  const wVals=wKeys.map(k=>+wMap[k].toFixed(2));

  // Monthly P&L — last 12 months (zero filled)
  const mMap=buildMonthMap(cl);
  const m12=getLast12Months();
  const mVals=m12.map(k=>+(mMap[k]||0).toFixed(2));
  const mLabels=m12.map(k=>{const[y,mo]=k.split('-');return MON[parseInt(mo)-1]+"'"+(y.slice(2));});

  // Daily distribution
  const dVals=dbDailySorted.map(d=>+parseFloat(d.daily_pnl||0).toFixed(2));
  const dLabels=dbDailySorted.map(d=>d.date.slice(5));

  // Time of day
  const hourMap=Array(24).fill(0);
  cl.forEach(t=>{if(t.ts)hourMap[new Date(t.ts).getUTCHours()]+=parseFloat(t.pnl||0);});
  const hVals=hourMap.map(v=>+v.toFixed(2));

  // Monthly performance table — all years in db.daily
  const perfMap={};
  dbDailySorted.forEach(d=>{
    const[y,mo]=d.date.split('-');
    if(!perfMap[y])perfMap[y]={};
    perfMap[y][parseInt(mo)-1]=(perfMap[y][parseInt(mo)-1]||0)+parseFloat(d.daily_pnl||0);
  });
  const years=Object.keys(perfMap).sort();

  return`
  <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr);max-width:720px">
    <div class="kpi"><div class="kpi-label">Trading Days</div><div class="kpi-value">${dbDailySorted.length}</div></div>
    <div class="kpi"><div class="kpi-label">Profitable</div><div class="kpi-value green">${dbDailySorted.filter(d=>parseFloat(d.daily_pnl||0)>0).length}</div></div>
    <div class="kpi"><div class="kpi-label">Loss Days</div><div class="kpi-value red">${dbDailySorted.filter(d=>parseFloat(d.daily_pnl||0)<0).length}</div></div>
    <div class="kpi"><div class="kpi-label">Streak</div><div class="kpi-value ${sDir==='W'?'green':'red'}">${streak}${sDir}</div></div>
    <div class="kpi"><div class="kpi-label">Best Day</div><div class="kpi-value green">+${dbDailySorted.length?Math.max(...dbDailySorted.map(d=>parseFloat(d.daily_pnl||0))).toFixed(2):'0.00'}</div></div>
  </div>

  <div style="margin-bottom:16px">
    <div style="font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Last 20 Days</div>
    <div class="streak-dots">${last20.map(d=>{const p=parseFloat(d.daily_pnl||0);return`<div class="streak-dot" title="${d.date}: ${fmtPnl(p)}" style="background:${p>0?'#16a34a':p<0?'#dc2626':'#94a3b8'}">${p>0?'W':'L'}</div>`;}).join('')}</div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Monthly P&L (Last 12 Months)</div>
    <div class="chart-wrap"><canvas id="mthChart" data-type="bar" data-vals='${j(mVals)}' data-labels='${j(mLabels)}'></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Weekly P&L (Last 8 Weeks)</div>
    <div class="chart-wrap"><canvas id="wkChart" data-type="bar" data-vals='${j(wVals)}' data-labels='${j(wKeys.map(w=>w.slice(5)))}'></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Daily P&L Distribution</div>
    <div class="chart-wrap"><canvas id="dlyChart" data-type="bar" data-vals='${j(dVals)}' data-labels='${j(dLabels)}'></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">P&L by Time of Day (UTC)</div>
    <div class="chart-wrap"><canvas id="todChart" data-type="bar" data-vals='${j(hVals)}' data-labels='${j(Array.from({length:24},(_,i)=>i+"h"))}'></canvas></div>
  </div>

  ${years.length?`
  <div class="chart-card">
    <div class="chart-title">Monthly Performance ($)</div>
    <div style="overflow-x:auto">
      <table class="monthly-tbl">
        <thead><tr>
          <th style="text-align:left">Year</th>
          ${MON.map(m=>`<th>${m}</th>`).join('')}
          <th style="color:#1e40af">YTD</th>
        </tr></thead>
        <tbody>${years.map(y=>{
          const ytd=Object.values(perfMap[y]).reduce((s,v)=>s+v,0);
          return`<tr>
            <td>${y}</td>
            ${Array.from({length:12},(_,m)=>{
              const v=perfMap[y]?.[m];
              if(v===undefined)return`<td class="m-zero">—</td>`;
              return`<td class="${v>=0?'m-pos':'m-neg'}">${v===0?'0':fmtMoney(v)}</td>`;
            }).join('')}
            <td class="ytd-col ${ytd>=0?'m-pos':'m-neg'}">${fmtMoney(ytd)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  </div>`:''}`;
}

// ── HEATMAP ───────────────────────────────────────────────────────
function renderHeatmap(){
  const cl=closed();
  const pairs=[...new Set(cl.map(t=>t.symbol).filter(Boolean))].sort();
  if(!pairs.length)return`<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-msg">No trade data</div></div>`;
  const data={};
  cl.forEach(t=>{const s=t.symbol||'?';if(!data[s])data[s]={pnl:0,trades:0,wins:0};data[s].pnl+=parseFloat(t.pnl||0);data[s].trades++;if(parseFloat(t.pnl||0)>0)data[s].wins++;});
  const maxA=Math.max(...pairs.map(p=>Math.abs(data[p]?.pnl||0)),1);
  return`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">
    ${pairs.map(p=>{
      const d=data[p]||{pnl:0,trades:0,wins:0};
      const intensity=Math.min(1,Math.abs(d.pnl)/maxA);
      const bg=d.pnl>=0?`rgba(22,163,74,${0.15+intensity*0.75})`:`rgba(220,38,38,${0.15+intensity*0.75})`;
      const wr=d.trades?((d.wins/d.trades)*100).toFixed(0):0;
      return`<div style="background:${bg};border-radius:10px;padding:14px;border:1px solid ${d.pnl>=0?'#bbf7d0':'#fecaca'}">
        <div style="font-size:14px;font-weight:800;color:${d.pnl>=0?'#14532d':'#7f1d1d'}">${p}</div>
        <div style="font-size:18px;font-weight:700;color:${d.pnl>=0?'#16a34a':'#dc2626'};margin:4px 0">${fmtPnl(d.pnl)}</div>
        <div style="font-size:11px;color:#475569">${d.trades} trades · ${wr}% WR</div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── CURRENCIES ────────────────────────────────────────────────────
function renderCurrencies(){
  const cl=closed();
  const curs=['EUR','GBP','AUD','NZD','USD','CAD','CHF','JPY'];
  const s={},w={};
  curs.forEach(c=>{s[c]={pnl:0,t:0};w[c]={pnl:0,t:0};});
  cl.forEach(t=>{
    const p=parseFloat(t.pnl||0);
    if(t.strong_cur&&s[t.strong_cur]){s[t.strong_cur].pnl+=p;s[t.strong_cur].t++;}
    if(t.weak_cur&&w[t.weak_cur]){w[t.weak_cur].pnl+=p;w[t.weak_cur].t++;}
  });
  const hasData=curs.some(c=>s[c].t>0||w[c].t>0);
  if(!hasData)return`<div class="empty-state"><div class="empty-icon">💱</div><div class="empty-msg">No currency data (requires main EA)</div></div>`;
  const sV=curs.map(c=>+s[c].pnl.toFixed(2));
  const wV=curs.map(c=>+w[c].pnl.toFixed(2));
  return`
  <div class="chart-card">
    <div class="chart-title">P&L as Strong Currency</div>
    <div class="chart-wrap"><canvas id="csChart" data-type="bar" data-vals='${j(sV)}' data-labels='${j(curs)}'></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">P&L as Weak Currency</div>
    <div class="chart-wrap"><canvas id="cwChart" data-type="bar" data-vals='${j(wV)}' data-labels='${j(curs)}'></canvas></div>
  </div>`;
}

  <div class="chart-card">

  const mVals=m12.map(k=>+(mMap[k]||0).toFixed(2));
  const mLabels=m12.map(k=>{const[y,mo]=k.split('-');return MON[parseInt(mo)-1]+"'"+(y.slice(2));});
  const wMap=buildWeekMap(cl,8);
  const wKeys=Object.keys(wMap).sort().slice(-8);
  const wVals=wKeys.map(k=>+wMap[k].toFixed(2));
  const byDay=[0,0,0,0,0,0,0];
  cl.forEach(t=>{if(t.ts)byDay[new Date(t.ts).getDay()]+=parseFloat(t.pnl||0);});
  const dVals=byDay.map(v=>+v.toFixed(2));
  const byPair={};
  cl.forEach(t=>{const s=t.symbol||'?';byPair[s]=(byPair[s]||0)+parseFloat(t.pnl||0);});
  const pKeys=Object.keys(byPair).sort((a,b)=>byPair[b]-byPair[a]);
  const pVals=pKeys.map(k=>+byPair[k].toFixed(2));
  const hourMap=Array(24).fill(0);
  cl.forEach(t=>{if(t.ts)hourMap[new Date(t.ts).getUTCHours()]+=parseFloat(t.pnl||0);});
  const hVals=hourMap.map(v=>+v.toFixed(2));

  // Monthly perf table
  const perfMap={};
  [...db.daily].sort((a,b)=>a.date.localeCompare(b.date)).forEach(d=>{
    const[y,mo]=d.date.split('-');

    perfMap[y][parseInt(mo)-1]=(perfMap[y][parseInt(mo)-1]||0)+parseFloat(d.daily_pnl||0);

  const years=Object.keys(perfMap).sort();

  return`
  <div class="chart-card">
    <div class="chart-title">Monthly P&L (Last 12 Months)</div>

  </div>
  <div class="chart-card">
    <div class="chart-title">Weekly P&L (Last 8 Weeks)</div>
    <div class="chart-wrap"><canvas id="wkChart" data-type="bar" data-vals='${j(wVals)}' data-labels='${j(wKeys.map(w=>w.slice(5)))}'></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">P&L by Pair</div>

  <div class="chart-card">

      <table class="monthly-tbl">
        <thead><tr><th style="text-align:left">Year</th>${MON.map(m=>`<th>${m}</th>`).join('')}<th style="color:#1e40af">YTD</th></tr></thead>

}

// ── COMPARE ───────────────────────────────────────────────────────
function renderCompare(){
  if(allAccounts.length<2)return`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-msg">Need multiple accounts to compare</div></div>`;
  return`<div class="compare-grid">${allAccounts.map(a=>{
    const trades=rawDb.trades.filter(t=>t.account_id===a.id);
    const cl=trades.filter(t=>['CLOSE','COMPOUND_CLOSE'].includes(t.event)&&parseFloat(t.pnl||0)!==0);
    const pnl=totalPnL(cl),wr=winRate(cl),pf=profitFactor(cl);
    const sorted=[...cl].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
    let run=0;const eq=sorted.map(t=>{run+=parseFloat(t.pnl||0);return+run.toFixed(2);});

        <div class="compare-kpi"><div class="compare-kpi-label">Win Rate</div><div class="compare-kpi-value ${wr>=50?'green':'red'}">${wr.toFixed(1)}%</div></div>
        <div class="compare-kpi"><div class="compare-kpi-label">Profit Factor</div><div class="compare-kpi-value ${pf>=1?'green':'red'}">${pf===999?'∞':pf}</div></div>

      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── INSPECTOR ─────────────────────────────────────────────────────
function openInspector(ticket){
  const all=rawDb.trades.filter(t=>String(t.ticket)===String(ticket));
  if(!all.length)return;
  const t=all.find(x=>x.event==='OPEN')||all[0];
  const pnl=totalPnL(all.filter(x=>x.event!=='OPEN'));
  document.getElementById('inspBody').innerHTML=`
    <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;padding-top:4px">${t.symbol||'Trade'} #${ticket}</h3>
    ${[['Symbol',t.symbol],['Direction',t.direction],['Lot',t.lot],['Entry',parseFloat(t.entry||0).toFixed(5)],
      ['SL',t.sl?parseFloat(t.sl).toFixed(5):'—'],['TP',t.tp?parseFloat(t.tp).toFixed(5):'—'],
      ['Strong',t.strong_cur||'—'],['Weak',t.weak_cur||'—'],['Gap',parseFloat(t.gap||0).toFixed(3)],
      ['Net P&L',fmtPnl(pnl)],['Balance',t.balance||'—']
    ].map(([l,v])=>`<div class="insp-row"><span class="lbl">${l}</span><span class="val">${v||'—'}</span></div>`).join('')}
    ${all.length>1?`<div style="margin-top:14px;font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Events</div>
    ${all.map(e=>`<div style="padding:8px;background:#f8fafc;border-radius:6px;margin-bottom:6px;border-left:3px solid ${e.event==='OPEN'?'#3b82f6':e.event.includes('CLOSE')?'#16a34a':'#d97706'}">
      <div style="font-size:11px;font-weight:700">${e.event} — ${(e.ts||'').slice(0,16)}</div>
      <div style="font-size:11px;color:#64748b">P&L: ${fmtPnl(parseFloat(e.pnl||0))} | Lot: ${e.lot}</div>
    </div>`).join('')}`:''}`;
  document.getElementById('inspector').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeInspector(){
  document.getElementById('inspector').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function j(v){return JSON.stringify(v);}

init();
