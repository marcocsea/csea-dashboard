<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CSEA Trading Intelligence v5.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;color:#1e293b;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
:root{--blue:#3b82f6;--green:#16a34a;--red:#dc2626;--gold:#d97706;--cyan:#0891b2;--teal:#0d9488;
  --bg1:#f1f5f9;--bg2:#ffffff;--bg3:#f8fafc;--bg4:#e2e8f0;--border:#e2e8f0;--text:#1e293b;--sub:#64748b}
/* HEADER */
.header{background:linear-gradient(135deg,#1e3a5f,#1e1b4b);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.5px;white-space:nowrap}.logo span{color:#d97706}
.badge{background:rgba(255,255,255,.15);color:#bfdbfe;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.mode-toggle{display:flex;background:rgba(0,0,0,.25);border-radius:8px;padding:3px;gap:2px;margin-left:8px}
.mode-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;color:#93c5fd;background:transparent;transition:all .2s;white-space:nowrap}
.mode-btn.active{background:#1e40af;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:nowrap}
.status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;flex-shrink:0}
.status-dot.off{background:#ef4444;box-shadow:0 0 6px #ef4444}
.status-txt{font-size:11px;color:#bfdbfe;white-space:nowrap}
.last-sync{font-size:11px;color:#93c5fd;white-space:nowrap}
.acct-label{font-size:11px;color:#93c5fd;white-space:nowrap}
.acct-select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;outline:none;cursor:pointer;max-width:200px}
.acct-select option{background:#1e3a5f;color:#fff}
/* DAY STRIP */
.day-strip{background:#1e293b;border-bottom:2px solid #334155;padding:0 20px;height:44px;display:flex;align-items:center;gap:16px;position:sticky;top:56px;z-index:99;flex-wrap:nowrap;overflow:hidden}
.ds-item{display:flex;flex-direction:column;align-items:flex-start;gap:1px;white-space:nowrap}
.ds-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.ds-val{font-size:13px;font-weight:700;color:#e2e8f0}
.ds-val.pos{color:#4ade80}.ds-val.neg{color:#f87171}.ds-val.gold{color:#fbbf24}
.ds-sep{width:1px;height:28px;background:#334155;flex-shrink:0}
.ds-progress{flex:1;min-width:120px;display:flex;flex-direction:column;gap:3px}
.ds-prog-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:flex;justify-content:space-between}
.ds-prog-track{height:6px;background:#334155;border-radius:3px;overflow:hidden}
.ds-prog-fill{height:6px;background:#4ade80;border-radius:3px;transition:width .4s ease}
.ds-prog-fill.gold{background:#fbbf24}
/* DATE BAR */
.date-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-bar-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.preset-btns{display:flex;gap:4px;flex-wrap:wrap}
.preset{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--sub);transition:all .15s}
.preset:hover{border-color:var(--blue);color:var(--blue)}
.preset.active{background:#eff6ff;border-color:var(--blue);color:var(--blue)}
.date-inputs{display:flex;align-items:center;gap:6px;margin-left:8px}
.date-inputs input{padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text);outline:none;background:var(--bg3)}
.date-inputs input:focus{border-color:var(--blue)}
.date-sep{color:var(--sub);font-size:11px}
.range-count{margin-left:auto;font-size:11px;color:var(--sub);white-space:nowrap;background:var(--bg3);padding:3px 10px;border-radius:5px;border:1px solid var(--border)}
/* TABS */
.tabs{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:11px 15px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;transition:all .15s;white-space:nowrap}
.tab:hover{color:#1e293b}.tab.active{color:#1e40af;border-bottom-color:#3b82f6}
/* MAIN */
.main{padding:20px;max-width:1400px;margin:0 auto}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:15px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kpi-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-value{font-size:21px;font-weight:700;color:#1e293b}
.kpi-value.green{color:var(--green)}.kpi-value.red{color:var(--red)}.kpi-value.gold{color:var(--gold)}.kpi-value.cyan{color:var(--cyan)}
.kpi-sub{font-size:11px;color:var(--sub);margin-top:3px}
/* CHARTS */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.charts-row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.charts-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.chart-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-wrap{position:relative;height:190px}
/* TABLES */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.table-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.table-title{font-size:14px;font-weight:700;color:#1e293b}
.count-badge{background:var(--bg3);color:var(--sub);padding:2px 8px;border-radius:4px;font-size:11px;border:1px solid var(--border)}
.filters{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:12px;outline:none}
.tbl-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:#334155}
tr:hover td{background:#f8fafc;cursor:pointer}
/* BADGES */
.badge-buy{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-sell{background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-opened{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-blocked{background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-open{background:#dcfce7;color:#16a34a;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-closed{background:#eff6ff;color:#2563eb;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge-partial{background:#fef9c3;color:#92400e;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
/* HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;padding:16px}
.tile{border-radius:8px;padding:14px 10px;border:1px solid;text-align:center;cursor:pointer;transition:transform .15s}
.tile:hover{transform:scale(1.04)}
.tile-sym{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:4px}
.tile-wr{font-size:20px;font-weight:700;margin-bottom:3px}
.tile-wl{font-size:11px;color:#64748b}
.tile-pnl{font-size:13px;font-weight:700;margin-top:4px}
/* FLOAT BAR */
.float-bar{background:linear-gradient(135deg,#1e3a5f,#1e1b4b);border-radius:10px;padding:14px 20px;margin-bottom:16px;display:flex;gap:24px;align-items:center}
.float-label{font-size:10px;color:#93c5fd;text-transform:uppercase;letter-spacing:.5px}
.float-value{font-size:20px;font-weight:700}
/* INSPECTOR */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none}
.overlay.open{display:block}
.inspector{position:fixed;right:-440px;top:0;bottom:0;width:420px;background:#fff;z-index:201;overflow-y:auto;transition:right .3s ease;box-shadow:-4px 0 20px rgba(0,0,0,.15);padding:24px}
.inspector.open{right:0}
.insp-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#64748b}
/* COMPARE */
.compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.compare-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px}
.compare-name{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.compare-stat{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.compare-stat span:first-child{color:var(--sub)}.compare-stat span:last-child{font-weight:600}
/* MONTHLY TABLE */
.monthly-table-wrap{overflow-x:auto;margin-bottom:0}
.monthly-table{width:100%;border-collapse:collapse;font-size:12px}
.monthly-table th{background:var(--bg3);padding:9px 10px;text-align:center;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.monthly-table td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-weight:600}
.monthly-table td.year-col{text-align:left;color:var(--sub);font-weight:700;background:var(--bg3)}
.monthly-table td.ytd-col{background:#f0f9ff;font-weight:700}
.m-pos{color:var(--green)}.m-neg{color:var(--red)}.m-zero{color:var(--sub)}
/* CURRENCIES */
.cur-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:20px}
.cur-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.cur-name{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:10px}
.cur-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--bg3)}
.cur-row:last-child{border:none}
.cur-row span:first-child{color:var(--sub)}
.cur-row span:last-child{font-weight:600}
/* STREAK DOTS */
.streak-dots{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.streak-dot{width:14px;height:14px;border-radius:50%}
.streak-dot.w{background:#16a34a}.streak-dot.l{background:#dc2626}.streak-dot.n{background:#e2e8f0}
/* CSV BTN */
.csv-btn{padding:5px 12px;background:#0d9488;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;margin-left:auto}
.csv-btn:hover{background:#0f766e}
/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--sub)}
.empty-icon{font-size:40px;margin-bottom:12px}.empty-msg{font-size:14px;font-weight:500}
/* COMPOUND CARD */
.compound-card{background:linear-gradient(135deg,#1e3a5f,#0f172a);border-radius:10px;padding:18px;margin-bottom:20px;color:#fff}
.compound-card h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#93c5fd;margin-bottom:12px}
.compound-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.compound-stat .lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
.compound-stat .val{font-size:18px;font-weight:700;color:#fff}
.compound-stat .val.gold{color:#fbbf24}.compound-stat .val.green{color:#4ade80}.compound-stat .val.red{color:#f87171}
/* RESPONSIVE */
@media(max-width:900px){.charts-row,.charts-row-3,.charts-row-2{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}.inspector{width:100%}.compare-grid{grid-template-columns:1fr}.compound-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">⚡ <span>CSEA</span> Intelligence</div>
  <div class="badge">v5.0</div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnStrategy" onclick="setMode('strategy')">📊 Strategy</button>
    <button class="mode-btn" id="btnPortfolio" onclick="setMode('portfolio')">💼 Portfolio</button>
  </div>
  <div class="hdr-right">
    <div class="acct-label">Account:</div>
    <select class="acct-select" id="acctSelect" onchange="onAcctChange()"><option value="">Loading...</option></select>
    <div class="status-dot off" id="statusDot"></div>
    <div class="status-txt" id="statusTxt">Connecting…</div>
    <div class="last-sync" id="lastSync"></div>
  </div>
</div>

<!-- DAY STRIP -->
<div class="day-strip" id="dayStrip">
  <div class="ds-item"><div class="ds-label">Day</div><div class="ds-val gold" id="dsDay">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Lot</div><div class="ds-val" id="dsLot">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Today P&L</div><div class="ds-val" id="dsPnl">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Trades</div><div class="ds-val" id="dsTrades">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-item"><div class="ds-label">Positions</div><div class="ds-val" id="dsPos">—</div></div>
  <div class="ds-sep"></div>
  <div class="ds-progress">
    <div class="ds-prog-label"><span>Compound Progress</span><span id="dsProgPct">—</span></div>
    <div class="ds-prog-track"><div class="ds-prog-fill" id="dsProgFill" style="width:0%"></div></div>
  </div>
</div>

<!-- DATE BAR -->
<div class="date-bar">
  <span class="date-bar-label">📅 Range:</span>
  <div class="preset-btns">
    <button class="preset" onclick="setPreset('today')">Today</button>
    <button class="preset" onclick="setPreset('week')">This Week</button>
    <button class="preset" onclick="setPreset('month')">This Month</button>
    <button class="preset" onclick="setPreset('year')">This Year</button>
    <button class="preset" onclick="setPreset('last30')">Last 30d</button>
    <button class="preset" onclick="setPreset('last90')">Last 3M</button>
    <button class="preset" onclick="setPreset('last180')">Last 6M</button>
    <button class="preset active" onclick="setPreset('all')">All Time</button>
  </div>
  <div class="date-inputs">
    <input type="date" id="dateFrom" onchange="onDateChange()"/>
    <span class="date-sep">→</span>
    <input type="date" id="dateTo" onchange="onDateChange()"/>
  </div>
  <div class="range-count" id="rangeCount">— trades in range</div>
</div>

<!-- TABS -->
<div class="tabs" id="tabBar"></div>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

<!-- INSPECTOR -->
<div class="overlay" id="overlay" onclick="closeInspector()"></div>
<div class="inspector" id="inspector">
  <button class="insp-close" onclick="closeInspector()">✕</button>
  <div id="inspBody"></div>
</div>

<script>
const SB_URL='https://nmyveijljquxvhjelqbc.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teXZlaWpsanF1eHZoamVscWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjc2MjgsImV4cCI6MjA4Nzk0MzYyOH0.YT-sAh2Spn1805dnylTsZ2gBx-T7yC6fyOKIs0YPlP4';
const HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

let mode='strategy',activeTab='overview',acctId='';
let allAccounts=[],allAccountsData={},charts={};
let rawDb={trades:[],signals:[],daily:[],positions:[]};
let db={trades:[],signals:[],daily:[],positions:[]};
let dateFrom='',dateTo='',activePreset='all';
let posRefreshTimer=null;

const STRATEGY_TABS=['overview','positions','trades','signals','daily','heatmap','currencies','compare'];
const PORTFOLIO_TABS=['overview','trades','performance','compare'];
const TAB_LABELS={overview:'Overview',positions:'Positions',trades:'Trades',signals:'Signals',daily:'Daily',heatmap:'Pair Heatmap',currencies:'Currencies',performance:'Performance',compare:'Compare'};
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── SUPABASE ──────────────────────────────────────────────────────
async function sb(table,params=''){
  const PAGE=1000;let all=[],from=0;
  while(true){
    const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}&limit=${PAGE}&offset=${from}`,
      {headers:{...HDR,'Range-Unit':'items',Range:`${from}-${from+PAGE-1}`}});
    if(!r.ok) break;
    const page=await r.json();
    all=all.concat(page);
    if(page.length<PAGE) break;
    from+=PAGE;
  }
  return all;
}
async function sbPatch(table,match,body){
  const params=Object.entries(match).map(([k,v])=>`${k}=eq.${v}`).join('&');
  return fetch(`${SB_URL}/rest/v1/${table}?${params}`,{method:'PATCH',headers:{...HDR,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});
}

// ── INIT ──────────────────────────────────────────────────────────
async function init(){
  const saved=localStorage.getItem('csea_account_id');
  const savedMode=localStorage.getItem('csea_mode')||'strategy';
  setMode(savedMode,false);
  allAccounts=await sb('accounts','select=*&order=created_at');
  const sel=document.getElementById('acctSelect');
  sel.innerHTML='<option value="">All Accounts</option>';
  allAccounts.forEach(a=>{
    const o=document.createElement('option');
    o.value=a.id;o.textContent=a.label||a.name||a.account_number;
    sel.appendChild(o);
  });
  if(saved){sel.value=saved;acctId=saved;}
  await loadData();
}

async function loadData(){
  const dot=document.getElementById('statusDot'),txt=document.getElementById('statusTxt');
  dot.className='status-dot off';txt.textContent='Loading…';
  const f=acctId?`&account_id=eq.${acctId}`:'';
  const [trades,signals,daily,positions]=await Promise.all([
    sb('trades',`select=*&order=ts${f}`),
    sb('signals',`select=*&order=ts${f}`),
    sb('daily',`select=*&order=date${f}`),
    sb('positions',`select=*&order=ts${f}`)
  ]);
  rawDb={trades:trades||[],signals:signals||[],daily:daily||[],positions:positions||[]};
  applyDateFilter();
  dot.className='status-dot';txt.textContent='Live';
  document.getElementById('lastSync').textContent='Updated '+new Date().toLocaleTimeString();
  updateDayStrip();
  renderTabs();
  renderContent();
}

// ── DATE FILTER ───────────────────────────────────────────────────
function applyDateFilter(){
  let from=dateFrom?new Date(dateFrom):null;
  let to=dateTo?new Date(dateTo+' 23:59:59'):null;
  db.trades=rawDb.trades.filter(t=>{
    if(!t.ts) return true;
    const d=new Date(t.ts);
    return(!from||d>=from)&&(!to||d<=to);
  });
  db.signals=rawDb.signals.filter(s=>{
    if(!s.ts) return true;
    const d=new Date(s.ts);
    return(!from||d>=from)&&(!to||d<=to);
  });
  db.daily=rawDb.daily.filter(d=>{
    if(!d.date) return true;
    const dt=new Date(d.date);
    return(!from||dt>=from)&&(!to||dt<=to);
  });
  db.positions=rawDb.positions;
  document.getElementById('rangeCount').textContent=`${closed().length} trades in range`;
}

function setPreset(p){
  activePreset=p;
  document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  const now=new Date(),y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  if(p==='today'){dateFrom=dateStr(now);dateTo=dateStr(now);}
  else if(p==='week'){const mon=new Date(now);mon.setDate(d-now.getDay()+1);dateFrom=dateStr(mon);dateTo=dateStr(now);}
  else if(p==='month'){dateFrom=`${y}-${pad(m+1)}-01`;dateTo=dateStr(now);}
  else if(p==='year'){dateFrom=`${y}-01-01`;dateTo=dateStr(now);}
  else if(p==='last30'){const t=new Date(now);t.setDate(d-30);dateFrom=dateStr(t);dateTo=dateStr(now);}
  else if(p==='last90'){const t=new Date(now);t.setDate(d-90);dateFrom=dateStr(t);dateTo=dateStr(now);}
  else if(p==='last180'){const t=new Date(now);t.setDate(d-180);dateFrom=dateStr(t);dateTo=dateStr(now);}
  else{dateFrom='';dateTo='';}
  document.getElementById('dateFrom').value=dateFrom;
  document.getElementById('dateTo').value=dateTo;
  applyDateFilter();renderContent();
}
function onDateChange(){
  dateFrom=document.getElementById('dateFrom').value;
  dateTo=document.getElementById('dateTo').value;
  document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));
  applyDateFilter();renderContent();
}
function dateStr(d){return d.toISOString().slice(0,10);}
function pad(n){return String(n).padStart(2,'0');}

// ── DAY STRIP ─────────────────────────────────────────────────────
function updateDayStrip(){
  const today=new Date().toISOString().slice(0,10);
  const todayRows=rawDb.daily.filter(d=>d.date===today);
  const d=todayRows.length?todayRows[todayRows.length-1]:rawDb.daily[rawDb.daily.length-1];
  if(!d){return;}
  const pnl=parseFloat(d.daily_pnl||0);
  const lot=parseFloat(d.compound_lot||0);
  const target=parseFloat(d.compound_target||0);
  const pct=target>0?Math.min(100,(pnl/target*100)):0;
  const hit=d.target_hit;
  document.getElementById('dsDay').textContent=d.compound_day?'Day '+d.compound_day:'—';
  document.getElementById('dsLot').textContent=lot>0?lot.toFixed(2)+'L':'—';
  const pnlEl=document.getElementById('dsPnl');
  pnlEl.textContent=(pnl>=0?'+':'')+pnl.toFixed(2);
  pnlEl.className='ds-val '+(hit?'gold':pnl>=0?'pos':'neg');
  document.getElementById('dsTrades').textContent=(d.trades_closed||0)+'/'+(d.trades_opened||0);
  document.getElementById('dsPos').textContent=rawDb.positions.length;
  document.getElementById('dsProgPct').textContent=target>0?pct.toFixed(0)+'% of $'+target.toFixed(2):'—';
  const fill=document.getElementById('dsProgFill');
  fill.style.width=Math.max(0,pct)+'%';
  fill.className='ds-prog-fill'+(hit?' gold':'');
  if(hit) document.getElementById('dayStrip').style.borderBottomColor='#fbbf24';
}

// ── HELPERS ───────────────────────────────────────────────────────
function closed(){return db.trades.filter(t=>t.event==='CLOSE'||t.event==='COMPOUND_CLOSE');}
function totalPnL(arr){return arr.reduce((s,t)=>s+parseFloat(t.pnl||0),0);}
function winRate(arr){const w=arr.filter(t=>parseFloat(t.pnl||0)>0).length;return arr.length?(w/arr.length*100):0;}
function profitFactor(arr){
  const g=arr.filter(t=>parseFloat(t.pnl||0)>0).reduce((s,t)=>s+parseFloat(t.pnl||0),0);
  const l=Math.abs(arr.filter(t=>parseFloat(t.pnl||0)<0).reduce((s,t)=>s+parseFloat(t.pnl||0),0));
  return l>0?(g/l):g>0?999:0;
}
function avgWin(arr){const w=arr.filter(t=>parseFloat(t.pnl||0)>0);return w.length?totalPnL(w)/w.length:0;}
function avgLoss(arr){const l=arr.filter(t=>parseFloat(t.pnl||0)<0);return l.length?totalPnL(l)/l.length:0;}
function maxDD(arr){let peak=0,dd=0,cur=0;arr.forEach(t=>{cur+=parseFloat(t.pnl||0);if(cur>peak)peak=cur;const d=peak>0?(peak-cur)/peak*100:0;if(d>dd)dd=d;});return dd;}
function fmtPnl(v){return(v>=0?'+':'')+parseFloat(v).toFixed(2);}
function getWeek(ts){if(!ts)return'?';const d=new Date(ts);const mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1);return mon.toISOString().slice(0,10);}

// Build monthly year/month grid from closed trades
function buildYearMap(trades){
  const ym={};
  trades.forEach(t=>{
    if(!t.ts)return;
    const yr=t.ts.slice(0,4),mo=parseInt(t.ts.slice(5,7))-1;
    if(!ym[yr])ym[yr]=Array(12).fill(null);
    ym[yr][mo]=(ym[yr][mo]||0)+parseFloat(t.pnl||0);
  });
  return ym;
}
function renderMonthlyTable(trades){
  const ym=buildYearMap(trades);
  const years=Object.keys(ym).sort();
  if(!years.length)return'';
  return`<div class="table-card" style="margin-bottom:20px">
    <div class="table-header"><span class="table-title">📅 Monthly Performance ($)</span></div>
    <div class="monthly-table-wrap" style="padding:0 0 4px">
      <table class="monthly-table">
        <thead><tr><th style="text-align:left;min-width:60px">Year</th>${MON.map(m=>`<th style="min-width:72px">${m}</th>`).join('')}<th style="min-width:80px">YTD</th></tr></thead>
        <tbody>${years.map(yr=>{
          const row=ym[yr];
          const ytd=row.reduce((s,v)=>s+(v||0),0);
          return`<tr>
            <td class="year-col">${yr}</td>
            ${row.map(v=>v===null?`<td class="m-zero" style="color:#94a3b8">—</td>`:`<td class="${v>0?'m-pos':v<0?'m-neg':'m-zero'}">${fmtPnl(v)}</td>`).join('')}
            <td class="ytd-col ${ytd>=0?'m-pos':'m-neg'}">${fmtPnl(ytd)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  </div>`;
}

// ── HEATMAP ───────────────────────────────────────────────────────
function renderHeatmap(){
  const cl=closed();const map={};
  cl.forEach(t=>{const s=t.symbol||'?';if(!map[s])map[s]={pnl:0,w:0,l:0};const p=parseFloat(t.pnl||0);map[s].pnl+=p;p>=0?map[s].w++:map[s].l++;});
  const entries=Object.entries(map).sort((a,b)=>b[1].pnl-a[1].pnl);
  if(!entries.length)return`<div class="empty-state"><div class="empty-icon">🔥</div><div class="empty-msg">No trade data</div></div>`;
  const maxAbs=Math.max(...entries.map(([,v])=>Math.abs(v.pnl)));
  return`<div class="heatmap">${entries.map(([sym,v])=>{
    const wr=v.w+v.l>0?(v.w/(v.w+v.l)*100):0;
    const intensity=maxAbs>0?Math.abs(v.pnl)/maxAbs:0;
    const bg=v.pnl>=0?`rgba(22,163,74,${0.1+intensity*0.55})`:`rgba(220,38,38,${0.1+intensity*0.55})`;
    return`<div class="tile" style="background:${bg};border-color:${v.pnl>=0?'#16a34a':'#dc2626'}40">
      <div class="tile-sym">${sym}</div>
      <div class="tile-wr" style="color:${wr>=50?'#16a34a':'#dc2626'}">${wr.toFixed(0)}%</div>
      <div class="tile-wl">${v.w}W / ${v.l}L</div>
      <div class="tile-pnl" style="color:${v.pnl>=0?'#16a34a':'#dc2626'}">${fmtPnl(v.pnl)}</div>
    </div>`;
  }).join('')}</div>`;
}

// ── CURRENCIES ────────────────────────────────────────────────────
function renderCurrencies(){
  const cl=closed().filter(t=>t.strong_cur&&t.weak_cur);
  if(!cl.length)return`<div class="empty-state"><div class="empty-icon">💱</div><div class="empty-msg">No currency data — requires main CSEA EA (not PlatformSync)</div></div>`;
  const CURS=['EUR','GBP','AUD','NZD','USD','CAD','CHF','JPY'];
  const data={};
  CURS.forEach(c=>{data[c]={strongPnl:0,strongW:0,strongL:0,weakPnl:0,weakW:0,weakL:0};});
  cl.forEach(t=>{
    const p=parseFloat(t.pnl||0);
    if(data[t.strong_cur]){p>=0?data[t.strong_cur].strongW++:data[t.strong_cur].strongL++;data[t.strong_cur].strongPnl+=p;}
    if(data[t.weak_cur]){p>=0?data[t.weak_cur].weakW++:data[t.weak_cur].weakL++;data[t.weak_cur].weakPnl+=p;}
  });
  const strongPnls=CURS.map(c=>+data[c].strongPnl.toFixed(2));
  const weakPnls=CURS.map(c=>+data[c].weakPnl.toFixed(2));
  return`
  <div class="cur-grid">${CURS.map(c=>{
    const d=data[c];
    const sTotal=d.strongW+d.strongL,wTotal=d.weakW+d.weakL;
    const sWr=sTotal?((d.strongW/sTotal)*100).toFixed(0)+'%':'—';
    const wWr=wTotal?((d.weakW/wTotal)*100).toFixed(0)+'%':'—';
    return`<div class="cur-card">
      <div class="cur-name">${c}</div>
      <div class="cur-row"><span>As Strong — P&L</span><span style="color:${d.strongPnl>=0?'#16a34a':'#dc2626'}">${fmtPnl(d.strongPnl)}</span></div>
      <div class="cur-row"><span>As Strong — Win Rate</span><span>${sWr}</span></div>
      <div class="cur-row"><span>As Strong — Trades</span><span>${sTotal}</span></div>
      <div class="cur-row"><span>As Weak — P&L</span><span style="color:${d.weakPnl>=0?'#16a34a':'#dc2626'}">${fmtPnl(d.weakPnl)}</span></div>
      <div class="cur-row"><span>As Weak — Win Rate</span><span>${wWr}</span></div>
      <div class="cur-row"><span>As Weak — Trades</span><span>${wTotal}</span></div>
    </div>`;
  }).join('')}</div>
  <div class="charts-row-2">
    <div class="chart-card"><div class="chart-title">P&L as Strong Currency</div><div class="chart-wrap"><canvas id="curStrongChart"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">P&L as Weak Currency</div><div class="chart-wrap"><canvas id="curWeakChart"></canvas></div></div>
  </div>
  <div style="display:none" id="curData"
    data-curs='${JSON.stringify(CURS)}'
    data-strong='${JSON.stringify(strongPnls)}'
    data-weak='${JSON.stringify(weakPnls)}'></div>`;
}

// ── PERFORMANCE (Portfolio) ───────────────────────────────────────
function renderPerformance(){
  const cl=closed();
  const monthMap={},weekMap={},durMap={'<1h':0,'1-4h':0,'4-24h':0,'>24h':0};
  cl.forEach(t=>{
    const m=(t.ts||'').slice(0,7);monthMap[m]=(monthMap[m]||0)+parseFloat(t.pnl||0);
    const w=getWeek(t.ts);weekMap[w]=(weekMap[w]||0)+parseFloat(t.pnl||0);
    const dur=parseFloat(t.duration_min||0);
    if(dur<60)durMap['<1h']+=parseFloat(t.pnl||0);
    else if(dur<240)durMap['1-4h']+=parseFloat(t.pnl||0);
    else if(dur<1440)durMap['4-24h']+=parseFloat(t.pnl||0);
    else durMap['>24h']+=parseFloat(t.pnl||0);
  });
  const months=Object.keys(monthMap).sort();
  const weeks=Object.keys(weekMap).sort().slice(-16);
  const dDates=db.daily.map(d=>d.date.slice(5));
  const dPnls=db.daily.map(d=>parseFloat(d.daily_pnl||0));

  // Time of day
  const hourMap={};
  cl.forEach(t=>{if(!t.ts)return;const h=new Date(t.ts).getUTCHours();hourMap[h]=(hourMap[h]||0)+parseFloat(t.pnl||0);});
  const hourVals=Array.from({length:24},(_,i)=>+(hourMap[i]||0).toFixed(2));

  return`

    data-month-vals='${JSON.stringify(months.map(m=>+monthMap[m].toFixed(2)))}'

      if(pdc) charts.pdc=new Chart(pdc,{type:'bar',data:{labels:dk,datasets:[{data:dv,backgroundColor:dv.map(v=>v>=0?'#3b82f6':'#dc2626')}]},options:{...cd}});
      const hv2=JSON.parse(pf.dataset.hourVals||'[]');
      const ptc=document.getElementById('perfTod');
      if(ptc) charts.ptc=new Chart(ptc,{type:'bar',data:{labels:Array.from({length:24},(_,i)=>i+'h'),datasets:[{data:hv2,backgroundColor:hv2.map(v=>v>=0?'#0d9488':'#dc2626')}]},options:{...cd}});
    }
  }catch(e){console.warn('Chart error',e);}
}

setInterval(()=>{if(document.visibilityState==='visible')loadData();},60000);
init();
</script>
